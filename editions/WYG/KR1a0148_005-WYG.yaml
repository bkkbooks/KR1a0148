body:
  text: 易翼宗卷五湖北巡撫晏斯盛撰下經損句有孚元吉无咎句可貞句利有攸往句曷之用句二簋可用享簋蜀才作軌誤傳損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行大象山下有澤損君子以懲忿窒欲繫辭損德之修也損先難而後易損以逺害序卦緩必有所失故受之以損雜卦損益盛衰之始也子夏傳孔子讀書至損益喟然而嘆子夏避席而問答曰自損者益自益者缺是以嘆也又淮南子引孔子讀易至損益喟然而嘆曰或利之適足以害之或害之適足以利之利害禍福之間不可不察三陽三隂乾坤否泰之分際與益相反覆而本卦上下又自相對待上卦隂多下卦陽多隂主文陽主質當減下卦之陽以補上卦乃不至隂多於陽文浮于質故傳曰其道上行此卦之所以名損也上下卦陽皆應隂故有孚孚則以陽益隂元陽為之主矣故元吉彼此相濟隂陽不愆故无咎正道也苟可貞道在上行故利有攸往夫以陽益隂尚質之道也以質為文而彼此取稱足以徴信則質也者孚之實也不必繁縟之多儀而神明可鑒故又申之曰此尚質之道果何如乎如享祀之禮固將潔粢豐盛備物致敬然與其敬不至而物有餘毋寜物不及而敬至也雖二簋可也審其為可損之善物也故傳曰應有時先儒皆據六三爻辭三人行則損一人謂乾九三升于坤上為損之主非也每卦反覆相推之中又有隂陽對待大分當從其大者觀之上經乾坤之後閱十卦而至泰否下經咸恒之後閱十卦而至損益泰否小乾坤也兩卦相對待而本卦亦相對待也損益類咸恒也澤山為咸而山澤則損雷風為恒而風雷則益亦兩卦相對待而本卦自相對待也葢泰之下損一陽以益上則為損否之上損一陽以益下則為益其實山澤風雷自相對待本卦之損合兩體觀之則上卦隂多下卦陽多而陽當損以益隂從泰之損下一陽成損之象以為之綱也是故初爻曰已事遄往又曰酌損之是初固損以益四也二爻曰弗損益之之指五而言益之則損在其中若夫三之三人行則損一人以泰之乾去其三之一也一人行以下卦止一隂孤行而上得損乾之一陽為艮之上以為益也四之損疾因初之遄往而見五之或益因上為損以益下之主而言上九弗損益之以乾一上行故不見其損而實已益若専以三為成損之主則初之酌損之謂之何且卦爻之變皆自下而上無獨從三起者來氏知兩卦之覆推然其所謂三行上而居四者幾成以隂益隂西河知泰否之推移而亦以三為損之實皆失之傳曰損下益上下謂乾初上謂坤六各爻損益皆酌盈劑虚損陽益隂初九句已事遄往句无咎句酌損之已虞翻作祀遄荀爽作顓俱誤傳已事遄往尚合志也已事已然之事當損者也而時值其初上應于四彼正須陽遄往速以益之也彼須益而我益之何咎之有因其事之相須而住則已稱量乎時之宜矣故曰酌損之絀華式靡初以為質也遄往于事後則酌損己在其中故傳不重釋九二句利貞句征凶句弗損句益之傳九二利貞中以為志也隂陽進退適中而已損也者損其多以益少中也得中而復損之則嗇矣是故弗損乃所以為益九二得中正也故利貞不當復有所往往失正矣故凶夫所謂利貞者守己之道也尚質之事也人心風俗由此而淳是弗損乃所以為益也傳專言九二利貞則弗損之益已見矣六三句三人行句則損一人句一人行句則得其友傳一人行三則疑也繋辭天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也三人乾本三陽也損一人減一陽以居上也一人行坤之一隂獨行于内也友上剛之應也葢就乾三陽觀之則已損其三之一矣就坤三隂觀之則分一隂以行於下而其乾所損之一陽實為益之主而相與為應損之為益如是皆以隂陽配偶之精而言故繫辭傳復就天地男女言之致一亦即本傳所謂不疑者也六四句損其疾句使遄有喜句无咎傳損其疾亦可喜也天下之當損者孰如疾哉今有痿羸者于此忽得補劑以益之則霍然起矣雖疾可藥也視无妄之勿藥若異而視恒之貞疾已逺故亦可喜即咎之所以无也四柔甚而初九應故有此象楊氏萬里曰六四以柔居四得初九之陽以為應損其疾者也初言遄住四言使遄葢初之遄實四有以使之也六五句或益之句十朋之龜弗克違句元吉傳六五元吉自上祐也乾損一陽以益上此損之由名傳曰其道上行上蓋卦之主也損之所以為益也六五虚中居尊比近相承謙而能受傳曰自上祐謂上九也乾之一陽上升者正為我助其益也洊至而疊來不一而足也故曰或益之或者衆辭也多辭也十朋之龜大龜也弗克違言卜之而從也張子所謂龜弗違言受益之可必信然不疑者是也人事天道交相應也得乾元之助本然至善者也故元吉楊氏時曰柔得尊位虚己而下人則謙受益時乃天道天且不違况于人乎况于鬼神乎宜其益之者至矣故曰或益之十朋之龜弗克違元吉郭氏雍曰益之至豈獨人事而已雖元龜之靈弗能違此其所以元吉也洪範曰汝則從龜從筮從卿士從庶民從是之謂大同六五之元吉猶洪範之大同也上九句弗損句益之句无咎句貞吉句利有攸往句得臣无家傳弗損益之大得志也損下益上其道大行上固損以為益者也故明揭之曰損而弗損也直益之矣此卦之主爻故无咎貞吉與卦辭同旡咎云者損而弗損无所為咎也貞吉云者損而為益正所以為吉也利有攸往道上行也得臣无家益之大者貞吉之至也以陽助隂損有餘以補不足成艮虚而有光統衆隂以效順故傳曰大得志大謂陽王氏肅曰處損之極損極則益故曰弗損益之得臣則萬方一軌故无家也益句利有攸往句利涉大川傳益損上益下民説无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行大象風雷益君子以見善則遷有過則改繫辭包犧氏殁神農氏作斵木為耜揉木為耒耒耨之利以敎天下葢取諸益益徳之裕也益長裕而不設益以興利序卦損而不已必益故受之以益三陽三隂損之覆推艮剛下為震兊柔上為巽陽與隂交陽益隂也而㢲震又自相對待陽與隂配亦陽益陰也益之所以名也陽君隂民損上益下象即事也上之損而實以益下二五中正為益之主無少屯滯四海䝉休被潤澤而大豐美民之説即道之光也道之光即慶之所以集也何往不利而又言利涉大川者以卦之兩質言也㢲震皆木而虚其中有舟象焉渙與中孚之似也故其辭同震動㢲入進而无疆舟之利也卦之徳也要皆隂陽施生之理時行不息之道也初九句利用為大作句元吉无咎傳元吉无咎下不厚事也作工作也大作如四所謂為依遷國建城郭宫室之事也初自損之上而下下為益之始六四相應民心樂赴靈臺之詩曰經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來利用之也傳曰下不厚事猶所謂不以為泰者言不惜其力自忘其勞也此本然至善之事何過之有故无咎六二句或益之句十朋之龜弗克違句永貞吉句王用享于帝吉傳或益之自外來也本爻即損之五而六二中正九五正應受五之益志同道合益之最盛者其曰或者不一而足之詞此事之必然無疑者也又曰永貞者二得坤貞亦屬臣道必如是而後吉以此享帝天亦降之福其益更不可勝言也傳曰自外來謂五也郭氏雍曰或益之人益之也十朋之龜弗克違鬼神益之也王用享于帝言天益之也天且弗違况于人與鬼神乎六三句益之句用凶事句无咎句有孚句中行告公句用圭王肅本圭字上有恒字謬傳益用凶事固有之也六三受益之位也故曰益之然危地也震極也故其用為凶事如水火眚囏之類及患難非常之事六三虚而能受上九應之不失其為益故无咎然曰凶事則國之大事矣未信而動可乎隂陽相含有中孚之象焉㢲在前也如是可以行矣中行行人之官也告公告行於公也用圭行人之幣也皆用凶事之所有事朱子語類益之用凶事猶書言用降我凶徳嘉績于朕邦蔡氏清曰當益之時概當得益而居下之上乃危地也故為益之以凶事之象雖凶事亦益之也所謂苦其心志行拂亂其所為動心忍性曾益所不能也六四句中行告公句從句利用為依遷國傳告公從以益志也中行告公因上文而言從者㢲初近五又有初九之應也利用為依遷國因初九之應利用為大作而言六四承五志在益下念切民依遷國大事詢謀僉同此其所以利也程傳曰自古國邑民不安其居則遷遷者順下而動也九五句有孚惠心句勿問句元吉句有孚句惠我徳傳有孚惠心勿問之矣惠我徳大得志也五陽剛得中居尊益下之主六二以中正弗違者應之隂陽相得孚甚矣惠者益之實心者惠之本孚惠心惠由於其心也勿問無計功謀利之見益道之大善也惠我徳由我出之人皆利之也有孚惠者其心自勿問而元吉然有孚惠如是人亦徳我自然之應也吕氏祖謙曰人君但誠心惠民不須問民之感如此然後元吉民皆交孚而惠君之徳也苟惠民而先問民之感不感是計功謀利非誠心惠民者也安能使民之樂應乎上九句莫益之句或擊之句立心勿恒句凶傳莫益之偏辭也或擊之自外來也繋辭子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶以陽剛而居益之極極則益盡而不可復益矣不但莫益之也且或將擊之矣所以然者益之為道日進无疆與時偕行而上九器盈不可復益已失其道是其心之不恒取敗之道也故凶夬句揚于王庭句孚號有厲句告自邑句不利即戎句利有攸往傳夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也大象澤上于天夬君子以施禄及下居徳則忌繋辭上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬序卦益而不已必決故受之以夬夬者決也雜卦夬決也剛決柔也君子道長小人道消也五陽一隂與姤覆推當剛長之時而一柔掩于其上勢在必決者也故名夬上切近五而乘之以柔聲其罪而去之可也故曰揚于王庭五剛相連是衆孚而羣號也亦共危之也而相示以為不可忽孚號之心也故傳曰其危乃光是以先治其内而後可以攘外邑近邑也告謀議周詳訓飭愼宻也隂敢自肆而驟以武勇勝之彼將大逞其技以為亂所傷者必多矣故不利即戎而惟是羣陽以漸而進則衆正滿朝隂邪自消矣卦之為徳内健外説即為去惡之道也先儒孚號斷句有厲又句是孚號而有厲矣非也有厲即孚號之心也傳所謂其危乃光也胡氏炳文曰以五陽去一隂而彖為警戒危懼之辭不一葢必揚于王庭使小人之罪明以至誠呼號其衆使君子之類合不可以小人之衰而遂其肆也有危道焉不可以君子之盛而事威武也有自治之道焉復利往往而為臨為泰為夬也夬利往往而為乾也葢隂之勢雖㣲蔓或可滋窮而為敵君子固無時不戒懼尤不可于小人道衰之時忘戒懼也初九句壯于前趾句往不勝句為咎趾荀氏作止傳不勝而往咎也當夬之初任壯而動非孚號有厲之心也前趾謂初體剛而動故壯壯于前趾則竟往矣往必不勝不勝則小人得志而君子之勢失其過不可補矣故為咎蘇氏軾曰大壯之長則為夬故夬之初九與大壯之初九無異朱子語類曰壯于前趾與大壯初爻同此卦大率似大壯只爭一畫九二句惕句號句莫夜有戎勿恤惕苟爽翟元俱作錫謬傳有戎勿恤得中道也惕内敬號外誡彖所謂孚號有厲者也九二剛而得中夬之善道故與彖辭同莫夜有戎隂警也恤憂也勿憂素備無虞也此則彖所謂其危乃光者矣張子曰警懼申號能孚號而有厲也以必勝之剛決至危之柔能自危厲雖有戎何恤九三句壯于頄句有凶句君子夬夬句獨行遇雨若濡有愠句无咎頄鄭元作䪻云夾面也蜀才作讐字聲之誤明張氏晉王本作尻後人謬改傳君子夬夬終无咎也九三當剛勝之時居偏危之地恐其過也而上六正應隂陽相合疑于汚也故分别言之以盡其情以善其道頄音逵顴也壯于頄猶言發怒見于詞色者也衆剛同欲決隂而上六正應反若引以為援能無怒乎怒則過矣非決而和之道凶也君子處此惟有夬之又夬不為六移應與之間雖獨有因縁而當之若凂獨行遇雨而身已若濡但愠于心而不遽形于色則孚號有厲夬而和者即在是吾志已定小人終去可補過矣故无咎王允之于董卓温嶠之于王敦事有類此者辭之分别爻情本自較然而先儒以為差錯胡安定移其文曰壯于頄有凶獨行遇雨若濡有愠君子夬夬无咎程子移其文曰壯于頄征凶獨行遇雨君子夬夬若濡有愠无咎皆不安葢未嘗將壯頄有愠分别本爻應爻而深玩之也陸氏希聲曰當君子之世而應小人故外有沾汚之累内有愠恨之心然後獲无咎者志有存焉九四句臀无膚句其行次且句牽羊句悔亡句聞言不信次説文及鄭本俱作趑一作􅯓且馬云助語一作趄李鼎祚作趑趄牽子夏傳作掔傳其行次且位不當也聞言不信聰不明也兑上體之下而居後故為臀變坎則䧟故无膚次且與趑趄同九四當羣剛決柔之際而剛在兊悦之初懷疑不進悔之道也兊為羊牽制也牽制于兊不變為坎可以亡悔不失為夬而兑變坎為耳為聞言其位不中不正則内無所主故為不信乾為言告自邑者也九四雖近而聞之而柔靡居心面從而實背之此行所以次且也利有攸往而不能往也此君子中之小人視九三之夬夬者逺矣當夬之時其何恃哉方氏疑本義讓羊使前而隨其後則羊乃衆君子之象而以謂就兑羊之象言之則羊還是九四是矣至謂羊性善觸不至羸角不已聖人敎以自牽其羊抑其很性可以亡悔亦壯頄有凶之意則與傳所謂位不當者不合聞言不信雖分釋而位不當則本爻之大旨也九五句莧陸夬夬句中行无咎陸蜀才作睦誤傳中行无咎中未光也莧陸二草名朱子語類曰莧陸是兩物莧者馬齒莧陸者草陸一名商陸者是也二草繁生以喻小人之滋蔓九五切近上六為夬之主故夬之又夬然懼其過也而九五中正故因其廹而怒之深勿以其細而發之易斯揚于王庭孚號有厲之心行之得中故无咎彖傳曰其危乃光也本爻傳曰中未光謂中之夬夬有輕視上六之志必不過激而後可以无咎也三應六故重夬夬五近六故重中行觀傳發明可見上六句无號句終有凶傳无號之凶終不可長也夬已盡矣隂至消極可無所用其孚號矣然隂之端倪結于兊體因其柔説而忽之將有破裂而不可收者故凶傳曰終不可長文義甚明猶然其危乃光之意也兊説六柔無號矣凶之道也本義謂小人居窮極之時黨類已盡無所呼號終必有凶程傳謂无用號咷畏懼終必有凶蔣氏悌生謂傳義似為小人謀俱未解傳意姤句女壯句勿用取女姤鄭本作遘馮椅云王洙改今文為姤毛西河云雜卦傳石經亦作遘張氏明晉王本作媾義同取陸徳明作娶又郭京本無女字俱妄改傳姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉大象天下有風姤后以施命誥四方序卦決必有所遇故受之以姤姤者遇也雜卦姤遇也柔遇剛也一隂五陽夬之覆推不期而會曰遇姤之為遇羣剛之下柔忽然來也柔之初進其幾甚㣲然浸長之勢從此而始是隂為之主以此取女未必能貞為其近羣陽而㢲以入之也㢲長女亦壯之象幽王之得褒姒髙宗之立昭儀明皇之立貴妃歴代女禍皆不謹始之貽不爽之應馮氏椅曰古文姤作遘遇也亦婚媾也以女遇男為象王洙易改為今文為姤雜卦猶是古文鄭本同按今文先於古文改遘誤也姤雖今文實則初本初六句繫于金柅句貞吉句有攸往見凶句羸豕孚蹢躅柅子夏傳作鑈蒼頡篇作檷王肅本作柅蜀才本作尼俱誤傳繫于金柅柔道牽也金柅本義謂所以止車以金為之來氏謂柅者収絲之具金者篗上之孔毛西河謂金柅弱木實如黎而黄未見定義然朱子本程傳程傳本漢儒舊解義較長仍從之柅以止車而繫之則不行可知初六一隂而遇羣陽在方進之時猶可及止也止則不自失其身貞道也故吉不然貪于所遇而有所往則喪其所守女禍滋張必見凶矣如羸豕之初孚而蹢躅跳擾也夫狐媚惑人入宫見疾可醜之態其端已露可不謹哉九二句包有魚句无咎句不利賔包荀爽本作肥明晉王本作庖俱非傳包有魚義不及賔也初姤之主質隂下翔魚象也九二切近相比所居得中足以制初故曰包有魚包而有之其義専一不可有二是故初與四應則四固賔也而二以比近相遇物有所主故无與于賓若四起而爭之則犯義矣其何利哉李氏開曰剝之貫魚姤之包有魚皆能制隂者也胡氏炳文曰包如包苴之包容之于内而制之使不得逸于外也九三句臀无膚句其行次且句厲句无大咎傳其行次且行未牽也三在下體之上亦臀也姤三即夬四故辭略同而彼以位言此以勢言貪初柔之遇而二間之次且欲進至於危厲剛動之故也然剛居下體不牽連于四不應于初終不犯體仍無大咎則又其位之善于夬四者矣九四句包无魚句起凶傳无魚之凶逺民也四與初為正應當遇者也而已遇于二矣是初隂本已所當有之物而不為己有則其居于四也僅擁虚位而于正應也亦抱虚名論隂陽之義則如夫之不能有其婦論上下尊卑之分則如君之不能有其民其事已出常情之外其變必在蕭牆之内凶雖未見然由此而起矣隂陽之禍非一朝一夕之故也或曰魚之无非四之罪然四之所以遇此者槩可知也且四終不能忘情于初也欲无凶得乎九五句以杞包𤓰句含章句有隕自天以子夏傳作作郭京作似包子夏傳作匏俱謬傳九五含章中正也有隕自天志不舍命也陽剛居尊得中而正制姤之主又于初隂不比不應其下視之如杞之髙而下以包𤓰絶不相與者然而變而為雜有文明之象故曰含章以至尊之位中正之徳不邇不殖天徳内藴則制隂之任在已所謂勿用取女者天運可自我回也至姤轉為復雖曰天命豈非人事哉傳曰志不舍命亦于其中正而知之也上九句姤其角句吝句无咎傳姤其角上窮吝也姤者一隂之生也九二而外諸陽之所忌無取乎遇也九三為二所間不相遇也故厲而无咎上九則其去初隂為益逺矣尚何咎哉但感遇者又忌其窮九以剛居上堅不可移物之角象之是終不求遇者亦終無所遇矣人至于無所遇遺世違衆行何之乎吝矣徐氏幾曰上九處姤之窮與初無遇雖吝亦无咎隂不必遇也萃句亨句王假有廟句利見大人句亨句利貞句用大牲吉句利有攸往項氏安世曰卦名下元無亨字獨王肅有王弼遂用其説孔子彖辭初不及此字按馬鄭註虞本俱無此字傳萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣大象澤上于地萃君子以除戎器戒不虞序卦物相遇而後聚故受之以萃萃者聚也雜卦萃聚而升不來也二陽四隂與升覆推與比相似六十四卦中二陽相連者五小過在互中名義故别至二陽在初二曰臨二陽在二三曰升名相近似至二陽在四五曰萃二陽在五上曰觀名既相近而觀之彖曰盥而不薦萃之彖曰王假有廟皆以祭起義葢艮為宗廟兊為巫坤為衆為土而陽涖于五上故曰觀上有一隂以二陽在坤上而中含故曰萃凡觀之盛莫盛於灌將之際萃之䖍莫䖍於假廟之日以萃言之坤順兊説五剛得中有應于下萃之實也王者合萬國以享先至順且説精之所萃昭格誠至坤户兊巫有廟象焉故曰王假有廟九五位尊大人也九四相比羣隂相協而應故利見孝治天下君臣皆會典也禮也故亨且貞大祭必用牢故用大牲又坤為牛亦牲象坤順應五故利有攸往物之所聚即情之所向天地萬物無有二致趙氏汝騰曰陽居五而五隂從之為比陽居五與四而四隂從之為萃二卦相似然比者衆隂始附之初聖人作而萬物睹之時也萃者二陽相比羣萃而歸之君臣同徳萬物盛多之時也何氏楷曰用大牲吉承王假有廟言利有攸往承利見大人言初六句有孚不終句乃亂乃萃句若號句一握為笑句勿恤句往无咎握傅氏作渥鄭氏亦讀屋傳乃亂乃萃其志亂也初也而慮其不終以四五皆隂之萃也視比之一陽當五終來有他吉者異矣將萃四乎而五為萃主將萃五乎而四為正應雖孚于四而其志亂矣則甚矣專一之為貴也若專號乎五則一握手而為笑矣勿徒憂恤惟往萃五斯无咎耳如是者所以定志也言此以足亂萃之意玩傳可見錢氏曰萃與比同所異者多九四一陽耳比初無應曰有孚者一于五也萃初與四應曰有孚不終者有二陽焉不終于四也及此時而號以求萃可以破涕為笑同人先號咷而後笑者是也六二句引吉无咎句孚乃利用禴禴蜀才作躍劉瓛作俱謬傳引吉无咎中未變也六二中正應五當翕萃之時有汲引之吉故无過咎其所為萃者二五相孚皆以樸誠無事繁文故利用禴禴祭之薄者是彖所謂利見大人亨利貞也王氏家傳曰彖以用大牲為吉而六二以用禴為利何也備物者王者所以隨其時有孚者人臣所以通乎上六三句萃如嗟如句无攸利句往无咎小吝傳往无咎上㢲也六三隂柔不中與二陽相承固萃如矣而上與五隔夫萃之主則又嗟如與利見大人者異矣然而上承九四可因以萃五故无咎其无咎之嗟亦小吝耳无咎是本分嗟如小吝是餘意玩傳可見吳氏澄曰與二隂萃于下而上無應故嗟嘆不得志雖無應而近九四之陽苟能往而上求九四之陽則可无咎九四句大吉无咎傳大吉无咎位不當也九四不中近五比隂是大臣之近君得衆者危地也危事也在此位者非合羣下以奉一尊之大善難當此萃矣傳曰不當位非君位也處萃之難地也項氏安世曰無尊位而得衆心故必大吉而後可以无咎胡氏炳文曰比卦五隂皆比五之一陽萃四隂皆萃五與四而五曰萃有位以見四之萃非有位也無尊位而得衆心非大吉安得无咎九五句萃有位句无咎句匪孚句元永貞句悔亡傳萃有位志未光也有位九五也萃所當萃也匪孚九四也各有所萃也貞正也五正其位四不能分也彖所謂亨利貞也萃二陽上一隂而下四隂轉若四之萃者多也故傳曰未光來氏知徳曰九五當天下之尊為萃之主臣民皆萃可以无咎矣然四分其萃未免匪孚上溺隂私未免有悔故必反已自修俾元善中正之徳長永貞固斯悔亡而人孚矣上六句齎咨涕洟无咎咨虞翻李鼎祚俱作資又曰咨同俱誤傳齎咨涕洟未安上也上六萃之極不得萃矣四方歸附而一人向隅能無泣乎其臲卼不安形為齎咨至于涕洟怨艾之深尚可免咎視比之後夫又稍異矣升句元亨句用見大人勿恤句南征吉升鄭作昇傳柔以時升㢲而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也大象地中生木升君子以順徳積小以髙大序卦聚而上者謂之升故受之以升四隂二陽萃之覆推萃坤下兑上而此則坤上㢲下六得進而居五衆隂因風而上故名升内㢲而外順九二得中六五應之攸此合徳而上下相須大亨之道也以剛中之徳遇虚中之主見且恨晚何恤之有征行也由㢲而坤皆行南方升象在焉行之而順志无不得故吉初六句允升句大吉傳允升大吉上合志也允信也柔以時升坤也初六柔爻與坤同體坤之所以升即初之所以升也上與四合即與坤之全體俱合其心甚孚故曰允方升之初志可知矣大吉之道也來氏知徳曰本卦原是坤土上升初與四皆坤故允升九二句孚句乃利用禴句无咎傳九二之孚有喜也剛健得中上應六五之主此彖所謂剛中而應者相信之深不假外物語曰苟有明信要之以禮澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡􅚚之器潢汙行潦之水可以薦於神明可以羞於王公則利用禴之謂矣何咎之有傳曰有喜益知其无咎矣禴時享祭之薄者祭薄而誠至也㢲為臭上與五孚有升歆之象故以杞言詩曰上帝居歆胡臭亶時毛西河譏禴為薄祭之無理然以東鄰殺牛不如西鄰之禴祭實受其福觀之則禴之為薄祭亦明矣以時享視郊禘故薄也九三句升虚邑傳升虚邑無所疑也上坤有城邑之象陽實隂虚坤純隂故曰虚邑九三當上升之際以剛正之才臨至順之境一往莫禦傳曰无疑亦卦情也六四句王用亨于岐山吉无咎亨享通傳王用亨于岐山順事也柔以時升五其主也四近五疑于廹矣而以六居之則在坤體柔順之初不為躁進有土者祀其所祀而神明享文王三分有二以服事殷祀其封内用此道也順之至也故傳曰順事六五句貞句吉句升階傳貞吉升階大得志也六五當升之時居尊位以柔中之徳下應九二其升甚大而從容有序彖所謂柔以時升者也貞正也即中正而應也吉之道也階拾級而登順且易也故曰升階熊氏良輔曰以順而升如歴階然上六句𡨕升句利于不息之貞傳𡨕升在上消不富也𡨕昧也上六隂昧升已極矣而猶不知止故曰𡨕不息之貞止也消退而不敢據也坤變艮則止矣此與豫上正同彼樂極而不知返此進極而不知退故皆曰𡨕彼變離為明故有渝而无咎者此變艮為止故利于不息之貞又與晉上之義通彼當晉極之剛故曰角此當升極之柔故曰𡨕然皆有不己之心可以自治彼剛故維用伐邑此柔故利于不息之貞石氏介曰已在升極是昧于進升之理若能知時消息但自消退不更求進乃利也困句亨句貞句大人吉句无咎句有言不信傳困剛揜也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也大象澤无水困君子以致命遂志繫辭困徳之辨也困窮而通困以寡怨序卦升而不已必困故受之以困三隂三陽與井覆推坎剛而兊柔二五剛而三上柔皆壓乎剛而不得舒傳曰剛揜而困之名義顯矣坎險兑説有可亨之理以九二九五之剛中也貞也大人也吉之道也又言无咎者以當困之時似不免咎矣而剛中貞吉實所以亨困之道故无咎然而兑説于外言語之象柔美無實失所為貞無可亨之道矣故曰尚口乃窮初六句臀困于株木句入于幽谷句三歳不覿木陸徳明作术謬傳入于幽谷幽不明也困而在于初初而又為六是困之最深而隂暗之至不能自振者也株木身猶言椿木如所謂株守者也凡人坐則臀居下臀困子株木則坐困之象也幽谷隂僻之地坎象也坎初六曰入于坎窞是矣三歳不覿困之久而不可見也離為明坎者離之反故傳曰不明葢愚陋之甚所以坐困之深也九二句困于酒食朱紱方來利用享祀句征凶句无咎紱鄭作韍傳困于酒食中有慶也本爻剛而得中與五同徳貞也有大人之吉者然身在困中惟安於日用之常且飲且食所謂困而不失其所者至於九五同志則誠而奉之可也貞吉之理也亨矣不然處困之時而急急于征行則失所為貞故凶謂有中徳而知悔僅可无咎而已困于酒食與征字對貞與不貞之别也朱紱方來利用享杞九五應而九二從也凶无咎拂九五之剛中而二當補過也六三句困于石句據于蒺藜句入于其宫不見其妻句凶傳據于蒺藜乘剛也入于其宫不見其妻不祥也繋辭易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪隂極乘剛石也困而不可轉也本為揜剛之主據非其地而邪不敵正側足切膚如負芒刺又終不能自脱至于死而後已凶之甚也困人者之自困如此初六坐困不覿而止六三則妄行而困傷于外者必反其家而剛柔相悖非其妻矣家將安歸九四句來徐徐困于金車吝句有終徐徐子夏傳作荼荼翟元本同王肅本作余余傳來徐徐志在下也雖不當位有與也自内而外曰往自外而内曰來九四以初六為正應隂陽相得志之所在故徐徐而來而體剛不中際困之位乘坎車之上不免于困也故吝然九五剛中亨困之主地分親切君臣相與以漸而合故有終蓋困之所以亨惟剛中為能有之大人之吉九二有焉四亦近之九五句劓刖困于赤紱句乃徐有説句利用祭祀劓荀爽王肅陸績本俱作臲刖荀陸王俱作􅑶京房本作劊鄭云劓刖當作倪㐳無據祭陸作享亦無據傳劓刖志未得也乃徐有説以中直也利用祭祀受福也截鼻曰劓去足曰刖上下皆柔揜乎剛者齷齪刑餘之人也赤紱貴者之服即九二方來之朱紱謂九五也以剛中之尊而上有上六下有六四為其所揜是以小人而困君子其初必有不遂之志至以中體觀之則兑本從容和説而剛中之徳誠敬之至足以交於神明而况于人乎九二同徳必同志矣此困之所以亨也貞也大人之吉也誠以奉祭祀而實用祭祀之誠以用人也祭天神祀地示尊者之事故屬五享人鬼臣下之事故屬二上六句困于葛藟句于臲卼曰動悔句有悔征句吉臲説文作㓷薛本同卼説文作􅝨薛本作杌傳困于葛藟未當也動悔有悔吉行也葛纒累之物藟亦葛類上六隂柔揜剛而處困終似之困人者人恒困之而况九五乎况當困之已極乎于此而危促不安曰動輒得悔此固困于葛藟之時之心緒也然當此困之已極而猶不知變計則甘受撓累何能出困惟其有悔心而即決然以行則困極而亨此其時也故吉上六變乾健行者也故曰征征則出困矣九二征凶而此征吉何也曰彼亨困貴貞而此出困尚變也或曰動悔有悔吉傳連而分句不連何也曰動悔連于臲卼有悔連征吉字故另解其意曰行也是省括之句也井句改邑不改井无喪无得往來井井句汔至句亦未繘井羸其瓶句凶羸蜀才作累傳㢲乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也大象木上有水井君子以勞民勸相繋辭井徳之地也井居其所而遷井以辨義序卦困于上者必反乎下故受之以井雜卦井通而困相遇也困之覆推兑反為㢲而來坎下坎往而居㢲上是㢲下入而水上行有井象焉卦之所以名也夫古之耕田而食者皆鑿井而飲是以八家為井四井為邑皆養道也然雨公之奉不皆世及邑可改也而鄉田同井則仍不改其間之鑿井而飲者无所喪也亦無所得葢有定分矣二五兩爻上下反易而剛中不易君子之不失其守似之夫分定者用亦不窮是以往來者皆井其井而資之以不匱由五之井洌至六之井収勿幕有孚是矣則井養之成矣若幾至于泉而井亦未可繘則功有不到終至于羸其瓶是失其所養歸于自棄又不僅井泥井谷而已凶之道也養之為道豈可苟焉已哉不從鑿井而飲井四為邑觀之則井邑之改不改及无得无喪與爻辭之舊井无禽大象之勞民勸相皆懸宕無著先儒亦多忽過初六句井泥不食句舊井无禽傳井泥不食下也舊井无禽時舎也泥汙塞也水泉不通也不食不可食也井曷為乎泥也舊井也廢棄之地也古者田賦出車蒐苖獮狩必獲禽馬井廢則田廢故无禽也是田賦所不到故泥也所以然者何也爻在本卦之下不能上行者也九二句井谷句射鮒句甕敝漏射荀作耶訛甕説文作罋鄭作瓦傳井谷射鮒无與也谷竅也井有谷則出于泥矣然非八家所往來也惟射鮒而已鮒魚之小者莊子所謂周視轍中有鮒魚者也今谿壑之間有小魚往來若織者即射鮒矣其水甚淺雖異于泥然欲汲而不可得也甕更敝且漏矣欲汲而无其具也九二雖剛中而尚在井下與五之寒泉不應汲引之所不及故傳曰无與九三句井渫不食句為我心惻句可用汲句王明句並受其福傳井渫不食行惻也求王明受福也九三承坎離乎谷矣故渫潔可食此而不食則行者惜之上坎下㢲水木相接之際正汲象也故可用汲國家之汲引人才視此矣上方虚己以接下王之明也下亦實以承上臣之願也亦社稷之福也九三六四相須之理也蔡氏清曰為我心惻我指旁人所謂行惻也非指九三自惻也可用汲帶連王明並受其福皆惻之之辭也六四句井甃句无咎傳井甃无咎修井也四居三五之間下有渫井上有洌泉無以蓄之則渫者谷且泥矣不能成洌泉之功故修之而不使汨于泥不致洩于谷泉之洌者賴之矣惟無應與故不言汲然不害其為自修之道也故无咎來氏知徳曰六四隂柔得正近九五之君葢修治其井以瀦蓄九五之寒泉者也占者能修治臣下之職則可以因君而成濟物之功斯无咎矣九五句井洌句寒泉句食傳寒泉之食以中正也洌清也井之色寒泉泉寒而甘美也井之味食飲也九五陽剛而中正正坎之中滿故其色清洌其味甘寒其質則泉也稼穡作甘皆賴乎此此同井者所共食也内養充裕足以濟物者也上六句井收勿幕句有孚句元吉收荀作甃誤勿于寶作罔傳元吉在上大成也收取也幕揜葢也井以上出為功水以流通為利彖曰㢲乎水而上水井至於上則井成矣收而勿幕取之無禁也彖所謂往來井井也孚信也六比于五實有泉源如期而至猶潮汐之言信潮也彖所謂養而不窮者也如此而後完井之量故辭曰元吉傳曰大成李氏過曰初井泥二井谷皆廢井也三井渫則渫初之泥四井甃則甃二之谷既渫且甃井道全矣故五井洌而寒泉上井収而勿幕功始及物而井道大成矣革句已日乃孚句元句亨句利句貞句悔亡傳革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉大象澤中有火革君子以治歴明時序卦井道不可以不革故受之以革雜卦革去故也四陽二隂鼎之覆推暌之同體澤火有相滅之質兑離有異配之志革之所以名也己巳然也天下事害不什不變法必見其害之已然然後人信之而不疑十干甲首也庚更也是故蠱方有事則曰先甲三日後甲三日而傳曰終則有始㢲以申命則曰先庚三日後庚三日而傳曰無初有終此當改革之日如日自甲而已當庚之際故曰已日乃孚而傳曰革而信之也數以五而一變至已則革之時矣舉當其時離明兑説二五中正而應孚可知矣此大善亨通而利且貞之道也革無不當悔之所以亡也以革之理言則天地四時其大者也以革之事言則湯武革命其大者也傳故特表之李氏簡曰已日者已可革之時也先時而革則人疑而罔孚故已日乃孚何氏楷曰已日即六二所謂已日也乃孚即九三九四九五所謂有孚也悔亡即九四所謂悔亡也所以云已日者變革天下之事不當輕遽乃能孚信于人乃難辭也下三爻方欲革故而為新故有謹重而不輕革之意上三爻則故者已革而為新矣九四當上下卦之交正改命之時故悔亡獨于九四見之即彖卦所謂革而當其悔乃亾也初九句鞏用黄牛之革傳鞏用黄牛不可以有為也革不可以輕試也當其初尚非可革之時堅其所守慎而不發可也黃牛之革物之堅者借象也九之剛正似之離為牛色黄故曰黃牛毛西河謂獸有皮而改去其毛因以名革按此則書稱希革毛毨為革字之通義黃牛之革當對虎變豹變看劉氏牧曰下非可革之位初非可革之時要在固守中順之道而不敢有革也龔氏煥曰易言黃牛之革者二遯之六二居中有應欲遯而不可遯者也革之初九在下無應當革而不可革者也六二句已日乃革之句征吉句无咎傳已日革之行有嘉也彖曰已日乃孚則已日固當革之矣六二中正有慶文明為體有革之才草之徳而主之者五也與為正應又以柔順當之則不敢自専固其分也然剛正之主在上乘已日之有孚時乎時乎不可失也由是出而從君撥亂世而反之正有相得益彰之美吉可知矣何咎之有傳曰行有嘉征吉之謂也不征則失革之時矣此二五之分也九三句征凶句貞厲句革言三就句有孚傳革言三就又何之矣剛而不中居革之介自用自専非喜事則徑情也革太驟而害隨之故征凶三危地也實危道也九四九五之所不與也苐有應于上兊口相孚革有成言至于三焉因以通五庶幾乎无妄爾傳曰又何之言不以疾征而致凶也言有孚而已匪征也非已日之孚也先儒謂此亦有孚而可革非也革必四五而後可也觀四之有孚改命可見九四句悔亡有孚句改命吉傳改命之吉信志也水火既已相接則革之事行矣命令也如湯武之作誓作誥也九四剛而能下又近乎五當革之際方將創制顯庸與天下一變為新不得不革之時也而革之為事出于非常疑有悔矣然以義制事即事以義起是革而當其悔乃亡也故曰悔亡是其革非私也是其命非美言小數也作新斯民天下信之故曰有孚悔亡而有孚然後可以改命也不然非有公天下之志而遽然改命四豈無慚徳乎傳曰信志從悔亡有孚而知之也以四之能承五也九五句大人虎變句未占有孚傳大人虎變其文炳也九五陽剛中正而居尊位為革命之主中天下定四海禮樂法度煥然一新本義所謂自新新民之極順天應人之時是也彖曰已日乃革之傳曰革而信之五之與二剛柔相應孚之至者可以不言而信也故曰未占有孚見之者曰帝王自有真也聞之者曰天下自此太平矣其亦未占有孚之謂乎九五得乾之一體有利見大人之象而兊為卦體位在西方其宿稱虎故不曰龍而曰虎乾徳健舉故曰飛革道武成故曰變虎之變也莫如秋兊正秋也鳥獸毛毨光潔鮮明而虎可知矣傳稱其文威徳寓焉其次于聖作而物睹者乎上六句君子豹變句小人革面句征凶句居貞吉傳君子豹變其文蔚也小人革面順以從君也上六柔順在外當革之既成内有剛正之主俯而從之方宣力而効忠亦敷文而演武依日月之光見名聲之爛葢輔大人以成其革者故稱君子亦勷文治以光其革者故曰豹變豹虎類也而虎則獸之王也當虎變之時君子固豹變而興矣其在小人睹作新之化亦相視而喜向之面從者至是且革面矣是天下所歸往也革成而復他往則自外于大人之世矣故凶惟居貞得柔順之正亦從君之道故吉龔氏煥文曰九三與上六皆曰征凶而有貞厲貞吉之殊者三之征凶戒其不可妄動也上之征凶謂事之已革者不可復變也三當革而未革故守貞則厲上已革而當守故居貞則吉三革道未成上革道已成故也鼎句元吉句亨毛西河曰程傳以吉字作羨文本義作衍文皆無據而元吳澄本明季本本竞從而刪之何其妄也傳鼎象也以木㢲火亨餁也聖人亨以享上帝而大亨以養聖賢㢲而耳目聰明柔進而上行得中而應乎剛是以元亨大象木上有火鼎君子以正位凝命序卦革物者莫若鼎故受之以鼎雜卦鼎取新也革之覆推革内之離往外六二上行而居五革外之兊來内為㢲九二之剛與六五應而皆有中徳㢲順離明兩相為用是元善且吉而亨通之理也又水風為井而火風為鼎取象甚類其義亦皆言養也然井養者民而鼎養者貴其用又有大焉者傳故以享帝養賢實之并及兩體而著其徳之實焉初六句鼎顛趾句利出否句得妾句以其子句无咎傳鼎顛趾未悖也利出否以從貴也顛倒也趾下也初在鼎下六動為用故曰顛趾鼎自革來初當革故鼎新之始而二為鼎實初虚而就實亦去故取新之象故利出否否宿穢也凡有事于鼎者初必洗鼎亦其事也上離下㢲皆女而六五位尊初六位卑以六五而視初六則初固妾矣以其子以其能生子也九二者六五之正應而初六承之隂陽相與有生育之理焉妾能生子則母以子貴不害其為陽也故无咎以其子與利出否對其義亦同出否傳曰以從貴也而得妾以其子不復釋者亦以其從貴也以初六九二有生新之理也先儒俱謂以其子為應四尚未知誰之為妾誰之為貴也九二句鼎有實句我仇句有疾不我能即句吉傳鼎有實慎所之也我仇有疾終无尤也陽實隂虚九二居鼎之中則鼎之實矣有能有其實也詩曰㫖且有是也中也鼎之主也仇匹也謂六五也詩曰公侯好仇又君子好逑傳曰逑與仇同則不必其為怨耦也六五者九二之正應是固其匹矣而下乘初六若有嫉妬之象焉而九二得中六五正應不昵于初莫得而疾之故曰不我能即並妻匹嫡之禍所由逺也故吉先儒皆以仇為怨耦故謂初為仇而所謂疾與不能即者皆空泛無著且不知二之守正者何在也傳之所謂終无尤者亦不知其何故也胡氏炳文曰鼎諸爻與井相似井以陽剛為泉鼎以陽剛為實井二無應故其功終不上行鼎二有應而能以剛中自守故吉九三句鼎耳革句其行塞句雉膏不食句方雨虧句悔句終吉傳鼎耳革失其義也三當木火相接之際鼎革互換之位以九居之過剛失中如鼎之方中而耳忽革又無應與上下不屬舉莫能勝故其行塞六二離明鼎中之腴也而隔四不遇離為雉六柔為膏故曰雉膏不食夫雉膏之美鼎所自有也而以耳革行塞失之是自有而自失之也悔矣然離明在上而光不到虧也至㢲變為坎則雨矣坎以承離有水火相濟之理鼎之用也始雖有悔而終則吉葢所以救耳革之失也虧失也傳所謂失其義也方雨虧言虧在方雨之際也離不照也㢲變為坎則虧者滿矣言其失之可救也故申斷之曰悔終吉先儒以方雨虧悔為句來氏知徳以方雨為句虧悔又句俱未協胡氏炳文曰井鼎九三皆居下而未為時用井三如清潔之泉而不見食鼎三如鼎中有雉膏而不得以為人食然君子能為可食不能使人必食六五鼎耳三與五不相遇如鼎耳方變革而不可舉移故其行不通然五文明之主三上承文明之照以剛正自守五終當求之方且如隂陽和而為雨始雖有不遇之悔終當有相遇之吉井三所謂王明並受其福者亦猶是也六四句鼎折足句覆公餗句其形渥句凶形渥晁氏本作刑剭鄭氏本渥亦作剭傳覆公餗信如何也繋辭子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也剛而不中三陽重疊一隂居下不能相承折矣鼎實既滿勢重而力不能任覆矣四近君故曰公餗當尊而敗公自顧赧顔故形渥夫餗之覆四之剛重為之也繫辭所謂徳薄位尊知小謀大力小任重是也本傳所謂信如何者即所謂不度徳不量力也胡氏炳文曰初未有鼎實故因顛趾而出否四已有鼎實故折足而覆餗形渥舊有作刑剭解者釋文云剭重刑京房云刑在頄為剭又周禮司烜氏屋誅謂所殺不于市而以適甸師屋讀如其刑剭之剭此于爻義無所證而本文其形渥猶詩渥赭渥丹之類正徳薄位尊知小謀大力小任重者自愧之狀傳曰信如何亦形容之辭未嘗有刑辟之意朱氏震曰其形渥羞赧之象澤流被面沾濡其體也此為得之六五句鼎黃耳句金鉉句利貞傳鼎黃耳中以為實也黃耳中五之虚也金鉉貫上之剛也鼎至黃耳而金鉉則實在其中矣九二曰鼎有實本爻之傳曰中以為實意正相因利貞云者貞正也即中也六五柔中故利貞五與二應實其所自有也而必及金鉉者上九陽剛之助所以成鼎之功不可相離故也非正其能合乎鉉徐邈曰讀扄儀禮設扄鼏鄭元註今文扄為鉉陸徳明曰扄鼎扛也又公食大夫禮右人抽扄士虞禮左人抽扄註扄即鉉字西河易註曰儀禮謂之扄周禮謂之鼏攷鼏舊註云與扄同以木貫鼎从冂音同與鼏異正韻亦云鼏與扄同鼏與幂羃同各為音義然六書鼎部有鼏無鼏是扄鼏本二物二義而以為一音者誤也至扄之為鉉則無異義然扄無用金玉者或鉉即鼏而不必别為鼏歟以鼎之上觀之其象亦若鼏然上九句鼎玉鉉句大吉句无不利傳玉鉉在上剛柔節也鼎之為用主於調和若偏剛偏柔如五味之専一則失其節矣上九與六五相比既剛柔之得宜而九居六上又有剛而從柔之道是鼎之成也享上帝而養聖賢之寶器也以觀其上葢鉉而飾之以玉者然剛柔協而五味齊用之貴行之利故其占曰大吉无不利程子曰在上為鉉雖居无位之地實當用也與他卦異井亦然易氏袚曰鼎與井其用在五而其功皆在上井至上而後為元吉鼎至上而後為大吉皆所以全養人之利者也易翼宗卷五
