body:
  text: 易翼宗卷三湖北巡撫晏斯盛撰上經豫句利建侯行師傳豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉大象雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考繫辭重門擊柝以待暴客葢取諸豫序卦有大而能謙必豫故受之以豫雜卦豫怠謙之覆也一陽居四上下衆隂應之其志得行坤内震外坤順震動皆有悦樂之意故名曰豫震為長男能統衆隂坤為有土之象而長男為主與屯之初九同功故利建侯坤又為大衆之象而長子為帥羣隂統於一陽與師同功故利行師孔氏頴達曰動而衆悦故利建侯以順而動故可行師邱氏富曰屯有震無坤則言建侯而不言行師謙有坤無震則言行師而不言建侯此合震坤成卦故兼之初六句鳴豫句凶傳初六鳴豫志窮凶也當豫之初未豫也四為豫之主初與之應以豫為志者也鳴豫猶言鳴其得志也以隂柔不中之才未豫而遽以為豫極其豫之志將縱慾敗度矣豈能成豫凶之道也傳因鳴而知其志因志而知其窮窮也者極也如坤初履霜而知堅氷之至剥初剥足而知其蔑貞也王氏應麟曰鳴謙則吉鳴豫則凶鳴者心聲之發也龔氏煥曰豫之初六即謙上六之反對故謙上六曰鳴謙豫初六曰鳴豫謙之上六應九三故鳴謙豫之初六應九四故不勝其豫以自鳴謙而鳴則吉豫而鳴則凶六二句介于石句不終日句貞吉傳不終日貞吉以中正也繫辭子曰知幾其神乎君子上交不諂下交不凟其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望柔而得中特立于鳴豫盱豫之間不懐與安不比于邪介然自守坤厚之中得其堅確斷如石焉然其介也斷為之其明為之也見幾明故不俟終日其明且斷也皆中正之德為之故貞吉六三句盱豫句悔句遲句有悔傳盱豫有悔位不當也盱上視也四為豫之主六三隂柔不中上視乎四而溺于豫悔之道也然不但盱豫之為悔即稍遲焉不能如石之介不俟終日亦有悔也來氏知德曰盱與介相反遲與不終日相反九四句由豫句大有得由勿疑句朋盍簪傳由豫大有得志大行也四以一陽為衆隂之主動乎上順乎下時之所由以豫也以剛為主衆隂應之志無違逆彖傳所謂剛應而志行者也故爻曰大有得爻傳曰志大行也然爻雖剛而四多懼故戒曰勿疑勿疑而後爻之剛者足以統柔剛柔相與朋之義也朋謂五隂盍合也簪總髪器古人之冠上簪下纓鹽鐵論曰神禹治水遺簪不顧家語云孔子聞哭蓍簪皆此簪字合簪者言朋之聚也五隂同豫一陽也李白詩云京國會纓簪其即盍簪之謂乎六五句貞疾句恆不死傳六五貞疾乘剛也恆不死中未亡也隂柔居尊可以豫矣而下乘九四之剛中虚微弱勢逼難治如人之外感因以内傷不得自豫貞疾也然五猶得中根本未亡也故恆不死程傳曰居得君位貞也受制于下有疾苦也六五尊位權雖失而位未亡也上六句㝠豫句成句有渝无咎傳㝠豫在上何可長也上六豫之極以柔處之則昏㝠于豫者然物極則反事極悔生豫既極矣至于昏㝠無所復之得無悔心之萌乎悔而改之則生理仍在如盟言之已成有以改之斯可无咎渝改也鳴豫在初又應九四事雖未成而不可渝者也故凶冥豫在上下無應與事雖已成而尚有渝者也謀始慮終幾可不慎乎隨句元句亨句利句貞句无咎傳剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉大象澤中有雷隨君子以嚮晦入宴息繫辭服牛乘馬引重致逺以利天下葢取諸隨序卦豫必有隨故受之以隨雜卦隨无故也三隂三陽泰否之雜兑震艮巽反覆相推上兑下震蠱之覆也蠱艮巽二體陽上隂下覆而為隨兑震二體則蠱之二三上剛爻皆來随二三上柔爻之下是以陽隨隂也又蠱内體巽柔反為兑居隨之上而外體艮剛反為震來居兑柔之下亦以陽隨隂也陽隨隂則隂亦隨陽俱相隨之義也震動兑説又體與意之相隨者也故為隨己能隨物物來隨己彼此相從大通而利且正之道也所以无咎非元亨利貞則失隨之道未能无咎也何也隨也者與時宜之者也非詭隨所可託也初九句官有渝句貞句吉句出門交句有功傳官有渝從正吉也出門交有功不失也卦以剛隨柔為義初自蠱之上九來蠱上九曰不事王侯髙尚其事今來而下柔則改變其髙尚而隨乎時矣艮轉為震為長男又為隨主故曰官猶所謂心之官也六二得中初九從之以剛健之才而隨乎中正之二隨之善者貞也故吉以此出門交友即可有功何也不失其正也出門謂初交謂從二有功吉之一端也象本全吉不作戒辭六二句係小子句失丈夫傳係小子弗兼與也隨剛來下柔陽隨隂隂亦從陽也隂小陽大小子謂六三丈夫謂初九其勢從下而上初九剛明當隨者也而與六三同類比連牽係難斷若不斷而係乎三則失初矣欲二之專與初相隨也故聖傳曰弗兼與先儒以九五正應為丈夫初陽在下為小子然剛來下柔比次相隨五徃隨上不與二應非丈夫也且下文小子無下落六三句係丈夫句失小子句隨有求句得句利居貞傳係丈夫志舍下也丈夫九四也小子六二也四近剛正之君勢力有餘故隨之有求而即得但六三柔弱位不中正必居貞而後所隨者正故利居貞先儒以初為小子然初隔乎二無隨之義不闗得失傳曰志舍下二在三下也九四句隨有獲句貞凶句有孚在道以明句何咎傳隨有獲其義凶也有孚在道明功也九四比三逼五三隂爻民也下也為下所從得民之象四近君勢重豆區釡鍾得無疑乎正凶道也然九五剛中若有以孚其心而合于道則心迹以明率下奉上皆其功矣故无咎龔氏煥曰隨卦諸爻皆以隂陽相隨為義三四皆無正應相比而相隨者也然六三上而從陽理之正也九四下為隂從固守則凶若心所孚信在于道焉以明自處何咎之有徐氏幾曰六三九四相比相從三言有得者得乎四也四言有獲者獲乎三也九五句孚于嘉句吉傳孚于嘉吉位正中也陽剛得中而居尊一隂在上彼此誠孚隨之最善者故曰孚于嘉嘉善也其吉可知楊氏萬里曰九五以陽剛居兑之中正為一卦説隨之主此聖君至誠樂從天下之善者也吉孰大焉上六句拘係之句乃從維之句王用亨于西山傳拘係之上窮也隨極矣無復之矣九五得中誠孚而不可解惟退而隨五可耳上六賢也九五王也王祭封内山川西山文王之所有事也當其世周召望散舍王無復可隨惟文王誠意固結相與共奉山川之祀而已何氏訂詁曰兑為巫凡卦有兑者多取象祭祀如萃之王假有廟損之祀事遄徃困之利用祭祀升之王用亨于岐山是也蠱句元亨句利涉大川句先甲三日句後甲三日傳蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川徃有事也先甲三日後甲三日終則有始天行也大象山下有風蠱君子以振民育德序卦以喜随人者必有事故受之以蠱蠱者事也雜卦蠱則飭也隨之覆也震初剛上上二三柔在上之下而為艮兑上柔下下四五剛在初之上而為巽剛皆上行柔皆下行否之雜也隂陽不交也又震反為艮剛居上兑反為巽柔居下亦不交也否也柔巽而剛止弛散頺窳故名曰蠱蠱壊也亂極治生事理之必然元始也大也亨通也當蠱之際有必亨之理故元亨有必濟之事故利涉大川元亨以蠱之理言利涉大川以治蠱之事言皆視乎其謀始也甲十干之首先甲後甲事端之先後皆始事也始事之先有幾始事之後有宜先甲三日于始事之先而飭其幾也後甲三日于始事之後而飭其宜也天道循環無徃不復終則必有始時乎時乎不可失也馬氏融曰十日之中惟稱甲者甲為十日之首蠱為造事之端故舉初而明事始也程傳用此義本義據鄭元傳以先甲三日為辛後甲三日為丁失甲字即失始字義矣來氏據八卦流行圖云艮巽夾震木于東之中故曰先甲後甲更鑿而無當初六句幹父之蠱句有子句考无咎句厲句終吉傳幹父之蠱意承考也牆有幹版也井有幹轆轤也有扶持轉旋之義故曰幹初六在事之始能順乎剛有意扶持轉旋者也子賢矣記所謂幸哉有子也初六其蠱未深濟之尚易意在承考稍能幹旋考即无咎雖危亦終吉也隂爻稱父何也一家之事必有所禀命禀命之先者父也蠱之初家人禀命之最先故曰父之蠱也九二句幹母之蠱句不可貞傳幹母之蠱得中道也蠱當事之變故不可正九二才剛懼其固也然二猶得中上應六五不至於過多方以諭委曲以行蠱尚可濟也爻陽稱母何也居内之中所謂主中饋者母象也爻子也位母也故曰幹母之蠱傳曰得中道也九三句幹父之蠱句小有悔句无大咎傳幹父之蠱終无尤也三居内之上故亦曰父之蠱九三剛而不中故小有悔悔者剛之過而心不安也然當蠱之時惟剛能濟堅正强固之中皆起衰振敝之用故无大咎而聖傳且曰終无尤也以見蠱之非剛不濟也六四句裕父之蠱句徃見吝傳裕父之蠱徃未得也六四隂爻稱父何也外也一家之中位乎外者非父而何故四五隂爻皆稱父也當蠱之四蠱深矣四居蠱之中内外交接之地亦有治蠱之心而爻本隂象無能幹之才惟寛裕以處之蠱將日深欲治而未得故見吝有事之秋豈庸懦者所能與哉六五句幹父之蠱用譽傳幹父用譽承以德也外卦尊位父也其爻則子也六五柔而得中才堪濟事其德足以光昭前烈不僅如九三之專用其才幹蠱之最善者所謂元亨而天下治也趙氏汝楳曰六五德位適剛柔之中用以幹蠱宜有休譽用譽則蠱之亨可知鄭氏維嶽曰子有幹蠱之名則過歸於親幹蠱而親不失于令名是用譽以幹之也此爻正與九三六四對看九三過剛雖能幹蠱而小有悔六四過柔雖欲幹蠱而徃見吝皆德不足也惟六五柔中居尊徳器勝人故傳曰承以德譽者德之為也上九句不事王侯髙尚其事傳不事王侯志可則也蠱極矣無事矣其時也上逺矣事非其事矣其位也九以剛明之德居極逺之地置身事外故為不事王侯之象然非不能濟事而不事其事也獨行其志砥節勵操不降不屈孑然自髙超然最上其志也即其事也揚清風而化頑懦渺乎其可望而不可即也故傳曰志可則也五君位王侯也在五之外故不事王侯九剛明故其事髙尚臨句元亨利貞句至于八月有凶傳臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也大象澤上有地臨君子以教思无窮容保民无疆序卦有事而後可大故受之以臨臨者大也雜卦臨觀之義或與或求臨觀覆推泰否剥復之似陽下隂上將近乎泰猶未泰也已逾乎復浸進於剥矣陽主於進進而薄隂故名臨謂陽之臨於隂也陽大故泰彖曰大來臨序曰臨者大也兑説坤順九二剛中而六五正應陽氣通復天道之自然故元亨而利貞然隂陽之際隂雖正消而消不久至八月則四隂方盛而消者長矣八月雖猶是二陽而浸尋消之即至於剥矣此以大臨者不可不知也八月先儒有以自子至未為遯者謂建未為周正也毛西河以自丑至申為否謂二陽建丑為商正也然以隂陽消長之正觀之自寅至酉則臨觀剥復之漸其義較長且夏正自唐虞以來商周實通行之未嘗改也初九句咸臨句貞吉傳咸臨貞吉志行正也居臨之初與二相並而進臨乎四隂者故曰咸臨咸皆也共也位雖不中而陽剛方長與二相比故貞吉貞正也故傳曰志行正九二句咸臨句吉无不利傳咸臨吉无不利未順命也臨以陽進為義二陽相與其勢方長隂不能制六五雖尊而九二為臨之主匡弼惟己以道事君未嘗苟從故吉矣而又言无不利者以其正臨乎隂也非剛中之德得無未泰而遽否乎故又言无不利以别之而傳且明其未順命也對至于八月有凶而言也兑説坤順疑于順命也聖人之慮深矣六三句甘臨句无攸利句既憂之句无咎傳甘臨位不當也既憂之咎不長也六三隂暗當兑説坤順之間惟以柔順相乘兑為口善味坤稼穡作甘故曰甘臨臨甘則不斷不斷隂長何利之有宜其有咎矣然憂則不甘矣不甘則知悔悔而改之則咎不復長也六四句至臨句无咎傳至臨无咎位當也六四柔順上承六五内外相接地澤相比臨之至親者故曰至臨所以无咎鄭氏汝諧曰其位在上下之際臨之切至也凡上之臨下惟患其逺而不相通四既近于下其所處之位至當是以无咎六五句知臨句大君之宜句吉傳大君之宜行中之謂也臨以陽臨隂也而六五居尊中處虚明下應九二得臣之助不自用而取諸人此所以為大知也故曰知臨又曰大君之宜宜用中也本義曰以柔居中下應九二不自用而任人乃知之事而大君之宜吉之道也王氏申子曰中庸曰惟天下至聖為能聰明睿知足以有臨也故知臨為大君之宜六五以柔中之德任九二之賢不自用其知而兼衆知為知是宜為君而獲吉也上六句敦臨句吉句无咎傳敦臨之吉志在内也臨陽之進也凡臨之善皆以應陽上六居髙聽卑志乎初二坤艮皆土敦厚之象為敦厚乎臨者故吉而无咎程傳曰上六坤之極順之至也而居臨之終敦厚于臨也與初二雖非正應然大率隂求于陽又其至順故志在從乎二陽尊而應卑髙而從下尊賢取善敦厚之至也隂柔在上非能臨者宜有咎也以其敦厚于順剛是以吉而无咎六居臨之終而不取極義故止為敦厚義上无位之地止以在上言朱子語類曰上六敦臨自是積累至極處有敦篤之義艮上九亦謂之敦艮復上六爻不好了所以只于五爻謂之敦復觀句盥而不薦句有孚顒若觀本音毛氏竒齢曰古無四聲故漢易無音註不得分平去二音傳大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣大象風行地上觀先王以省方觀民設教序卦物大然後可觀故受之以觀雜卦臨觀之義或與或求盥王肅作觀毛氏竒齡曰盥祼通與郊特牲灌論語禘自既灌同馬鄭虞荀皆然又不薦王肅作觀薦毛氏曰爻中皆觀薦之文則不字本觀字之誤按盥灌通是也觀灌而觀薦非也不薦未薦也灌禮儀正盛之時在未薦之先誠敬之至孚于神明德容之著顒顒然共仰也借以為上下感格之象猶詩云奏假無言時靡有爭而中庸曰不賞而勸不怒而威也觀臨之反二陽在上大也故傳曰大觀在上坤順而巽九五中正居尊恭已南面而四隂在下順而承之上之端拱為天下觀故名曰觀觀之象如大祭然灌地降神之初未薦之時有孚而顒若則下之觀之者自化若是者何也皆以神用也天道之神顯于上而四時不􅑯者即聖道之神動于上而下民服也所以下觀而化也觀之體用如是觀四隂二陽疑于隂長而陽消矣不取此義者不與臨之八月有凶同義也陽上隂下疑于不交而否矣不慮其否者巽正交而九五之德盛矣初六句童觀句小人无咎句君子吝傳初六童觀小人道也隂柔居初童穉之象以下觀上五隔三隂所見甚少如童穉無知故曰童觀然百姓日用而不知可也君子不知其大者逺者而可乎君子無所知則寡昧矣羞也六二句闚觀句利女貞傳闚觀女貞亦可醜也觀者顯示之象必親見而後能感九五在上以近為光二雖中正然體居乎内晦于二隂之中難以言觀苐有應于上若内之闚乎外故曰闚觀夫處内窺外所見無多女子之事也坤隂柔在中故利女貞言僅利乎此爾如其為丈夫也則不近天子之光而守拘墟之見其何所利乎來氏知德曰觀卦利近不利逺六二中正又與五應乃曰闚觀則不利于逺可知矣六三句觀我生進退傳觀我生進退未失道也三處下之上將賓乎王者也然猶隔于四當進未進而三以柔居之上九為應能自審以為觀者也故曰觀我生進退與童觀之小闚觀之陋異矣我生猶言我身六四句觀國之光句利用賓于王傳觀國之光尚賓也九五王也剛健中正照耀四方光也六四柔順地分親切正觀于五故曰觀國之光五觀之主也則四為賓為五所禮故利用賓于王猶記所謂賓興者也九五句觀我生句君子无咎傳觀我生觀民也觀我生與上文觀我生進退異彼所觀者出處之大閑也此所觀者皆以觀我身也斯民之從違由我身之得失君子身為民極九五之觀乎羣隂者皆所以觀己也傳所謂觀民者正所以觀我生之實也何也陽剛中正自新以新民而自省之深者也上九句觀其生句君子无咎傳觀其生志未平也上九不如九五之位而陽剛之德與九五同足為羣下所觀居觀之極自處甚髙其身雖不居乎觀之正而德望尊隆足係民望五尚而崇之不敢少自菲薄方輔五之觀以為觀志有寧乎未也傳所謂平者寧也彖所謂其生者别乎觀之主也其生謂五也噬嗑句亨句利用獄傳頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也大象雷電噬嗑先王以明罰勑法繫辭日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑序卦可觀而後有所合故受之以噬嗑嗑者合也雜卦噬嗑食也三陽三隂乾坤泰否之雜震離相加反覆相推本卦賁之反上下兩陽含隂頥之象也中間一陽頥中有物也頥中而有物間之必嚙之而後合噬嚙也嗑口之合也如食物然故曰噬嗑為爻三剛三柔間雜分布為德震動而離明震離兩象雷電相似而爍赫昭著又本卦賁之反易離上震下而離五柔中凡此皆亨之道也以其事言之何所利乎利用獄而已剛柔相濟動能斷而明能察明動相合而幽隱章著柔得中而居五是則明斷兼備而主之以寛仁此其所以為利也傳又言雖不當位利用獄者以五為用獄之主而見寛仁為用獄之本也書曰惟明克允又曰欽哉欽哉惟刑之恤哉即此理也觀爻象多以用獄言可見先儒據卦變噬嗑自益來者六四之柔上行以至于五而得其中是柔上行而得中矣亦補凑牽合之法不若反覆觀之賁反為噬嗑離上行而六五柔中為自然也又利用獄專以彖傳柔得中句為解亦未審彖傳文勢相連賓主分合之微㫖也初九句屨校滅趾句无咎傳屨校滅趾不行也繫辭子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大戒此小人之福也易曰屨校滅趾无咎此之謂也初獄小刑輕故象為屨校滅趾小懲大戒故占為无咎震動之初于小事而即懲之使不能行若納校于足而不見其趾者然是仍在上者能用獄以止惡也先儒皆謂初無位為受刑之人未詳傳不行意屨校納校于足如納屨也以為加校于屨非也滅没而不見也以為有傷亦非也六二句噬膚滅鼻句无咎傳噬膚滅鼻乗剛也祭有膚鼎葢肉之柔脆者鼻肺竅凡物之本始亦謂之鼻六二柔中而乘初之剛亦易治之獄用法過嚴直窮根株如噬鼎肉之膚而深至于鼻也六二中正而僅曰无咎以乗乎剛也則稍過矣聖人之執中也如是六三句噬腊肉遇毒句小吝句无咎傳遇毒位不當也周禮腊人掌亁肉則腊肉皆亁肉堅韌之物也亁久之肉美惡難分有毒存焉噬之者不免也六三上承九四當交噬之位噬之而未易合獄之難辨者以爻柔而不克噬也欲噬四而遇其梗吝所必至爻辭曰小吝无咎而傳止釋位不當者吝不免也九四句噬亁胏句得金矢句利艱貞句吉胏説文作􅳨子夏傳虞氏易俱作脯傳利艱貞吉未光也胏説文作􅳨與胾通肉之帶骨者亁胏堅韌噬值其剛者也亦噬而難合辨獄者弗慎則枉矣惟艱難貞固以處之而後吉九四剛而不中故有此象得金矢及下爻得黄金不與遇毒同類噬亁胏噬亁肉二句斷處已了所噬之象得金矢得黄金本義引周禮獄訟入鈞金束矢而後聽之即以用獄言於利艱貞吉貞厲无咎意義方明足但以九四為得用刑之道得聽訟之宜於傳未光之義不協何也經曰吉而傳曰未光者以利艱貞言也自當以傳為據毛氏竒齡曰太平御覽載王肅解云金矢所以獲野禽故食之反得金矢君子于食必思其毒于利必備其難也本義引周禮鈞金束矢獄訟所入為解其于金矢固巧合矣然于噬胏之義何居且得金矢與遇毒得黄金一例黄金無矢毒又何物况文王未必用周禮也此條甚辨但周禮必相沿而起文王時亦必有之且爻辭一云繋自周公則用周禮亦合六五句噬亁肉句得黄金句貞厲无咎傳貞厲无咎得當也六五柔順得中居最尊之位有離明之體柔中則仁離明則察獄雖難事不欲冤人如噬亁肉然葢噬之而易合者也亁肉無滅鼻之傷去腊之毒而少胏之艱者也金謂鈞金獄之有事貞厲者庶獄庶慎无咎之道傳得當即當于中道不作戒辭以柔中内自有貞厲之心也胡氏炳文曰噬膚噬腊肉一節難于一節六五噬亁肉則易矣五君位也以柔居剛柔而得中用獄之道也何難之有訟則出矢獄則出金訟為小獄為大四于訟獄兼得大小兼理之也五君也非大獄不以聞上九句何校滅耳句凶何古本作荷傳何校滅耳聰不明也繫辭善不積不足以成名惡不積不足以滅身小人以小善為无益而不為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶何荷通積獄至上獄極矣任剛不悔終于獄者故有荷重校而没其耳之象凶之道也荷校而至滅其耳久而不釋者也亦久而不悔者也故傳曰聰不明郭氏雍曰或以滅鼻為劓滅趾為剕書註劓刖輕刑剕辟為重故漢斬趾同于棄市初九小刑固不當斷趾上九罪大復不當輕刑以是知三者言滅皆非刑也賁句亨句小利有攸徃小利郭京易舉正作不利云不字草書勢如小字謬不知易例本有小字傳賁亨柔來而文剛故亨分剛上而文柔故小利有攸徃天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下大象山下有火賁君子以明庶政无敢折獄序卦物不可以苟合故受之以賁賁者飾也雜卦賁无色也噬嗑之覆也噬嗑上卦之離來居本卦艮下噬嗑下卦之震反為本卦之艮而居離上離柔也來文艮之剛震剛也上而為艮以文離之柔柔來文剛則剛而濟之以柔六二中正内離明也明則通矣故亨分震之剛上而為艮以文柔則柔而濟之以剛外艮止也止不行也以質止文救弊之事故小利有攸徃時變人事存乎其間矣吕氏春秋孔子卜得賁曰不吉子貢曰何謂也孔子曰夫白而白黑而黑賁亦安吉乎家語孔子筮得賁愀然有不平之色子張進曰師聞卜者得賁而子有不平之色何也曰以其離耶在周易山下有火賁非正色之謂也夫質也黑白宜正焉今得賁非吾兆也雜卦傳曰賁無色也二説近之初九句賁其趾句舍車而徒趾古本一作止車鄭張本作輿傳舍車而徒義弗乘也初在下者也以一身之飾觀之如其趾然飾之盛則宜其車矣然在下位九最剛明尚質之至雖柔來文剛有六二之賁而安於其分不有其文寧守其樸是以質為文者也剛明在下之為也義勝也故傳曰義弗乘語曰安步以當車其賁趾之謂乎趾本古作止字之訛也六二句賁其須傳賁其須與上興也須需也待也不必作髭鬚解二爻以上俱未取象於身也傳曰與上興上謂三也柔來文剛故二須三以為賁也俞氏琰曰二無應而比三三亦無應而比二故與之相賁賁以柔來文剛故亨文當從質非質則不能自飾隂必從陽非陽即不能自進六二純柔必待九三之動而後動故曰賁其須按此只作相須之義亦得傳意九三句賁如濡如句永貞句吉傳永貞之吉終莫之陵也如助語辭柔來文剛離明為體本賁如也而九三一剛介于二柔之間文飾之盛鮮澤之至故又濡如然柔多矣恐其剛之不濟也得無文盛而質衰乎故必以永貞為吉也永貞則剛不替也六四句賁如皤如白馬翰如句匪㓂婚媾皤鄭元陸績本作燔誤傳六四當位疑也匪冦婚媾終无尤也離之柔來文艮之剛分艮之剛上而文離之柔隂陽相飾故為賁一隂有二陽則賁之盛猶一陽而有二隂亦賁之盛故皆曰賁如也皤白之雜也斑白也當上下相賁之位而剛上文柔者艮也所賁者五最親切而隔四於五不能無疑在賁盛而疑之時故有皤翰之象然艮止也四其同體終得上之賁者如婚媾然五既賁於上四從五亦相承而得所賁也故无尤又六四以初九為正應而近乘九三則賁之雜出者皆求為賁也賁之不一則雜出而兩相疑矣故曰皤如賁之者盛故又曰白馬翰如然三雖切近而正應在初終從其正若婦之有夫從一而終非三所能亂也傳曰疑疑于三也又曰終无尤有正應也屯二匪㓂婚媾乘剛也謂初之與五爭也此則三與初間其義亦同傳疑也統賁如皤如白馬翰如而言言三與初皆賁也終无尤專以匪宼婚媾言言初之必應也賁而言皤言白何也曰殷尚白詩所謂有客有客亦白其馬是也翰白馬也檀弓所謂戎事乘翰是也以白為飾從殷尚也文王演易在殷之世多從殷禮周公亦從文王之例也諸儒皆以白為反質之義未觀陰陽相賁之理與經傳别為一意矣六五句賁于丘園句束帛戔戔句吝句終吉戔子夏傳作殘偽謬傳六五之吉有喜也分剛上而文柔則六五正得上九之爻者上處卦外故為丘園艮為山為果蓏亦有丘園之象九上文五五與為賁是賢人在外而禮聘殷摯者故曰賁于丘園束帛戔戔戔戔委積貌又顯見貎五居尊位而下无應與至求助于外若可羞吝矣然九上文柔賁而有合適得其中禮之善物也故終吉傳不言吝而專言有喜者以上與五之賁親也戔戔諸儒俱取淺小義以為吝嗇尚儉之意未嘗觀爻象也彖傳曰分剛上而文柔象傳曰有喜也皆據爻立言剛上文柔成卦之主五尤切近居尊内雖无應外有賢焉相須甚殷爻辭是聘賢之文詩曰孑孑干旄在浚之郊孑孑干旟在浚之都孑孑干旌在浚之城賁于丘園之謂也素絲紕之素絲組之素絲祝之束帛戔戔之謂也昏禮納帛一朿朿五兩注十端為束既用束帛而何為淺小殘碎乎不此之取而謂施文飾于丘園無此事理謂敦本尚儉如衛文漢文雖吝終吉爻象爻辭象傳俱不稱情陰柔文也陽剛質也尚質意惟九三上九有之何氏楷云比于上九陽剛之賢受賁于上九者也丘園指上上陽剛而處外乃賢人隱丘園之象據彖曰剛上文柔則六五乃上所賁者爻所謂賁于丘園猶曰受賁飾于丘園也此為得之上九句白賁句无咎傳白賁无咎上得志也陰柔主文陽剛主質上居賁終下連二陰於離明之上文已勝矣而九居艮體以質止文所謂剛上文柔者是尚質固所以成賁也故曰白賁白純素也純素也者采章之本也以質為主則文著而非浮六五之所藉以成賁也其志得行故无咎剥句不利有攸徃傳剝剥也柔變剛也不利有攸徃小人長也順而止之觀象也君子尚消息盈虛天行也大象山附于地剥上以厚下安宅序卦致飾而後亨則盡矣故受之以剥雜卦剥爛也剥復覆推乾元之消息也為後七卦之綱本卦五隂一陽柔盛剛微陰剝陽也故曰剥小人欲害君子其勢方長坤順艮止故曰不利有攸徃當其二陽在上猶得大觀而即至于剥剝後乃復盈虚消息其幾必然君子知幾當有以處此初六句剝牀句以足句蔑貞凶蔑九家易作滅義同傳剥牀以足以滅下也一陽五隂如在牀第之間故取牀象剥之初從下起故言足九家易蔑與滅同滅下則根本已壊程子所謂隂自下進漸消滅于陽貞正凶之道也即彖傳所謂柔變剛也象傳滅下即滅貞葢牀必下固而後不至于壊其初剥則下不固矣不待破裂而知之也故凶六二句剥牀以辨句蔑貞凶傳剥牀以辨未有與也程子曰辨分隔上下者牀之幹也毛氏所謂凡兩物交縫謂之辨來氏所謂牀之下足之上分辨處是也六二處羣陰之間剥之將成辨則已及二雖得中而陰柔之質與衆剥同上九外隔於五能相與乎陽不相與則正為其剥者矣故亦曰蔑貞凶位雖中正而无善狀也六三句剥之无咎陸德明去之字謬傳剥之无咎失上下也此爻與上九相應處剥之時而不與羣陰同黨此志存乎正者也故與蔑貞者異而得无咎若曰剥之在三也獨无咎者也傳曰失上下謂初二四五羣陰也當照傳作一句讀荀氏爽曰衆皆剥陽三獨應上无剥害意是以无咎王氏弼曰與上為應羣隂剥陽我獨協焉雖處于剥可以无咎六四句剥牀以膚句凶膚京房作簠非傳剥牀以膚切近災也剥至四則已成其為剥矣處羣剥之際陰盛不中小人之尤前所謂剥牀者今及其膚矣初足二辨三牀之上四乃上體剥及其身不可止矣故凶傳切近二字最警六五句貫魚句以宫人寵句无不利傳以宫人寵終无尤也一連五隂如貫魚然魚陰物故以取象宫人衆妾乃陰之美而受制于陽者羣陰剥陽五益切近宜不利矣然六五得中居尊上奉艮體下臨坤順足以統衆隂而事一陽有正内協贊之才與頑悍强妬之惡故君子雖不利有所徃而此固无不利也剥而不終于剥也張氏振淵曰遯隂長而猶微可制也則告陽以制隂之道曰畜臣妾剥陰長已極不可制矣則教隂以從陽之道曰以宫人寵得易之微意後漢梁皇后曰願陛下雲雨之均澤識貫魚之次序正用此辭然象之所包者廣不専為宫闈言也上九句碩果不食句君子得輿句小人剥廬得京本作德誤輿董作車傳君子得輿民所載也小人剥廬終不可用也諸陽剥盡上九獨存艮為果蓏陽止乎陰陽大陰小故取象碩果不食言陽之不盡剥剥之極而必復也此君子之事也當亂極將治之際為衆所賴如輿之載物然故曰得輿一陽在上羣隂猶將戴之物極則反理固然也若小人則終無生理家室破亡無所依庇直至剥廬不得謂碩果不食之際而謂可姑容也廬人之所以容身者一陽在上五隂在下亦有廬象非陽剛則不足以當此直變坤上而戰敗矣復句亨句出入无疾朋來无咎句反復其道七日來復句利有攸徃朋京本作崩復古本作覆俱誤傳復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸徃剛長也復其見天地之心乎大象雷在地中復先王以至日閉闗商旅不行后不省方繫辭復德之本也復小而辨于物復以自知序卦物不可以終盡剥窮上反下故受之以復雜卦復反也剥之反也坤徃居上艮反為震剛來居初是乾元之氣萌生于下日見其通也故亨其為體也震動坤順出入動也无疾順也朋來出入之類也无咎无疾之致也出入一陽之上行朋來五隂之順序无疾无咎陽為主也皆動而以順行之事也亨也自剥而來故曰反陽萌于初故曰復道猶路也一元之反而求復者其道也如日之黄道然日極于北必至于南由娵訾而反元枵固其道矣七日日之分數也乾之策二百一十六坤之策一百四十四是三百六十為期之日數數日者以十十者數之體除十得五七三百五十合體數之十則三百六十也葢少陽之數七也自剥之末爻至復之初皆少陽七數凡七日此天行之常度一陽來復道有必至也陽既來復則其勢日長陽利于進故利有攸徃七日用卦氣六日七分者穿鑿補湊用辟卦自姤至復七卦者是七月而非七日又用一之日二之日謂古人稱月為日者必不能謂七之日也亦無七陽之月惟據少陽數七推之為得初九句不逺復句无祗悔句元吉祇九家作多一作㩼王肅本作禔亦與祗同古易註祗作袛從衣詩袛攪我心漢書竇嬰傳袛加懟俱從衣葢祗袛二字通也傳不逺之復以修身也繫辭子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉不逺復謂初祗玉篇云適也无祗悔无適適然而悔者以其不逺而即復也此本然大吉之道人心一天地之心也天地間惟元氣不息方剥盡矣而根荄即萌本爻震體為復之主其在天地則陽氣之萌于地中在人則人心之介然有覺惕然自新者也葢人禀天地之性以生者此元陽也元者善之長大賢以上偶然差失非其本心稍差即悟悟即還其初無適以貽悔而去之逺者聖人知天地人之心故即其最切者而象之聖傳釋之以修身而繫辭又借顔子以明之也故易非聖人不能作非聖人不能知六二句休復句吉傳休復之吉以下仁也六二柔順中正當一陽來復之時而與之切比隂陽相得則陰必從陽初以善為之主二能下而從之安然並復故曰休休安也暇裕也六三句頻復句厲句无咎頻古本一作嚬鄭本作卑虞易解頻作蹙俱不合傳頻復之厲義无咎也頻數也與頻巽同三居兩卦之間有復盡重復之象然曰頻復則其頻失可知復而至于頻厲之道也頻而能復故无咎本義曰不中不正又處動極復而不固屢失屢復之象屢失故危復則无咎得象意趙氏汝楳曰三為震動之極故曰頻厲危也即人心惟危之危郭氏忠孝曰唯君子能久于其道其餘則日月至而已是以子夏之徒出見紛華而悦入聞夫子之道而樂與夫囘之拳拳服膺而弗失之者固有間矣二條得辭義六四句中行獨復傳中行獨復以從道也四在羣陰之中故曰中行羣隂不應而四獨應故曰獨復初為復之主五隂皆復乎初者能應則其道同柔而得正又應初陽與二之休復无異也其吉可知不言吉者辭已備也先儒俱以陽氣之微不足有為故不言吉云者非也諸卦若履霜堅氷至之類多不言凶者豈謂不以為凶乎繆氏昌期曰中即中以自考之中獨即中庸慎獨之獨四能以中而行而于獨知之中憬然自覺所謂復以自知也葢復之所以為復全在初爻猶人之初念也五隂皆復此而已惟四在陰中有所專向故發此義六五句敦復句无悔傳敦復无悔中以自考也敦厚也當復之時坤體得中居尊故為敦厚乎復者復進德之事初以不逺復故无祗悔覺悟之敏震之力也五以敦復故无悔省察克治之深坤之誠也項氏安世曰臨以上六為敦臨艮以上九為敦艮皆取積厚之極復于五即言敦復者復之上爻迷而不復故復至五而極也初最先故為不逺五在後故為敦上六句迷復句凶句有災𤯝句用行師終有大敗句以其國君凶句至于十年不克征災鄭作烖陸德明作灾義同傳迷復之凶反君道也六居復之終坤體柔順而遲緩是復之不勇而失復之實者故曰迷復羣隂積重惟恃一陽之進必勇而後克居坤之極怠緩優悠不可以為復矣故凶災惡之外見者𤯝惡之内見者以其迷于復有必至也上體坤衆也下體震為長子故有行師之象師之為道以陽統陰故能御衆上六居復之終去陽甚逺則坤之迷而失道者在卦之上為終故終有大敗坤為衆國之象六居其上為君故凶此迷復之凶之大者十偶數之終迷之極故十年而猶不克征復初長人君道也而上無比無應不中失其道矣此迷者之所以不悟也无妄句元亨利貞句其匪正句有眚句不利有攸徃傳无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸徃无妄之徃何之矣天命不祐行矣哉大象天下雷行物與无妄先王以茂對時育萬物序卦復則不妄矣故受之以无妄雜卦无妄災也无妄大畜覆推復上坤下震本卦上乾下震復陽之萌本卦陽之盛亦隂陽自然之次也自其覆推觀之則大畜上九自外來居内卦之初而為无妄之主自乾震同體觀之則震本乾之初交乾外而震内初九得乾之一體内有主而體乎乾全是實理故名无妄陽體實也卦分乾體故元亨利貞辭與乾同自内至外而觀之則震動而乾健由外合内而觀之則九五剛中而六二正應此皆天命之本然所謂純粹精者也大亨以正也然乾既分震而同為一卦必實有天理斯為克肖不然則非本然之體矣匪正矣无妄者妄矣於身則有眚于行則不利眚過差也无妄史記作无望言无所期望也本漢人之解而改之者雖誠之一端而于翼義言全理者不合初九句无妄徃句吉傳无妄之徃得志也彖傳曰剛自外來而為主于内則初固无妄之主得乾之一體而方動在初天理之本然也徃則誠之通誠能動物順親信友獲上皆此矣吉也何氏楷曰此爻足蔽无妄全卦震陽初動誠一未分是之謂无妄動與天合何不吉之有六二句不耕穫句不菑畬句則利有攸徃傳不耕穫未富也柔順中正立心无妄虚以應乾誠于其所有事不以利為心則徃无不利之道也乾為郊野震于稼為反生動于中而應健有耕作之象不耕耕也不菑菑也耕當春穫在秋菑一歲田畬三歲田不耕穫言耕而不豫望其穫也不菑畬言菑而不即計為畬也未有利之之心也論語曰仁者先難而後獲孟子曰必有事焉而勿正董子曰正其誼不謀其利无妄六二之謂也來氏知德曰不耕穫者不方耕而即望其穫也不菑畬者不方菑而即望其畬也耕也菑也即明其道也穫也畬也即功也曰不耕穫不菑畬即明其道不計其功也觀小象未富可見矣若程傳不首造其事本義無所為于前無所冀于後將道理講空了乃禪學也吾儒聖人之學進德修業盡其理之當然窮通得䘮聽其人之自然修身俟命此正所謂无妄也豈一㸃道理不盡空空寂寂謂之无妄哉六三句无妄之災句或繋之牛句行人之得句邑人之災傳行人得牛邑人災也上承乾而下震極災之象也上下卦連接之界无妄而處危地災非其咎意外之事也凡柔爻皆坤離故有牛象在无妄之交徃來之間故或繫牛而行人得之本爻處非其地而近于乾故為邑人之災或者假設之辭言災之出于无妄者有若此也本義曰卦之六爻皆无妄者也六三處不得正故遇其占者无故而有災如行人牽牛以去而居者反遭詰捕之擾也程傳謂或繋得牛行人得之以為有得邑人失牛乃是災也言有得則有失不足以為得也來氏同此意然玩傳邑人災也即以邑人因此有詰捕之擾而言亦合猶俗云失物尋地主者也九四句可貞句无咎傳可貞无咎固有之也陽剛健體本可有為四下于五不敢妄動者也以无妄自處即无咎之道安其本然者也九五句无妄之疾句勿藥句有喜傳无妄之藥不可試也无妄之至中且正而有應者宜无疾矣即以疾言不以藥害之乃有喜也以无妄之疾而藥之則无妄之藥矣故戒之曰勿藥且固之曰有喜本義曰乾剛中正以居尊位而下應亦中正无妄之至也如是而有疾勿藥而自愈矣故其象占如此上九句无妄句行句有眚无攸利傳无妄之行窮之災也處卦之極體健過剛不動斯為无妄之體至此而行則失所謂无妄者矣故有眚无利即彖所謂匪正有𤯝不利有攸徃者也時位之窮為之與亢龍同大畜句利貞句不家食句吉句利涉大川大畜歸藏易作􅬦畜傳大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大象天在山中大畜君子以多識前言徃行以畜其德序卦有无妄然後可畜故受之以大畜雜卦大畜時也无妄之覆也乾内艮外无妄之震上而為艮乾健艮止以陽止陽皆畜之象陽大隂小所畜者陽故曰大畜乾剛健艮篤實内外皆見而艮之上九為畜之主爻皆有堅確之義故利貞剛上尚賢處卦之外賢能畜君君亦養賢故不家食吉大川惟健乃濟六五與乾二正應故利傳應乎天謂健也初九句有厲句利己傳有厲利己不犯災也畜不可進乾體志鋭進也得無犯難乎故有厲而當畜之初其勢未深則猶可及止也故利己本義曰乾之三陽為艮所止故内外之卦各取其義初九為六四所止故其占徃有危而利于止也本義乾三陽為艮所止言大象也内外之卦各取其義即程傳乾三爻皆被止為義艮三爻皆取止之為義也非兩意九二句輿説輹説脱同傳輿説輹中无尤也輹車之伏兔也伏于軸以承輻者不行則説九二剛而得中又為六五所畜能自止而不進故有此象九三句良馬句逐句利艱貞句曰句閑句輿衛句利有攸徃曰鄭虞俱作日𫝊利有攸徃上合志也傳曰上合志謂艮也上九有天衢之亨九三陽剛與之同德同德則同志不家食者也固其剛健之體厚其光輝之著聘應天衢亦不逺也乾為馬三健極故良欲進故逐前遇艮故艱貞曰如字不必從鄭氏改日言利艱貞則不敢逐矣良馬將何用乎曰有閑在有輿衛在葢範我馳驅行而宜之者閑闌也左傳成十八年程鄭為乘馬御六騶屬焉使訓羣騶禮疏云毎廐為一閑閑有二百一十六匹易乾為馬應乾之策又天子十二閑邦國六閑卿大夫四閑是閑者上廐也不作虚字輿衛考工記軫戈人殳㦸矛也輿乾圜之象衛一陽二隂周列于前若擁䕶然六四句童牛之牿句元吉童廣蒼作犝説文作僮皆通字牿説文九家作告俱誤傳六四元吉有喜也六四艮體以柔順為畜其端甚微彼此相應其勢甚易大善而吉之道也童未角之牛牿施横木于角以防其觸詩之所謂楅衡也本爻變離離為牛艮本少陽應初故為童以陰止陽故象牿六五句豶豕之牙句吉傳六五之吉有慶也艮剛而六五柔體剛而質柔也居尊得中足繋羣剛止之善物也豶牙之象象其能繋云爾葢六五畜乾之九二尤為切至陽剛正盛而六五以柔止之得中居尊勢足以相維强項者可縛而制也强者馴則慶及天下矣故吉來瞿塘曰豶犗也騰也與童牛之牿一句同類童字與豶字同牿字與牙字同牙者埤雅云以􅍻繋豕也乃􅍻牙非齒牙也引杜詩鳬雛入槳牙坡詩置酒看君中㦸牙等牙字以證之字義甚合雷彖能止健外體艮三爻皆有止義養賢因剛上尚賢為義專釋不家食之文胡光山謂四取彖中止健之義五取彖中養賢之義非也上九句何天之衢句亨傳何天之衢道大行也何荷通靈光賦荷天衢以元亨竟作荷鄭康成亦言肩荷是古人皆讀上聲無疑吳幼清云何天之衢猶詩言何天之休何天之寵是也上九為大畜之主爻所謂剛上尚賢不家食又能應天止健所謂利涉大川者艮為門闕在外卦之上無所遮蔽若行于天之上四達莫禦荷天休寵其道大行畜極而通也亨也頥句貞句吉句觀頥句自求口實傳頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉大象山下有雷頥君子以慎言語節飲食序卦物畜然後可養故受之以頥頥者養也雜卦頥養正也頥與大過對待相推自此而坎離凡四卦而六子皆對所以承剥復无妄大畜之後于陰陽升降乾元動止之間而為上篇之終也本卦以陽含隂故其象為頥其義為養其道在正正者静也養以静為正故艮體皆吉在上一陽能止羣隂尤吉而震動則凶以上養下則吉以下養上則凶夫為口腹之欲者小人之私以道養身因以養人者則大人之事故觀其所養者觀其所自養也此上九艮體得静正之道能養萬民所以為頥之主也觀頥自求口實二句相承玩傳下句加一觀字可見初九句舍爾靈龜句觀我朶頥句凶朶京作瑞傳觀我朶頥亦不足貴也養其大體為大人養其小體為小人靈龜心也大體也朶頥口腹也小體也舍其心而養口腹滅理窮欲不知所養凶可知矣初九陽剛有養人之材處下無養人之實頥初震體有應于四志動于内惟在屬饜故有此象朶垂也一陽下動如頥之垂六二句顛頥拂經句于丘頥句征句凶拂子夏傳作弗傳六二征凶行失類也顛動也經脉絡也初剛動二乘初四應初故皆曰顛頥之脈絡在中二五居中故皆曰經宜剛而以隂虚處之故皆曰拂丘髙也又大也前漢書楚元王傳過其丘嫂食張晏註曰丘大也長嫂之稱頥之上九髙而大者故曰丘頥是以其初言則乘剛而妄動以其五而言則隂柔而不應既非其類若又徃求于上則隔三而防五更非其類矣此征之所以凶也六三句拂頥句貞凶句十年勿用句无攸利傳十年勿用道大悖也三居下體震動之極非能承上之養以養人者在頥之交貪饕妄動自私自利悖養之道正頥之凶者也夫上欲養人而三竊以自私豈可容于頥養之世哉是以終不可用也一无所利者也十年數之終也无所利不能養人必害人也六四句顛頥句吉句虎視眈眈句其欲逐逐句无咎逐子夏傳作攸漢書作浟荀爽作悠劉瓛作跾傳顛頥之吉上施光也四近五當養人之位應初剛之動資其才足以相濟取其實足以廣惠是五之不及施者四能光而大之此顛頥之所以吉也虎行下視眈眈然専也欲有所貪逐逐然無窮也艮為虎故有此象近君養人不以自私故无咎六五句拂經居貞句吉句不可涉大川傳居貞之吉順以從上也頥之經中也惟陽乃能養陰而五以隂居之故曰拂經然上九陽剛為頥主爻賢人之能養民者五以正而順從之則亦不失其所養吉之道也涉川必乾剛五柔故不可涉言當順賢不可自用以濟人也上九句由頥句厲句吉句利涉大川傳由頥厲吉大有慶也上九頥之主爻養道之所由成故曰由頥夫六五之君頼之以養人則位尊任重危地也不能無厲然人君賴之天下賴之矣朝野恬熈百世樂利吉之事也即有險阻才德克濟頥之至也故利涉大川大過句棟橈句利有攸徃句亨傳大過大者過也棟橈本末弱也剛過而中巽而説行利有攸徃乃亨大過之時大矣哉大象澤滅木大過君子以獨立不懼遯世无悶繫辭古之葬者厚衣之以薪葬之中野不封不樹䘮期無數後世聖人易之以棺槨葢取諸大過序卦不養則不可動故受之以大過雜卦大過顛也大過與頥對待相推為卦四陽二陰大謂陽大過陽多也中四陽而初上兩隂若屋之有棟上下俱脆而中堅欲顛倒傾倚也卦象似之然以其體言之則四剛在内而二五得中剛過而不過也以其德言之則巽順在内而兑説于外剛而不急不怒也以此用其大過之才事斯有濟乃可以亨也初六句藉用白茅句无咎傳藉用白茅柔在下也繫辭藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以徃其无所失矣藉薦也初之象白茅柔也六之象大過之時以柔處之又居巽體當事之初審慎之至才大出以小心不為壯徃猶持重物者不苟措于地必先藉之以精潔之茅過于慎者有大過人之才者也剛柔相濟故占為无咎九二句枯楊生稊句老夫得其女妻句无不利稊鄭作荑傳老夫女妻過以相與也陽過而親比于陰生意相屬亦相濟也枯楊陽之過者也而柔稊生焉生生不可已也老夫陽之過也而妻少女焉生育亦可成也是陽雖過而比初隂有相與之意故无不利老夫據九二而言女妻柔在初也得其云者自我得之也下文士夫據九五而言老婦柔在上也得其云者為彼所得也九二之下比初六男先于女故曰老夫得其女妻九五之上比上六女先于男故曰老婦得其士夫全經隂陽相比者皆取象婚媾大意較然來氏舍本文而取錯卦之震艮甚不親切九三句棟橈句凶傳棟橈之凶不可以有輔也中四陽皆卦之取象于棟者三四尤在中故俱取棟象而三在上下相接之地偏戾且危更為大過故獨有橈象剛過而在下之柔既隔于二不能相濟在上之柔雖為正應與五相比亦不能為用是有輔而不可以輔也欲如大象之亨不可得也故凶九四句棟隆句吉句有它吝傳棟隆之吉不橈乎下也以剛承五羣陽相協其下雖弱尚能相應而不至于橈不橈則四陽之體隆隆然髙而不危矣故吉它謂三橈而凶者與之比近助之以剛則下不能相應雖不至橈亦吝九五句枯楊生華句老婦得其士夫句无咎无譽傳枯楊生華何可久也老婦士夫亦可醜也卦剛過而爻又居羣剛之上上承己過之柔不足相濟無所滋益如楊之已枯而陰華生焉美盡于外也老婦已衰而士夫得焉偶不為嘉也以五居中而不善何也剛之極也大過之主也其占雖无咎而亦无可譽无譽則醜矣上六句過涉滅頂凶句无咎傳過涉之凶不可咎也處過之極柔没于上不能有濟如過涉者之没于水而滅其頂不可得生凶也然柔所以濟剛也時處其過不能不濟雖有沉溺之凶尚有補過之意不可以為咎也兑為澤水也四陽在下若没于水故有此象習坎句有孚句維心亨句行有尚坎歸藏作犖劉瓛作欿郭氏舉正習上有坎字誤傳習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚徃有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉大象水洊至習坎君子以常德行習教事説卦水火不相射雨以潤之勞乎坎坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎潤萬物者莫潤乎水坎陷也坎為豕坎為耳坎再索而得男故謂之中男坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多𤯝為通為月為盗其于木也為堅多心序卦物不可以終過故受之以坎坎者陷也雜卦離上而坎下也坎與離對待水火日月天地之大用故上下經皆以終篇陽陷隂中故名為坎陷則不測故為德險質為水兩坎重險故曰習習者更歴也習即水之流而有常也有常即其信惟水潤下其性然也其所以有常者中實也二五剛中也如人之行事以心為主心實而無偽誠也誠則感而通險而不困故亨心亨則行亦亨矣故行有尚水性惟行乃成濟物之功人之處坎惟行乃能濟事之急有尚猶言尚徃故傳曰徃有功初六句習坎句入于坎窞句凶傳習坎入坎失道凶也當重險之時而以陰柔處下禍深而不知避入于坎之窞者也非習坎之道故凶窞者坎之在下者也謂初九二句坎有險句求小得傳求小得未出中也小對大而言濟險者貴剛中九二以剛中而處柔在習坎之下體是尚有險也所求者小有得而已未能遽出乎險如九五之平也六三句來之坎坎句險且枕句入于坎窞句勿用險鄭元向秀俱作檢鄭曰木在首曰枕在手曰檢傳來之坎坎終无功也下坎方終而上坎又來故曰來之坎坎六三質本柔暗又在偏危之地無孚心之亨是處重險之中而且以為安枕無憂也入險日深而已不能成濟之功者故勿用六四句樽酒句簋貳句用缶句納約自牖終无咎牖陸作誘誤傳樽酒簋貳剛柔際也禮天子大臣出會諸侯主國樽棜簋副何氏楷云貳副也謂樽酒而副以簋是也缶瓦器皆至約之儀約簡儉也牖牖下室西南隅詩所謂宗室牖下者也納此于牖以將誠意神其格之矣六四柔正承五近君當坎險之中資以出坎剛柔相比情􅁩切至故其象如此而終得无咎也九五句坎不盈句祗既平句无咎傳坎不盈中未大也彖傳曰水流而不盈行險而不失其信維心亨乃以剛中也二五皆不陷于坎而五尤中正居尊為卦之主故不盈之義惟此當之祗之為言適也不盈則適至于平不自侈大自無壅遏之患此君子存心至實而亨者也何咎之有上六句繋用徽纆句寘于叢棘句三歲不得句凶寘劉瓛作示云衆議于九棘之下傳上六失道凶三歲也徽纆黑索也巽為繩上爻變巽之象叢棘以棘圍牆也坎為叢棘本象周官司圜收教罷民能改者上罪三年而舍其不能改而出圜土者移上六以隂柔而居險極是失中道而終于坎者坎為獄三歲為改舍之期其舍與不舍以三歲為斷凶已久矣離句利貞亨句畜牝牛句吉傳離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也大象明兩作離大人以繼明照于四方説卦作結繩而為網罟以佃以漁葢取諸離説卦水火不相射日以晅之離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也燥萬物者莫暵乎火離麗也離為雉離為目離再索而得女故謂之中女離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁序卦陷必有麗故受之以離離者麗也雜卦見坎離與坎對待自然之象隂麗陽中離離然明也為日為火光明之象凡象之明者偏則蔽中正則通故利貞以卦體觀之二五兩爻皆中而二尤中正如日之中天而光無不通亨之實也離坤道坤牝馬離牝牛二五其體也故有畜牝牛之象柔中而至順故吉初九句履錯然句敬之句无咎傳履錯之敬以辟咎也陰方厯陽初九承之則陽亦厯陰火性炎上而剛明在下陰陽相厯如履之交錯者然夫履之錯咎之歸也然敬以直内則義足以方外而錯者定矣定則行克由禮斬无咎之道六二句黄離句元吉傳黄離元吉得中道也坤五曰黄裳元吉文言曰黄中通理離自坤來而六二尤為中正故其爻象似之黄中色黄離言中之麗也即柔麗乎中正也明體柔順而中正則不失于苛察者亦不失于偏蔽牝牛之吉在焉故元吉九三句日昃之離句不鼓缶而歌句則大耋之嗟句凶鼓鄭作擊耋京房作絰蜀本作咥又鄭本無凶字傳日昃之離何可久也離惟六二中正過此而九三則日之昃矣當前明將盡後明方繼之時過剛不中昏瞀眩亂喜戚不常鼓缶而歌既忘其時之有盡大耋之嗟又昧乎命之在天不可久存凶之道也梁氏寅曰三居下離之終乃日昃之時也夫持滿定傾非中正之君子不能三處日之夕而過剛不中其志荒矣故不鼓缶而歌則大耋之嗟其歌也樂之失常也其嗟也哀之失常也哀樂失常能無凶乎君子值此之時則思患之心與樂天之誠並行而不悖是故不暇于歌矣而亦何至于嗟乎九四句􅋓如其來如句焚如句死如句棄如傳突如其來如无所容也火性焦燥歘忽九四不中不正上逼五而君怒下凌三而黨絶前火既在下後火又復來禍起不測無所容于其中弗戢自焚勢所必至殄絶生機理所必至終成灰燼事所必至剛烈之際有如是者其凶可知章氏潢曰明之于人猶火之于木火宿于木而能焚木明本于人而能害人顧用之何如耳九四不中不正剛氣躁暴其害如此六五句出涕沱若句戚嗟若吉戚子夏傳作嘁傳六五之吉離王公也位尊得中前明已息後明正起感已徃之不追憂來者之未繼至于出涕沱若而戚且嗟若則悔悟深切以處尊位扶衰振靡不難也故吉離火煩憂六五柔中繼明之主力救前蔽其象如此所謂憂以天下者人君之所有事也故傳曰離王公言其能麗尊位也蔡氏淵曰坎離之用在中二五皆卦之中也坎五當位而二不當位五為勝離二當位而五不當位故二為勝上九句王用出征有嘉句折首句獲匪其醜句无咎傳王用出征以正邦也上九陽剛光明在外離為兵戈變為震動而六五柔中倚而任之故為王用出征之象有嘉云者猶言實嘉賴之也首渠魁也醜脅從者也折取之也謂殲厥渠魁獲執之也獲不及醜則脅從㒺治也葢離明之極繼照四方故威伐盛而平允成邦賴以正非黷武也故无咎易翼宗卷三
