body:
  text: 易翼宗卷一湖北巡撫晏斯盛撰上經乾句元句亨利貞傳大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧大象天行健君子以自彊不息文言元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也繫辭乾道成男乾知大始乾以易知成象之謂乾夫乾其靜也専其動也直是以大生焉闢户謂之乾夫乾確然示人易矣夫乾天下之至健也德行恆易以知險說卦天地定位乾以君之戰乎乾乾西北之卦也言陰陽相薄也乾健也乾為馬乾為首乾天也故稱乎父乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果雜卦乾剛竒也陽儀也畫之所以竒天之􅅀萬象之始六畫皆竒陽之純也最健故名乾象之始形之始氣之始即理之始也最初者也元也由是以為變化則亨通利遂而理實氣完則貞而正且固筮者十有八變六爻皆竒其辭為元亨利貞蓋元始一理因以亨通而利遂且正固焉是由元而亨利貞不少間斷亦由元即亨利貞無少虧缺天與聖人化工性分一也于人事之應亦一也事之大小不同而觀其能始與不能始始之善與不善則思過半矣元亨利貞程子分四德雖未聮貫然尚不離乎經朱子僅據字義釋以大通而利在正固夫彖傳文言之釋元亨利貞如彼其盛而以大通而利在正固了之不得也且屯隨臨無妄革亦繫元亨利貞矣分量豈可以苟同乾之為象何象顧僅大通已乎豈其不足于貞而須以利貞進也乾之分量既有所未稱則其為說為杜撰而彖傳文言根極一元以為亨利貞正體乾象而得之後人思索所不能入也若曰孔子之說非文王之說吾不知其何說矣古元字無訓大者書元日元首元祀詩元戎禮元子皆謂𥘉也始也首也爾雅初哉首基肇祖元胎俶落權輿始也未嘗訓大象傳大哉乾元贊元之大非訓元為大也經稱元者二十六乾坤兩彖坤六五屯訟九五比彖履上九泰六五大有隨蠱臨無妄各彖大畜六四離六二損彖損六五益初九升暌兩彖井上六革鼎兩彖鼎上九皆有善之長義而比之元永貞尤明小與大對以小亨對大亨言可云元亨以小利對大利言必不可云元利則元不僅訓大也稱利者八十七乾彖乾九二九五坤彖坤六二用六屯彖屯初九六四䝉彖䝉初六六三上九需彖需初九訟彖師六五同人彖大有上九謙六四六五上六豫隨蠱臨各彖臨九二六三噬嗑彖噬嗑九四賁剝彖復六五無妄彖無妄六二上九大畜彖大畜九三頤六三上九大過彖大過九二離咸恆彖恆初六上九大壯彖大壯上六明夷家人蹇解彖解上六損彖損九二上九益彖益初九夬萃彖困九二九五革彖鼎初九六五上九艮初六漸彖漸九三歸妹彖歸妹九二上六巽彖巽初六九五兑謙中孚小過既濟未濟彖未濟六五皆有義之和義而其云無不利者尤明分言之各有利如利見大人利建侯之類利之義専合言之利之義廣則利不僅訓宜也彖象爻皆就本文起義傳辭自明經繫元亨利貞者六乾屯隨臨無妄革而屯隨臨無妄革五卦俱有微辭則所謂元亨利貞者有未盡也不特亨利貞有未盡其元先不如乾也乾之元亨利貞剛健中正純粹以精者也乾之元中庸所謂誠者天之道物之終始論語所謂人之生也直孟子所謂平旦之氣赤子之心也學易者當先識元初九句潛龍句勿用傳潛龍勿用陽在下也文言初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也潛龍勿用下也潛龍勿用陽氣潛藏君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也筮者得卦自下而上故下爻為初三變皆竒除掛一歸餘其見存之䇿凡三十六四其九也故純陽之爻稱九龍陽物而能變化爻有龍象其體乾也在下故曰潛勿用時當潛也潛即勿用有潛龍之德不嘗試于時不易乎世不成乎名遁世無悶不見是而元悶樂則行憂則違確乎其不可拔正潛龍之德也象占無二義蠱上九之髙尚遁九五上九之肥嘉與勿用異蓋雖潛而非龍也側陋時晦箕潁西山皆潛也而分量殊陽稱九以所得動爻見存之䇿四其九也或曰専稱九而不及七何也曰據一爻之動而為言舉一隅也歐陽氏曰易道占其變故以其所占者名爻不謂六爻皆九六也九二句見龍在田句利見大人傳見龍在田德施普也文言九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也見龍在田時舍也見龍在田天下文明君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也見龍對潛龍言在田對在天言龍德出潛為見雖不在天已非在下故曰在田德無不備時可有為其施自普乾本剛健中正而二正得其中五之合德也出潛離隱蔚然人望大則大效小則小效不論廣狹皆時措之宜也故曰德施龍德正中盡九二之藴庸言之信庸行之謹間邪存其誠善世不伐又是正中之藴學聚問辨寬居仁行又言行中切要之功德之所以博而化也博而化則施之普矣間邪存誠最為平實却是自强不息之要開千古學問之門克己復禮之事也仁也元也顔子所以能體乾也傳言德施普則有位矣又言時舍何也乾天德也九五天位也不在天位仍未得位也但二已出潛則德施已普即利見之義其兩言君德亦與時舍同見龍猶言龍見利見大人即言大人見也傳兩言君德孟子所謂居仁由義備大人之事者其言大人之德則皆下學之功大學格致誠正修之事德博而化寬居仁行則正已物正九三句君子終日乾乾夕惕若句厲句無咎傳終日乾乾反復道也文言君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣終日乾乾行事也終日乾乾與時偕行九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣以乾承乾兩乾交接之地重剛也三多凶危地也故厲然四五躍飛由此而進未至于亢也故無咎所以無咎者乾乾夕惕若為之也乾健之性無時或息至此尤加惕焉德日進業日修知至知終惕甚矣天一日一周乾三居下之上日復一日乾以繼乾故曰終日乾乾夕惕若此辭之顯著者來氏推象以互變大離為日鑿矣失天行健主象乾乾惕若非徒畏謹也進德修業即其事矣知至至之知終終之又進修之要與幾存義是居業進德中喫緊工夫是乾惕中喫緊精神或以過剛為危然乾乾夕惕之本體至此愈勤則所以進德修業者仍其剛為之倘非乾德私意稍間入於柔靡失其本體過不可補矣繫辭曰無咎者善補過也乾三有之君子無終食之間違仁其常也然造次顛沛必加省焉則無咎之道班固曰尸祿負乘夕惕若厲張衡思𤣥賦曰夕惕若厲以省愆兮俱厲字斷句郭京舉正夕字斷句非也玩文言乾乾因時而惕雖危無咎文義甚明可證積誤九四句或躍在淵句無咎傳或躍在淵進無咎也文言九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎或躍在淵自試也或躍在淵乾道乃革九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎前既稱龍故遂以龍言之龍之所起離人而見乎天惟淵象之近乎飛故曰躍位非中正四本多懼回翔審慎及時進修大德日茂不逼乎飛無咎之道乾乾即重剛三四皆不中故三四皆曰重剛而不中若上則不僅不中而已也或字極精義利用之致所以無咎者此也即象即占講象之家以此爻變巽為進退不果未得乾四性情失主象乾本龍德四在上卦之下近五自有此象九五句飛龍在天句利見大人傳飛龍在天大人造也文言九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流溼火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也飛龍在天上治也飛龍在天乃位乎天德夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎龍乾體五天位動故曰飛飛龍乾德神理之運無有形迹此天之心物之命氣之中運之盛聖人之時所謂中天者也乾之全量也大人即聖人聖德同天見乎天位為天下所利見天地位萬物育所謂乘龍御天首庶物而萬國寧者也傳曰大人造文言曰聖人作萬物睹曰天人不違皆一意利見大人後儒皆謂利見九二之大人傳及文言則以本位言蓋本體得位而下自應之自然之象自然之占所該者博而精後儒之說因應而起象占各自為義得其一端而遺其全理上下分屬文氣亦衡决不貫學者深玩之自知翼義為聖人之言也上九句亢龍句有悔傳亢龍有悔盈不可久也文言上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也亢龍有悔窮之災也亢龍有悔與時偕極亢之為言也知進而不知退知存而不知亡知得而不知喪陽剛已極在天位之外如龍之失水澤竭而雲不行雨不施也故曰亢亢故悔其悔皆由於不知文言傳故長言之為有字補義上九亦龍德也然其位則已過矣亢宜凶且咎而剛上之過適然而悔震無咎者存乎悔其初偶不及知耳傳曰盈不可久言亢之所以悔也亦有字中精神用九見羣龍無首句吉傳用九天德不可為首也文言乾元用九天下治也乾元用九乃見天則其惟聖人乎知進退存亡而不失其正者其惟聖人乎羣龍六龍也六爻皆變則仍乾之全體矣六爻適均非若上九之獨出于上也渾然元亨利貞之神也不可為首非不能為首也六龍皆見不可得其首也龍見而不見其首屈伸變化存乎其神易辭皆為筮設繫辭傳言之詳矣左傳昭十二年龍見絳郊蔡墨曰龍水物也水官棄矣故龍不生得不然周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉觀此則用九固乾卦六爻全動之辭與上九實别為一則朱子據此自當而毛西河主荆公之說必欲併上九為一且以蔡墨之說為未嘗分過矣上曰有悔此曰吉明是兩占之辭不必為過渺之論也見羣龍無首六爻皆九之全象仍此元亨利貞之意而無有間斷不可端倪也與他卦體象毫不相涉朱子以為全動之占又以為九之凡例亦騎牆之見坤句元句亨句利牝馬之貞句君子有攸往句先迷句後得主句利西南得朋東北喪朋句安貞吉傳至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆大象地勢坤君子以厚德載物文言坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行繫辭坤道成女坤作成物坤以簡能效法之謂坤夫坤其靜也翕其動也闢是以廣生焉闔户謂之坤夫坤隤然示人簡矣夫坤天下之至順也德行恆簡以知阻說卦天地定位坤以藏之致役乎坤坤也者地也萬物皆致養焉故曰致役乎坤坤順也坤為牛坤為腹坤地也故稱乎母坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑雜卦坤柔偶也陰儀也因乾有象畫之所以偶地之二萬象之成也六畫皆偶陰之純也最順故名坤筮者十有八變六爻皆偶坤之體也元亨而利且貞其為利貞也不先物而悠久無疆柔順之至也故有牝馬之義焉所以著其為坤道也亦坤之元為之也何也坤之元順德也君子于此有所往也先則迷後則得所主是以西南陰方巽離與兑皆不先物得其朋類東北陽方所主在焉從一而終亡有朋儕此不先迷而俊得所主者所以為利蓋安順貞固坤道也故吉元亨利貞坤道實配乎天矣然著其為牝馬詳及于先之迷後之得主又以見坤之元亨利貞皆順德而不同乎乾之健也細繹翼文則元亨利貞言各有當與卦為體無庸從同僅以大通而利在正固了之不得也利牝馬之貞言利貞之柔順耳猶書言𤣥纎縞古文簡奧語也先迷後得主本義因其文之澀而以先迷後得為句主利又句與翼義不合臨川吳氏以先迷後得主為句利西南得朋東北喪朋又句深得翼義來氏知德據九家易坤為迷謂先迷為坤象如唐武后専政之類不知此大悖乎坤道者何得謂坤本有迷象鑿象者之所以害義也初六句履霜句堅冰至傳履霜堅冰陰始凝也馴致其道至堅冰也文言積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也筮者三變皆偶除掛一歸餘其見存之䇿凡二十四四其六也故純陰之爻稱六霜凝陰之先見者也堅冰陰盛陰在初故曰履其曰至則因履而知之也王氏應麟曰乾言勿用即復卦閉關之義坤言堅冰即姤卦女壯之戒按臨遁之浸而長義俱相因蓋六卦皆陰陽之限也然乾坤以爻見復姤臨遁于全象見又大小本末之殊說履霜者多主抑陰然陰所以配陽不可相無臨遁之浸而長不可相勝也若得時得正亦足見順承之功或又以陰為小人則六二之直方大六五之黃中通理豈盡小人乎惟偏戾而不得所居乃失陰之德斯小人耳本爻是謹幾意堅冰則必不能為六二之直方大六五之黃裳六三之含章六四之括囊而直為上六之龍戰矣此履霜之所以致謹也傳曰馴文言曰漸曰順皆一意陰爻稱六以所得動爻見存之䇿四其六也若五爻俱動而别其不動之爻則一偶二竒見存之䇿三十二是四其八矣亦可稱八左傳晉公子重耳筮返國得貞屯悔豫而曰皆八穆姜往東宫筮得艮之隨而曰艮之八由此例之則乾之不變爻亦得稱七而専稱九六何也變也七八不變而九六變何也九六數之盛也七八少陽少陰陰中陽陽中陰未嘗純乎陰陽也夫何變傳曰爻也者言乎其變者也變化者進退之象也六二句直句方句大句不習無不利傳六二之動直以方也不習無不利地道光也文言直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也直者元德所謂至哉坤元萬物資生至柔而動剛也方大者亨德所謂坤厚載物德合無疆含𢎞光大品物咸亨至靜而德方含萬物而化光也不習無不利則利牝馬之貞所謂行地無疆柔順利貞承天而時行安貞之吉也六二柔順中正得坤道之純故其德內直外方不待强習而自無不利敬義立而德不孤至于不疑所行方完六二中正之藴敬以直內義以方外坤道如是可以達天可以配天矣蔡氏清曰坤之六二柔順中正得坤道之純是又當得一全坤也若初則陰之微上則陰之極三則不中且不正四則不中五則不正惟六二柔順中正獨得坤道之至純地勢之全象六三句含章句可貞句或從王事句無成有終傳含章可貞以時發也或從王事知光大也文言陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也六柔體三處下卦之上俯從乎二二陰之至美者也而三從之內蓄而不以外炫故曰含章夫蓄而不炫則正固之道也故曰可貞可貞者守以待時也或從王事則其時矣夫三居下之上比二之中正可有事者也然以順為正故不居成功而能終于所事終事貞也貞則地道光也故傳曰知光大乾以五為主坤以二為主乾仰而進坤俯而從乾四近五坤三近二故皆曰或或者審時之辭也六四句括囊句無咎無譽傳括囊無咎慎不害也文言天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也陰主翕受囊象也四上下之交有似乎囊口出入之地四多懼懼則慎而持之為括結囊口之象括囊則慎矣故無咎而亦無譽無咎是主故傳専釋無咎無咎無譽即在括囊上見王良曰龔勝之有名不如申屠蟠之無譽其括囊之謂乎六五句黃裳句元句吉句傳黃裳元吉文在中也文言君子黃中通理正位居體美在其中而暢於四肢發於事業美之至也六五柔中文飾之盛故以服色見義黃中色裳中服五得中故有此象順德中存有坤之元於是乎吉諸家槩以五為君位非也卦有主象有正位乾坤兩卦陰陽之大者為六十二卦之宗與他卦異乾主象九五是其正位坤主象六二是其正位是以乾尊九五坤尊六二至六五則僅以中取象黃中色裳中服乾天坤地天尊而地卑卑者地之體也黃之為裳質雖美不可以加上體觀黃裳之象知聖人繫爻未嘗豫坤五之為君也乾卦皆君德坤卦皆臣道聖人明陰陽之大分為易第一義上六句龍戰于野句其血𤣥黃傳龍戰于野其道窮也文言陰疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃陰極于外不能承乾與陽相亢失坤之道彼此為敵兩敗俱傷故有此象坤對乾其極象乾故亦稱龍焉亢不相下故言戰在卦外故言野質本陰故言血𤣥黃陰亢陽而色雜著也言象而占之凶在其中乾上止言有悔憂悔吝者存乎介介焉有知則用九之吉在焉坤上至于戰傷則凶不可言陰禍之烈如此來氏知德曰堅冰至者所以防龍戰之禍于其始龍戰野者所以著堅冰之至于其終用六句利永貞傳用六永貞以大終也因上六之陰亢而著易之用也六何用善正其用也六爻皆動則坤用而從乾矣柔而常正地天成泰貞不失元六之所以善其用也坤道安貞悠久無疆則配乎乾而後順得常故傳曰大終先儒皆謂用九乾全變坤用六坤全變乾乾變坤猶可言也坤變乾則柔竟可為剛而上六何以有龍戰之戒乎不知見龍無首剛濟以柔也利永貞陰從乎陽也陰以從陽為正戰龍先迷所以失道也坤貞失矣永貞則後順得常悠久所以成物也不失坤道之常斯乾應而仍有安貞之吉陸氏振竒曰元亨利貞雖乾坤有同德然乾重元以元為統坤重貞以貞為安何氏楷曰乾道主元故曰乾元用九坤道主貞故言用六永貞二家得乾坤二用之正理勝于諸儒繫辭天尊地卑乾坤定矣乾之䇿二百一十有六坤之策百四十有四凡三百有六十當期之日乾坤其易之縕耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤乾坤其易之門耶乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德屯句元句亨句利句貞句勿用有攸往句利建侯傳屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧大象雲雷屯君子以經綸序卦有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也雜卦屯見而不失其居乾交坤初為震交坤中為坎八卦相蕩乾坤之後震上乘坎二剛四柔震本乾坤之初交而坎難方生震動乎坎險之中因名曰屯屯文從屮貫一屈而欲舒天時人事之初起如之筮得屯象者氣始交而方長坎中陷而必伸震乎坎中當元善亨通而利遂貞固然坎險在前故勿用輕有所往震男為主故利建侯勿用有攸往非不往也不得輕有所往也震為主而遇坎大有為而不輕為者也故傳又著其象而重申之以盡震坎之性情發明彖文勿用有攸往而利建侯之義也初九句磐桓句利居貞句利建侯傳雖磐桓志行正也以貴下賤大得民也磐與盤通磐桓進不遽進之象因屯而言故擬震動之初曰磐桓玩傳雖磐桓明甚象家以為柱石者不合本爻剛健鎮定在震體之初為濟屯之主故有此象貞正也利居貞猶言大居正也震體無不行之勢而初爻剛正才大出以小心處卦之下成卦主象接引羣陰為衆所歸故利居貞而利建侯也磐桓而正剛長在下彖所謂宜建侯而不寧者也濟屯主爻也時位之正也故専以主象明爻不及應比胡氏炳文曰文王卦辭有専主成卦之主而言者周公首于此爻發之卦主震震主初磐桓即勿用有攸往利居貞即利貞卦言利建侯者其事也利于建初以為侯也爻言利建侯者其人也如初之才利建以為侯也此條深得卦辭爻辭分合指歸六二句屯如邅如乘馬班如匪冦婚媾女子貞不字句十年乃字媾鄭作冓誤傳六二之難乘剛也十年乃字反常也六二柔中其位甚正而其時方屯其體則震又切乘初剛難以自安故不免於屯邅之患然以柔中之德處之則惟常理之為守久而不渝亦久而得正也皆位之善為之也屯如行不自遂之象不如初之磐桓矣馬謂兩剛皆有相求之象故言班如而初剛猶切六二柔內女子之象貞守己以待正也十年數之一終也字許嫁也陰之為性從陽為主然女子之義從一而終今二有五為正應而下乘初剛迫而求之所謂切近災者似冦而非冦也求婚媾也然二德中正待應于五故雖求之迫而不之許至于十年理數一周乃得復乎應與之常而許之君子以身許人當其時者亦如是即象即占屯如邅如乘馬班如匪冦婚媾女子貞不字皆難在乘剛也十七字作一句讀十年乃字則反常也四字一句屯六二比應兩剛羣分類聚情相關切象曰馬曰婚媾傳曰乘剛曰反常皆以比應明爻而斷之以中正之德故始屯而終合也毛西河易極譏朱子字訓許嫁之非謂禮女子許嫁笄而字男子冠而字字命字也男子焉能許嫁不知女子許嫁而後笄而字與男子之必冠而後字同不許嫁即不字矣訓字為許嫁極合何礙于男子之冠且亦非朱子創解也朱子曰耿氏解女子貞不字作許嫁笄而字貞不字者未許嫁也却與婚媾之義相通伊川說作字育之字其于字義蓋思之已審矣又西河易及來瞿塘易俱以坎為盜為冦象是仇視其正應且不知所謂乘剛之為難文意俱衡决不貫六三句即鹿無虞句惟入于林中句君子幾句不如舍句往句吝鹿虞翻王肅作麓以倒艮互艮為象謬幾鄭作機傳即鹿無虞以從禽也君子舍之句往吝窮也鹿麓通虞掌禽獸之官書曰汝作朕虞若虞機張皆官名六三偏暗而危居震之極接坎之初妄動貪求絶援寡助如即麓者之無虞羣陰聚集上迫坎陷故曰林中無虞者必蹈之矣屯也君子見幾不如舍去若往而不舍徒取窮吝吝即入林之窮時方屯而六三柔暗不中在多凶之地羣柔相聚以震終而接坎下往而必窮之象有屯而已矣時位不善應比亦不濟也六四句乘馬班如句求婚媾句往句吉句無不利傳求句而往明也六四近五而陰柔有志濟屯而才不足非有剛正者與之共濟不能也初本成卦之主而為四正應是固已所依歸而相得同心者也剛柔相與有婚媾之象求初求之也主也往往濟五之屯也初求而四共往也內度之已外度之人自知既真觀人已審共濟時艱此為最良吉無不利利建侯之次也彖言勿用有攸往而四之往則吉無不利何也曰求也傳求字一讀則其義著矣當屯之時應初承五剛柔相關二四同功其象略同義尤専一無岐視之情較二之時物尤善故吉先儒俱謂四求初而往來氏知德謂四求而初往皆未安凡卦自內而外為往自外而內為來震有振動之才初為成卦之主求無疑也至往則難言于從初矣蓋初有求于四而四因初之求乃共往以濟五之屯也不然五已陷于陰矣肯求之乎傳辭求而往三字已自分明須玩而字五在坎中非柔所能濟而四與應往以濟之四方為初用而不為陷矣何不利哉九五句屯其膏句小貞吉句大貞凶傳屯其膏施未光也五居尊位而為屯之主以坎為體剛陷柔中雖有施為未能光大能無屯乎坎水潤澤有膏施意故為屯膏之象小貞小事大貞大事魏氏了翁曰周禮有大貞謂大卜如遷國立君之事五處險中不利有為但可小事不可大事曰小貞吉大貞凶猶書所謂作內吉作外凶用靜吉用作凶者以九居五其位雖善其時不善也餘不足言矣况其羣類皆柔乎九五至屯膏而尚可為乎上六句乘馬班如句泣血漣如傳泣血漣如何可長也陰柔無與坎體屯極去初已逺處于兩剛之外情不相與故雖乘馬班如而進無所往憂傷莫釋其凶可知雖有兩剛班然而上六出乎其外其屯已極復何為哉無可為求無可言婚媾泣而已矣䝉句亨句匪我求童䝉童䝉求我句初筮告再三瀆瀆則不告句利貞瀆說文作黷傳䝉山下有險險而止䝉䝉亨以亨行時中也匪我求童䝉童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆䝉也䝉以養句正句聖功也大象山下出泉䝉君子以果行育德序卦屯者物之始生也物生必䝉故受之以䝉䝉者䝉也物之稚古作稚也雜卦䝉雜而著屯之覆也坎來居內震反為艮文王觀此艮下有坎坎險艮止向往無措因名曰䝉天地之性人為貴知覺之良感而通筮得䝉象者有亨之義焉何也童䝉之向亨視乎其志九二剛中以為質而六五虛中以為應感發真切彼此誠孚是則實能求之記所謂禮聞來學不聞往教者志之應而時中之道也此如筮然誠一則應私雜則否今九二剛中髙明純一䝉而亨之本也若稍涉偏暗非其時而煩瀆之則我求童䝉矣此養䝉之道所以利于正也童䝉求我匪我求童䝉言二五之中正志之誠應而䝉之可以亨也初筮告再三瀆瀆則不告言必如九二之剛中誠一不二而䝉乃可以亨也五句只作二句讀俱明亨字意利貞即在其中志應非謂六五之能應謂坎體中實之志能與五為應也初筮告以剛中也正申明之先儒以九二為發䝉之人經文我字告字均屬焉義有未安詳玩聖人彖傳初筮告以剛中也明謂九二剛中乃足以亨非謂以剛中發人之䝉也且屯初九為屯而能亨主象䝉九二為䝉而能亨主象皆據其才而言屯初九能亨時之屯䝉九二能亨己之䝉也即九二卦辭子克家亦以其為䝉而能亨之主象未嘗謂其為發䝉之主也聖傳之精殆不可易至本義分别筮者之明不明亦無著證天地開闢原有屯䝉之象屯莫切于建國䝉莫切于䝉養作君作師名義最切最大初六句發䝉句利用刑人句用說桎梏以往句吝傳利用刑人以正法也坎下䝉初又其質陰柔冥然罔覺正須警發故象曰發䝉得此爻者如馭冥頑以法正之則小懲而大戒妄希刑措則養奸而釀害故用刑則利而釋法則吝時䝉位下以柔暗居之䝉昧而不能遽亨者宜有以警發之傳曰正法其義已明切無遺不必及其承比也本義用說桎梏謂宜暫舍之以觀其後程傳大意略同俱將用說桎梏為句以往又句故云爾玩聖傳祇釋利用刑人句而不釋下文以下文即上文之反也用說桎梏以往作一句讀從二王及來氏為妥于文義亦順九二句包䝉句吉句納婦吉句子克家包陸德明作苞鄭康成云當作彪文也謬傳子克家剛柔接也包容也九二剛中包容羣柔六五柔中相為應與主乎中而接乎柔實能容之爻之最善者故吉柔從乎剛故曰納婦坎中男為主于內而統羣陰故曰子克家包䝉象也吉占也納婦吉又占中之象而吉之類也納婦克家皆包䝉之吉也九二䝉亨主象傳所謂剛中而志應者時位物皆善羣陰相含剛中為主足以正之子曰克家䝉之最善者矣子克家主䝉而言與屯初九利建侯同建侯開國也克家承家也六三句勿用取女句見金夫句不有躬句無攸利傳勿用取女行不順也六三偏暗䝉之甚者時物皆乖而上九相應九二相比陰陽相求有婚取之象然羣分類聚陰以從陽為主女以從一為正不一則爭不正必亂爻不中正惟陽剛相得者之為利豈能俯從乎二此行之必不順者也故勿用取女金夫剛也相應見也不有躬不中不正也無攸利所以勿取相應者情相關故上九為金夫二雖同體而不能有六四句困䝉句吝傳困䝉之吝獨逺實也四柔暗處羣陰之中與陽明相隔將從上而隔五將從二而隔三又不相應欲亨通而不能者故曰困䝉困不能亨占此者吝六五句童䝉句吉傳童䝉之吉順以巽也䝉之所以亨非剛中之質必中而應乎剛六五得中與九二為應良知良能赤子之心䝉而能亨者也又艮體少男故曰童䝉有覺之天感而自動理順而志巽日進髙明占此者吉之象也上九句擊䝉句不利為冦句利禦冦擊馬鄭皆作繫誤傳利用禦冦上下順也九陽剛居上當䝉之極昏昧已甚者非若初之可以桎梏懲也必大用威伐乃足正之書所謂攻昧者也故曰擊䝉興戎曰冦無故興戎則䝉在我故不利為冦彼䝉而我擊之則可以遏亂故利在禦冦上九具剛斷之才六三在下順而應之用此為擊無不利者坎為冦盜艮為止亦禦冦之象也需句有孚句光亨句貞吉句利涉大川需歸藏作溽鄭康成又讀作秀傳需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也大象雲上于天需君子以飲食宴樂序卦物稚不可不養也故受之以需需者飲食之道也雜卦需不進也坎乾之再交八卦相蕩乾上乘坎二柔四剛與訟相覆推乾下坎上而九五得中文王觀此坎險在前而乾健在內不欲陷乎險中因名曰需人事之有待如之筮得需象者九五得位為卦之主陽中實與乾德相孚合故昭明而宣通所以正固而吉也不往則已往必有功乾健坎川健行臨乎坎險健而不陷才足以濟涉大川之象也有孚光亨貞吉九五爻象義利涉大川卦體象義初九句需于郊句利用恆句無咎傳需于郊不犯難行也利用恆無咎未失常也邑外謂之郊平曠之地九陽剛在需之初坎險尚逺故曰需于郊占此爻者守其常而不失斯無咎之道九二句需于沙句小有言句終吉傳需于沙衍在中也雖小有言以吉終也鄭康成易沙作沚孟喜易沙字下有衍字楊慎曰衍寬平之地毛際可曰左傳有易衍漢書有酈衍皆此文按沚渚也二未至坎沚不合象蓋沙字之誤至沙字下有衍字則因傳繫而增入者與于郊于泥俱不類從今本為正說文從水從少言水少而沙見也坎為水沙近水之地九二剛中當坎險將近之時健而能需故有此象水在則沙形焉事在則言傳焉當此者雖上當坎險小有危言然剛正得中不進于險終必獲吉九三句需于泥句致冦至傳需于泥災在外也自我致冦敬慎不敗也三近于坎險陷在前如水之逼而泥濘也故曰需于泥說卦傳坎為盜冦也然險在外卦猶未至也其竟至也由已致之三以陽居健極乾惕自守我不玩冦則猶可及止也故占不言凶而傳曰敬慎不敗六四句需于血句出目穴傳需于血順以聽也血憂恤也大戴禮血者猶血注血憂色說卦傳坎為血卦需于血即需于坎言至坎而需以别乎臨險者也在險何别乎臨險也臨險者慎不犯也在險者恃有援也六四上承九五下應初九上順以聽主而不陷下順以聽應而能濟入險未深從此出矣故曰出自穴先儒釋血字以見傷言與象不合文亦不貫又據六四柔正釋出自穴與聖傳不合失爻之用九五句需于酒食句貞吉傳酒食貞吉以中正也據坎而言則陷險中矣然在乾上與乾一體當需之尊位而陽剛中正孚于心光于事亨于時貞于理為全卦之主而得需之大者不可偏端小義求所謂必世之仁百年之善使民樂其樂而利其利者大象觀雲上于天而繫之曰君子以飲食宴樂全主此爻而言樂府有需雅食舉則奏之義取諸此又坎水酒泉之象中實飲食之象五中正貞固之義需之最吉者上六句入于穴句有不速之客三人句來句敬之句終吉傳不速之客來敬之終吉雖不當位未大失也穴坎也上爻坎終已入于穴之象不中不正不當其位宜其不吉然六極陰柔近比九五下有九三為應遙合乾體急于救援柔濟以剛必終出險故吉三人謂乾三陽陽性主進故不速自來六柔順故曰敬傳不當位以上六所居不中不正居險之極言與困上六困于葛藟未當也同而來氏知德以初二與三皆來為不當位失傳意訟句有孚句窒句惕句中吉句終凶句利見大人句不利涉大川窒鄭作嘻傳訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也大象天與水違行訟君子以作事謀始序卦飲食必有訟故受之以訟雜卦訟不親也需之覆也坎來居內乾往居外乾剛坎險內險外健因名為訟記曰無情者不得盡其辭大畏民志志者所以孚也窒鄭康成作嘻云覺悔貌馬融讀躓猶止也俱通先儒有孚窒為句惕中吉為句費辭難解來氏于有孚以下窒惕中吉四字各自為句但中字語氣未足今窒惕二字分句從來氏中吉二字合句從九家易需覆為訟坎自外來九二得中所以有孚剛而得中不過于剛所以窒焉思止惕焉內省不至終訟吉之道也不窒不惕則終訟而凶且乾往居上九五得中居尊大人也能聽訟而使無訟者或虞芮質成如文王或為之辨明如仲由或使其心化如王烈或為之和解如卓茂或不與之校如直不疑皆是也所以利見川坎象坎內乾外險而且健以此涉險馮河者也天上水下健不能濟死而無悔故不利剛來得中不必用虞翻卦變只依文王序卦雜卦反覆相推之法處處渾合乃見本原初六句不永所事句小有言句終吉傳不永所事訟不可長也雖小有言其辨明也六陰柔才弱居訟之初不能終訟者也事即訟之事也有事則有言訟以不終為吉訟不能終雖小有訟言而心知非敵不敢與校則辨于己者已明是以不永所事故終吉小有言即不永所事蓋言者其事也不永所事則小有言而已玩聖傳其辨明王氏弼謂雖不能終訟而必辨明來氏知德謂小有言者小有言語之辨白終吉者得辨明也如所說則已有終事之才矣皆與初六才柔不終訟之象不合由看傳辨明二字為辨明其事不知其為人己之辨明也本義専以不能終訟言爻象傳義俱在其中先儒以災釋言看來言即所事之言後漢梁相訟節王暢不道暢上疏謝詔曰易不云乎雖小有言而終吉此足以證九二句不克訟句歸而逋句其邑人三百户無眚傳不克訟歸逋竄也自下訟上患至掇也九二陽剛上對九五剛與剛敵訟矣然九五位尊九二位卑以卑抗尊必不克也不克故歸逋逋則知畏罪避患故邑人得免咎眚眚小失左傳所謂不以一眚掩大德者是也坎為多眚動而得中故曰無眚坎亦井邑之象九二剛中有孚當訟之時宜于窒也不窒訟矣今以下訟上至于不克然後惕息歸逋不敢終訟猶得全其邑人仍不終訟之吉也訟無他吉免禍即其吉也鞶帶三褫豈吉也哉或以此爻與彖義不合非也六三句食舊德句貞句厲終吉句或從王事無成傳食舊德從上吉也六三質柔外接純乾舊德猶云先業乾為坎父又臨于爻上如先人然柔而從之安享順受是則衣租食稅承其先業能守乎正不敢干訟三雖危地其終自吉夫以三而承乾亦或從而有事矣然陰柔者其質承順者其性不居成功仍食舊之貞也聖傳不釋下文者見無成之為善也或從王事無成即不食舊德之貞食舊之吉猶云享成福受餘廕云爾無成地道代終之事六之體也來氏謂柔順有餘而剛斷不足安能從王事若重惜其柔也者不知爻之所以吉者其柔也毛西河以食為食言之食如噬沒之意與傳所謂從上吉之義悖九四句不克訟句復即命句渝句安貞句吉傳復即命渝安貞不失也復返也即就也渝變也如鄭人來渝平之渝九陽剛乘險訟也不中不正未孚也自反不縮訟之不克者也四承九五臨險知懼能自反而復就乎理是以渝改初心而安于正不至有失故吉龔氏原曰二與五訟四與初訟其與為敵者强弱不同而皆曰不克者蓋二以下訟上其不克者勢也四以上訟下其不克者理也二見勢之不可故歸而逋竄四知理之不可故復而即命九五句訟元吉傳訟元吉以中正也九五陽剛中正居尊御下在訟之中無與倫比故為聽訟之大人而凡訟者之所利見也書曰惟明克允曰民協于中曰惟兹臣庶罔或干豫正詩曰虞芮質厥成是斯位矣元吉吉之盡善者也上九句或錫之鞶帶句終朝三褫之鞶王肅作槃義近似褫鄭氏作拖謬傳以訟受服亦不足敬也鞶帶大帶命服之飾革剛而象圜致飾于外者上九處訟之極健之過下應六三柔不能敵克訟者也故有錫服之象然克訟則終訟矣終訟而凶其常也錫服其偶也故曰或上九剛極過剛則折故有褫象陽性暴烈居上尢甚强弩之末不能穿魯縞勢也故終朝而三褫此不于褫知之也當其受錫已知之故傳曰亦不足敬正爻辭或字之情易翼宗卷一
