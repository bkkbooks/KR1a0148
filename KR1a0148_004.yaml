body:
  text: 易翼宗卷四湖北巡撫晏斯盛撰下經咸句亨句利貞句取女吉傳咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣大象山上有澤咸君子以虛受人序卦有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯雜卦咸速也乾坤剛柔之大分咸恆剛柔之交氣恆之剛上柔下得內外之常理而咸之柔上剛下則陰陽之交情此其所以為下經之首也陰陽交故感兑柔艮剛兑女艮男而兑上艮下大象之感也初與四二與五三與六彼此相應艮止兑說彼此倡和體德之相感也以理而言感則通亨也以情而言兩少相宜而得正利且貞也以事而言陰陽男女情理相交婚姻之善取女吉也剛柔本乾坤而該萬物王道本乎人情此心此理有應皆感然感非有心也故咸之為文感而無心六爻之動皆有心也故以淺深為得失大象君子以虛受人故六爻皆宜靜不宜動繫辭傳所謂寂然不動感而遂通天下之故程子所謂廓然而大公物來而順應周子所謂主靜朱子所謂鑑空衡平皆所謂無心之感也初六句咸其拇子夏傳作跚荀爽作母誤傳咸其拇志在外也咸之最切莫如一身故諸爻皆以身取象拇足之大指最居下體咸之初爻感之最下者所感最淺故以取象拇動身不必動也而意已相屬初六之動志在九四所感尚淺未有實事故不言吉凶然吉凶亦槩可知矣六二句咸其腓句凶句居句吉腓荀爽作肥誤傳雖凶居吉順不害也腓足肚也不動者也下體之中也感及其腓則不動者欲動矣六二至靜而感及焉氣一動志也妄也此所以凶然艮體而六二柔中還其靜幾居守其中不為撓動則仍不感干物矣故吉先儒俱以上應九五不待求而感謂即凶義于其腓之文不協六二在靜正之中正順而不害之實居吉之理甚明無庸别生意義九三句咸其股句執其隨句往句吝傳咸其股亦不處也志在隨人所執下也三居下體之上股象也九以陽剛居偏逼之地欲動者也然不能自主也必隨上體而動蓋感于上兑之說者也程子所謂陽好上而說陰者正得其情執持也主也主于隨上也卦象男下女三上其最切者故傳曰所執下且夫倡婦隨禮也所執者在隨則不自為政非夫婦之道故往吝本義三隨初二而動失咸感之義程傳隨上從應得卦意九四句貞吉悔亡句憧憧往來句朋從爾思憧京房作􅚸傳貞吉悔亡未感害也憧憧往來未光大也繫辭易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此已往未之或知也窮神知化德之盛也爻當兩感之交人心之位為咸之主故直言感應之理而不言咸其心所以别于諸爻也貞正而固也靜也靜則虛以受人百感雖紛而中自一也寂然不動感而遂通天下之故廓然大公物來順應如鑑之空如衡之平也九四以剛為主而不豫期于初六之應未嘗以感為心害此所以吉而悔亡也此其本然也往來感而不已以本爻在交感之際又申言之憧憧猶言營營繫心于往來也不貞也朋同類也從牽附也猶言紛擾失其心之本體皆客感也悔之所由生也九四剛而不中下應初六則隂私之感亦不能免故傳曰未光大光大者心之體精義入神而利用安身以至窮神知化乃為光大光大者貞夫一者也九五句咸其脢句無悔傳咸其脢志末也脢馬融云背也鄭康成云脊肉也王肅云在背而夾脊孔頴達云大體皆在心上蓋切近于心之處九五中正上比上六而乘四是柔說者在上而五之心有定向也是往來者在四而五固安然也志在上六二雖相感不為之動故無悔切問而近思其猶愈于逺乎不尤愈于憧憧乎上六句咸其輔頰舌頰孟喜作俠誤傳咸其輔頰舌滕口說也兑為口上六正其開合之處而位居卦外是感之在外者也感之在外者言語而已輔口輔頓齒頰舌在中皆口之所以言者感人以言感之無實者居咸之末不足以成感矣仁言不如仁聲之入人深也美言其可市乎恆句亨句無咎句利貞句利有攸往傳恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣大象雷風恆君子以立不易方繫辭恆德之固也恆雜而不厭恆以一德序卦夫婦之道不可以不久也故受之以恆恆者久也雜卦恆久也咸之覆也艮剛上而為震兑柔下而為巽男女內外尊卑之常震雷巽風象之常巽入震動德之常初柔四剛二剛五柔三剛上柔應之常四者皆恆理也故名恆以恆之體言則天道久而不已之誠也故亨通無過咎而皆利于貞貞正也所以為恆也以恆之用言則天地終始不息之運也故健行而利有攸往恆得天地之大用故其行亦似之初六句浚恆句貞句凶句無攸利浚鄭作濬傳浚恆之凶始求深也浚深也恆常也定也不苟動者而初動焉不已早乎猶所謂交淺而言深者也求親愈疏事所必至以剛柔之交言之巽女也其性入震男也其性動方結褵而即責以夫婦之常道反目之勢也若必往而從之必不宜矣初與四雖為正應而情不應也故凶而無攸利九二句悔亡傳九二悔亡能久中也浚恆不逺宜有悔矣然九二剛而得中則恆之能以中而久於其道者悔之所以亡也本爻獨得恆理若初之浚三之不恆四之羞上之振皆失中也程氏逈曰大壯九二解初六及此爻皆不著其所以然則以爻明之也九三句不恆其德句或承之羞句貞吝或鄭作咸大誤傳不恆其德無所容也恆之為德中而已矣無過分者九三剛而不中在恆上下之界是不恆也志在上進動輒得咎二四既不能比上雖應亦不能合也或者不一之辭九四句田句無禽傳久非其位安得禽也震動之象最常者莫如田獵田非其地安所得禽以恆之理言則以陽剛之性處交接之地與不恆其德者同也六五句恆其德句貞句婦人吉句夫子凶傳婦人貞吉從一而終也夫子制義從婦凶也恆之德在中六五得中故亦曰恆其德然柔而得中固正也夫恆久之道惟剛健斯為不已不息之常五位雖尊而六則已柔是蓋以順為正者婦人之恆也丈夫而徒為柔順則不恆矣故凶此其所以不如九二之剛也上六句振恆句凶振說文作搘虞張作震俱誤傳振恆在上大無功也恆已可久矣而上六以陰僻之才震動之體當恆之終則是欲舉常理而振撓之非徒無益於天下反有禍于生人凶之道也語曰害不什不變法利不百不更制可不慎與遁句亨句小利貞傳遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉大象天下有山遁君子以逺小人不惡而嚴序卦物不可以久居其所故受之以遁遁者退也雜卦遁退也咸恆隂陽感應之交遁壯陰陽盛衰之際故遁壯次咸恆遁退避也陰浸長陽避隂也然當遁之時亦有亨理以卦體觀之九五剛正得中當乎尊位而六二柔正得中與之為應才足有為隨時補救當不至于否塞也苐隂勢方長欲大聲疾呼行其直道得無激小人之怒而失時中之道乎小利貞則權而得正此嘉遁之所以為貞吉也初六句遁尾句厲句勿用有攸往傳遁尾之厲不往何災也尾下也凡物首上而尾下以遁之全體觀之則初固尾也六陰柔而處下才不足濟陽方遁而情不屬危矣厲危也即災也故占者勿用有所往不往斯不厲先儒俱以先後言尾多不可通以乾用九之見羣龍無首及未濟上六之濡首觀之則首尾固以上下言也六二句執之句用黃牛之革句莫之勝音升說音脫傳執用黃牛固志也六二在隂陽之際陽遁而上隂又迫之去交幾絶矣幸而德本柔中上應九五當固執其相應之志而不可解則在遁避之時上下仍相親也儻聽陽之去而不合五以相濟不將否而剝乎艮堅確黃中色牛柔順皆六二本象不必以外卦錯坤為牛九三句係遁句有疾厲句畜臣妾吉繫李鼎祚陸德明俱作係傳係遁之厲有疾憊也畜臣妾吉不可大事也陽之遁陰其時也而下比二隂係戀而不能去是已為羸憊之疾矣危道也當此之際惟以畜臣妾之道處之斯為吉天下惟女子與小人為難養蓋近之則不遜逺之則怨時雖有所係而剛正在已不逺不近則彼亦不敢肆矣此傳所謂君子以逺小人不惡而嚴之道也若羈係于此而欲大有所為舉小人而嚴以逐之其如勢之不可何哉九四句好遁句君子吉句小人否傳君子好遁小人否也好遁者君子絶交不出惡聲徐徐焉而去耳九四既已脫然于陰之外而下應初六未嘗痛加斥棄不惡而嚴君子之道固然也吉可知矣彼小人者亦安知君子之心哉未䝉小懲終罹大戒故否九五句嘉遁句貞句吉傳嘉遁貞吉以正志也居尊得中有應于二此其遁之亨嘉者也陰方逼陽而六二得中其志猶固則九五在上以中正之德正之吉之道也然曰正志則不惡而嚴亦可知矣此遁而亨之事也亨者嘉之㑹嘉即亨也故彖曰遁亨此曰嘉遁上九句肥遁句無不利肥淮南子作飛音誤傳肥遁無不利無所疑也肥與疾憊異脫然事外超然逺引者也上九之所以異于九三也九三繫比于二故疾上九外逺于陰故肥肥之為言足也昌黎盤谷歌曰虎豹逺跡兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮夀而康無不足兮奚所望其肥遁之謂乎大壯句利貞傳大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣大象雷在天上大壯君子以非禮弗履繫辭上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯序卦物不可以終遁故受之以大壯雜卦大壯則止大壯遁之覆推大陽也壯盛也陽至于四則盛矣內乾剛而外震動又壯之德也此卦之所以名然大壯之所利者惟其正也大壯之震剛而不過也中也九二之貞是矣次之則九四也若初之壯趾三之壯罔其何所利乎此君子所貴非禮弗履也禮也者中也天地之情正大也中而已矣初九句壯于趾句征句凶句有孚傳壯于趾其孚窮也壯有躁動之象動于初故曰趾位卑處下既無能為亦無可為往則窮耳凶也雖有剛實之志而自信之過終不免于窮也九二句貞句吉傳九二貞吉以中也彖曰大壯利貞傳曰大者正也九二在內卦之中是剛而得中不過于剛則中即所以為正也彖之所謂利貞者也故吉九三句小人用壯句君子用罔句貞句厲句羝羊觸藩羸其角羸王肅本作縲鄭元虞翻作纍蜀才作纍傳小人用壯君子罔也卦本陽剛太盛而爻又居乾剛之極位偏承動一于壯往小人之事也君子則非禮弗履罔用壯者三志剛而地危不得為正也非彖所謂利貞矣彖變為兑兑為羊而羝又喜觸上卦震為竹為葦藩之象也觸藩羝之壯也羸傷敗也角剛質觸藩羸角用壯之厲九四句貞吉悔亡句藩決不羸句壯于大輿之輹傳藩決不羸尚往也九四以剛下柔不過于剛雖非中正而剛而能柔亦正也不失利貞之道非壯罔取厲者比也故吉而悔亡六五在上前無阻隔可以有為震藩也變坤則決其藩矣無復羸角之患而坤為大輿輹與輻同車下之幹輹壯則任重致逺而無難此其所以貞吉而悔亡也六五句喪羊于易句無悔羊郭京作牛易鄭音亦謂佼易誤也陸續作場易場通字漢食貨志疆場作易可見傳喪羊于易位不當也易埸通田畔也震為大塗埸之象也陽盛而陰離六五柔中而乘重剛適在震體不能無失又變兑為羊故曰喪羊于易非大壯之利貞也不如九二之貞吉僅無悔而已位之不當為之也上六句羝羊觸藩句不能退句不能遂句無攸利句艱則吉傳不能退不能遂不詳也艱則吉咎不長也九三之觸藩勢方壯也上六兩陰叢薈之際當壯之極則已觸而入藩矣其體本壯故不能退而爻位皆柔故又不能遂遂者進也人之不揆幾度理而入于叢脞之際者似之非大者之正也何利之有然處壯極而質柔是以困心衡慮不敢復用其壯咎可免矣此則其吉也晉句康侯用錫馬蕃庶句晝日三接晉孟喜作齊與躋通進也傳晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也大象明出地上晉君子以自昭明德序卦物不可以終壯故受之以晉晉者進也雜卦晉晝也晉者離之進而明出于地上也坤順而離明麗也本卦與明夷反覆相推明夷坤上而離下晉離上而坤下是離之六二進而上行于五得中居尊此皆晉之義也以明之出地上又順而麗明且二上而為五則人臣覲君寵遇極隆之象矣康侯安國之侯六五柔爻與坤同體有土者也坤為牝馬為衆馬之蕃庶也離為日中自二至五三爻晝日之三接也初六句晉如摧如貞句吉句罔孚句裕句無咎傳晉如摧如獨行正也裕無咎未受命也當晉之初柔在下位不急于進故于進而若却也此自守之正吉之道也其摧如也去上行之柔尚逺九四雖應而若或間之以其位卑未受五之命也故曰罔孚然以其貞也自覺裕以處之正已而不尤人寡過之至故無咎君子始進之難如是六二句晉如愁如貞句吉句受兹介福于其王母傳受兹介福以中正也愁如與摧如相類皆擬其處晉之心摧如不以進為急也愁如不以進為喜也蓋六二柔體在坤之中本直方大不習無不利者貞也此其所以吉也六五其同德也而六五卦主居尊如王母然故有受福于王母之象介大也王母祖母也不曰母而曰王母者孫婦袝于祖姑昭穆之禮也六三句衆允句悔亡傳衆允之志上行也大象明出地上六三日之所光臨也坤為衆三順極是心地昭然為衆所信而上接乎大明之象以視初之摧如罔孚者異矣故曰衆允占曰悔亡或曰三不中正而無悔何也晉之時也順而麗明之際也九四句晉如鼫鼠句貞厲鼫子夏傳作碩誤傳鼫鼠貞厲位不當也四切近于五而以剛處之是處髙位而猶貪于進者瞻顧日中如鼫鼠鼫鼠貪而畏日故以取象不知止者殆不知足者辱正危道也六五句悔亡句失得勿恤句往吉無不利失孟喜馬融鄭元王肅俱作矢誤傳失得勿恤往有慶也以柔中之德晉于尊位虛公無我衆陰順應悔之所以亡也虛則無欲故失得不介于心日進昭明康功受錫其所自至所以往吉而無不利也此晉之主爻傳所謂有慶者即彖康侯之錫也上九句晉其角句維用伐邑句厲句吉無咎句貞吝傳維用伐邑道未光也角隅曲也進之極而用剛直至于隅曲之地而無可復進矣將所謂大明地上者何有乎邑私邑隅曲之地也照不及逺而治其私然尤不可恃也惟以危惕之心處之斯吉而無咎若以必進之道守之則窮無所之必致愧吝明夷句利艱貞傳明入地中明夷內文明而外柔順以䝉大難文王以之利艱貞晦其明也內難而能正其志箕子以之大象明入地中明夷君子以涖衆用晦而明序卦進必有所傷故受之以明夷夷者傷也雜卦明夷誅也晉之覆推離下而坤上是明入地中失其明矣故曰明夷夷傷也然離文明而坤柔順六二中正不失其德艱難委曲自晦其明固守其常則其宜也所謂用晦而明也初九句明夷于飛垂其翼句君子于行句三日不食句有攸往句主人有言傳君子于行義不食也離為雉有飛鳥之象于飛疾飛也垂翼不敢矯羽翺翔而抑然以前也凡鳥飛有專向者翼不數習曰垂明夷之初剛明在下見幾而作不復遲回者也下遂申其義君子知傷之將至而決然以去去之惟恐其遲而三日不暇食患難之際所有事也行在道也往所行而至之處也主人所至之主家也羈旅窮迫之中市人亦得而因之小雅曰脊令在原兄弟急難每有良朋况也永歎良朋且然主人得無言乎垂翼先儒以為見傷見傷則已不能飛矣于夷初不合也不食來氏以為自悲其見傷而不食不得速去之意玩傳義不食也則其為見幾而作不暇于食之義明矣細味之上下文義皆貫程傳頗得此意其引穆生去處一段似為新切然于攸往在道時情景未合六二句明夷句夷于左股用拯句馬壯句吉次夷字子夏作睇旁視也陸續同京房作胰誤明張氏所出晉王本無此字股馬融王肅作殷左姚信作右拯子夏傳說文俱作拯傳六二之吉順以則也左股下體幸未至腹心猶可拯也拯而不速無及矣六二中正忠悃不二文明在內中乎事理變乾故曰馬壯馬壯則拯之急而禍不深故吉九三句明夷于南狩句得其大首句不可疾句貞傳南狩之志乃大得也當明夷之界正夷之所由及重隂之下九三以剛居之能救傷以為明者蓋六四積陰切近于離非至剛不能克也南離方狩征伐之事大首首惡也得之則隂去而明見矣然積染既深非可驟激宜于正固九三剛勝故有此戒周易觀彖曰先儒以此為武王之事書曰陳于商郊俟天休命記久立于綴以待諸侯之至也蓋不可疾貞之義六四句入于左腹句獲明夷之心于出門庭傳入于左腹獲心意也坤為腹卦自下而上是為左旋故古多稱左六四其夷已深六五心也四比五腹之切近者上與五同心而下承剛明孑然以去出門庭之象也其跡與五雖不同而罔為臣僕遜荒行遁其心意則一也楊氏時曰腹坤象也坤體之下故曰左腹尊右故也獲明夷之心所謂求仁而得仁也此微子之明夷也六五句箕子之明夷句利貞箕子蜀才作其子漢趙賔作荄兹誤傳箕子之貞明不可息也上六主乎傷者五最切近其傷獨深而內有中德能正其志不息其明箕子似之其為時也行諫而囚佯狂受辱不能舍去素患難行乎患難也正也故占者利貞文王囚羑里演易有筮得明夷大象之事周公爻辭因其時事之切近者而繫之箕子宗臣位父師不忘宗社切諫佯狂故以當六五聖人彖傳遂因此例觀六二之文明中正而直以文王當之可以知聖人作易聖人用易之道蜀人趙賔易箕子二字作荄兹後又作荄滋殆未合聖傳詳其時事而深求之也毛氏竒齡曰漢書儒林傳蜀人趙賔為易飾而文以為箕子明明萬物荄兹也又晉鄒氏家諱云訓箕為荄訓子為兹漫衍無經劉向云今易箕子作荄滋則在前止為訓詁而此時竟有改此二字者然曰今本則明非古本且夫子已明指箕子則明與文王之時事相類而後儒紛紛何也上六句不明句晦句初登于天句後入于地不明晦三字郭京舉正作至晦謬傳初登于天照四國也後入于地失則也明之所以夷晦也晦也者不明也上六陰暗之極所以晦而其明者皆為所夷也原其初而觀本晉也明出地上無不可以照臨據其後而觀則晉之反而為明夷晦昧無明當二卦反覆之際故推言之以見明本其所自有而自傷之是傷明者實自傷其明也家人句利女貞傳家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣大象風自火出家人君子以言有物而行有恆序卦傷于外者必反其家故受之以家人雜卦家人內也咸之似暌之覆也柔為女剛為男六居二四九居三五上女正于內男正于外象故取乎家人象兼男女而又曰利女貞者家人之道驗于內者也內正則外之正為之也周南召南極言后妃夫人之德而文王德化之盛益見王道本乎閨門其即此義乎周子曰家人離必起于婦人此家人之所以利女貞也初九句間有家句悔亡傳間有家志未變也禮始于謹夫婦為宫室辨內外間也者家人之禮也女之所以正乎內男之所以正乎外者從兹始也爻在家人之初而九二剛正故能謹乎其防而為正家之始此悔之所以亡也男子生而願為之有室女子生而願為之有家曰有家則女貞之意而男之有室其謹始之禮亦可知矣六二句無攸遂句在中饋句貞句吉傳六二之吉順以巽也無攸遂坤之無成而有終也六二柔順得中在家人之內得坤道之純者也中饋婦人之職六二在中盡婦職者也職在則道在卷耳蘋蘩詠于二南飲食服御掌于周禮家人之事王化之本也過此則豫外政鳴牝雞豈家之利乎坤貞之吉六二有焉此天下古令之常道也九三句家人嗃嗃句悔厲吉句婦子嘻嘻句終吝嗃嗃荀爽作確確劉瓛作熇熇嘻嘻陸續作喜喜張揖作嬉嬉傳家人嗃嗃未失也婦子嘻嘻失家節也嗃嗃過嚴以義勝恩始悔之中且危之而終吉九三之剛明為之也嘻嘻以情失禮義雖洽而終吝近比于柔為之也爻在上下之交故反復言之六四句富家大吉傳富家大吉順在位也以柔順乎剛是亦坤貞之位彖所謂女貞之利者也家人至四則家道之將成上輔五而下應初助內政而上下理上下理而和致祥富可知己富也者福也非僅多財之謂故為大吉之道九五句王假有家句勿恤句吉傳王假有家交相愛也假至也家道之極也是所謂身修家齊而為王化之源者也勿恤者父父子子兄兄弟弟夫夫婦婦無纖毫芥蒂之疑式相好無相尤也九五中正居尊六四六二相比相應禮立而化行極家道之盛故吉上九句有孚威如句終吉傳威如之吉反身之謂也剛居巽極故有孚與嗃嗃者異剛明在上故威如與嘻嘻者異矣孚信也假家勿恤之所有事也威禮也間有家之令儀也皆以身作則之實也此家道之成故終吉終吉也者言其吉之長逺也曾氏鞏曰家人之義歸于反身二南之化本于文王暌句小事吉傳暌火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地暌而其事同也男女暌而其志通也萬物暌而其事類也暌之時用大矣哉大象上火下澤暌君子以同而異繫辭弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌序卦家道窮必乖故受之以暌暌者乖也雜卦暌外也暌家人之覆推巽覆為兑兑為澤動而居下離為火動而居上潤下炎上彼此不交質相暌也離中女志在坎兑少女志在艮一中一少各有所歸情相暌也故名卦曰暌時雖暌矣然兑說也離麗也明也內說外明其德不爽離在家人六二本居下體暌則上行而為六五又有九二為之應其材亦足以有為此皆以柔為用也凡卦陽大陰小小事猶言柔道暌時用柔不致激變漸可轉移吉之道也何氏楷曰業已暌矣不可以忿疾之心驅迫之也惟不為已甚徐徐轉移此合暌之善術也故曰小事吉小事猶言以柔為事非大事不吉而小事吉之謂初九句悔亡句喪馬勿逐自復句見惡人句無咎傳見惡人以辟咎也暌初陽剛在下悔也然兩剛同德各不相干是無與於暌者所謂同而異也故悔亡其象如喪馬然勿逐而自復亦小事之吉也以人事言則當暌之初人巳不淑遽然絶之暌將成矣其咎安歸可見則見不為已甚後患可彌故無咎如郭汾陽之于盧杞既具先見之明抑亦無咎之道程子謂合則有暌本異則何暌于應爻獨得九二句遇主于巷句無咎傳遇主于巷未失道也巷里巷也非臣主之地而遇于斯者時正暌也以九二剛中之才上有柔中之君當暌離之時須之甚殷辱在草莽猝然來遇上下相與暌可合也彖所謂得中而應乎剛也故傳曰未失道此所以無咎張氏清子曰在暌之時惟九二獨遇六五之君故曰遇主于巷彖所謂得中而應乎剛者指此爻也六三句見輿曵句其牛掣句其人天且劓句無初有終掣說文作觢鄭作㸷子夏傳作契荀爽作騎皆云一角仰也不合文義劓說文作王肅作臲傳見輿曵位不當也無初有終遇剛也六三陰柔初二兩爻重剛在下後重前輕以柔上剛當暌之間欲行不能輿之曵也離牛象在暌之上剛柔不屬掣也其人亦本爻也當曵掣之勢有重傷之象天古而字之訛古文相類漢法有罪髠其鬢髮曰而又周禮梓人為筍簴作而亦謂髠其鬢髮也劓截鼻也柔乘剛而見傷也即無初也至于上九陽剛正應暌極可合故有終聖傳見輿曵位不當也則其牛掣其人天且劓皆在位不當中矣無初有終曰遇剛也則上九正應有不終暌之理如此明白顯易而諸家曲為之說妄也至本義以上九為髠劓益誤矣九四句暌孤句遇元夫句交孚句厲句無咎傳交孚無咎志行也九四陽剛不中居火澤之間上下離絶暌之已甚孤矣然六五相近同德相與元夫陽也與五相信故交孚四處危地故厲厲也者時暌而不遑寧處也暌而有孚志之合也亦異而同矣故無咎三四暌之主爻故上著其象此實其名六五句悔亡句厥宗噬膚句往句何咎傳厥宗噬膚往有慶也六五當暌之時悔也然柔得中而居尊故亡之宗主也親也上九陽剛在外近比六五以應之又下有九二為應彼此相須往必有合膚鼎肉噬膚宗㑹之食情相歡也彖所謂得中而應乎剛是以小事吉也故經曰無咎而傳曰有慶上九句暌孤句見豕負塗句載鬼一車句先張之弧句後說之弧句匪寇句婚媾句往句遇雨則吉弧京房馬融鄭元王肅翟子元虞翻李鼎祚俱作壺以兑為口離為大腹坎酒在中為壺象鑿甚矣傳遇雨之吉羣疑亡也上九暌深矣故孤火之與澤兩相疑也然暌已極矣極則必反疑可釋也居離火之上而下視兑澤兩剛負柔既若豕之負塗三應變乾為車隂乘乎陽又若載鬼一車疑之甚也暌之所有事也而離為兵戈為弓矢有弧象故當其疑也先張之弧及其久而疑者釋故其後乃說之弧皆為三也三為正應初疑之以為寇也至柔與剛合而無疑乃知其為婚媾也兑為澤雨也澤遇火則有相濟之功故遇雨吉丘氏富曰上本與三應不孤也暌極而疑生故亦曰孤豕鬼皆指三也上暌疑而未敢親近乎三如見豕背之負泥塗又如載鬼滿于一車始焉致疑則張弧終焉疑釋則說弧知其非而冦讎乃我之婚媾也自此以往陰陽和暢向之疑心羣起者至此盡氷釋而亡矣按此據定匪冦婚媾指三而言深得聖傳羣疑亡也之義蹇句利西南句不利東北句利見大人句貞吉傳蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉大象山下有水蹇君子以反身修德序卦乖必有難故受之以蹇蹇者難也雜卦蹇難也二陽四陰坎上艮下與解反覆相推坎險艮止厄難之象由覆推觀之則九自解之二往居五而得中能濟蹇者故利以本卦之體觀之則東北正蹇地也故不利九五中而居尊大人之象故利見又陽剛正位故貞而吉初六句往蹇句來譽傳往蹇來譽宜待也蹇初六柔不欲遽往故傳曰宜待往謂進來者艮之止止于蹇之初得蹇之時用所謂知也即其譽王氏弼曰處難之始居止之初獨見前識覩險而止以待其時故往則遇蹇來則有譽六二句王臣蹇蹇句匪躬之故傳王臣蹇蹇終無尤也王臣王之臣也謂六二也九五則其王也當坎險之中為蹇之主而六二為正應所以扶危定傾者一德一心君臣之際其分其誼不可有二觀王臣二字而躬皆君有矣蹇蹇重難也九五陷于坎中事極勢危六二應于坎下畢智竭力其濟君之靈也不濟則以死繼之躬何有焉諸葛武侯曰鞠躬盡瘁死而後已成敗利鈍非臣之明所能逆覩匪躬之義盡此矣尤之所以無也若身為王臣而欲脫身蹇外則有身矣得無尤乎濟不濟非所論也程傳來注俱謂六二不能濟蹇猶屬偏辭王氏弼曰處難之時當位居中以應乎五執心不違志匡王室者也故曰王臣蹇蹇匪躬之故九三句往蹇句來反反郭氏舉正作正謬傳往蹇來反內喜之也所以蹇者坎為之也上承坎故往則蹇見險而能止者艮為之也內柔而九三成艮故來則反反謂不入于蹇也亦其剛明之德為之所謂知也故傳曰內喜之三四上下卦交接之處故以往來言他卦多類此孔氏頴達曰九三與坎為鄰進則入險故曰往蹇來則得位故曰來反程傳曰三為下二陰所喜故來為反其所也吳氏曰慎曰九三剛正為艮之主所謂見險而能止者故來而能反止于其所六四句往蹇句來連傳往蹇來連當位實也往謂五蹇之主也既已蹇矣而四承之近君之地無坐視之理而下承九三剛正有力不得不連結以濟之情急而勢可援也三五皆陽故傳曰當位實也九五句大蹇朋來傳大蹇朋來以中節也九五陽剛居尊當蹇之時而陷坎中故曰大蹇六二為其正應二應則艮之全體俱應即其朋也以陽剛之德居中有節足以感動當世呼召賢哲而正應柔順得中而艮剛全體俱應實其同德故曰朋來二五情理相關陰陽相應朋來之義甚顯而來氏以九三為朋非也且失傳中節之義上六句往蹇來碩句吉句利見大人傳往蹇來碩志在內也利見大人以從貴也往蹇蹇之極也來碩俯就乎五也蹇極當濟而九五比焉志之所在出蹇可矣故吉且九五大人之象近與之比則從之易故又利見項氏安世曰上六本無所往特以不來為往耳初六本無所來特以不往為來耳解句利西南句無所往其來句復句吉句有攸往句夙吉傳解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉大象雷雨作解君子以赦過宥罪序卦物不可以終難故受之以解解者緩也雜卦解緩也解蹇之反艮反為震而往坎來居下而復坎險震動動出險外所以名解由此推之東北蹇地既不利而利西南則其解也亦惟西南之為利矣西南為坤坤為衆六五柔中難平禍靜可與休息人共安之也由坎之來觀之則九二得中復得其所亦吉道也然難之解乘乎時也時也者中也于是而有所往焉急宜早為之所也苞桑之繫萌蘖之生其勢不可少緩也緩則失中矣天道人事皆有然者時乎時乎不可失也初六句無咎傳剛柔之際義無咎也本爻初六自蹇之上六而來當解之始親承九二又得九四之應以剛濟柔適當解蹇之際不少過差無咎之道也胡氏炳文曰恆九二悔亡大壯九二貞吉解初六無咎三爻之占只二字其言甚簡象在爻中不復言也九二句田獲三狐得黃矢句貞吉傳九二貞吉得中道也坎為水為溝瀆為矢為弓輪黃中色震帥在上而坎險陽剛田獵之象也六三陰柔而疑故不為豕而為狐本爻剛健得中故不為弓輪而為矢弋而取之曰獲失而復有曰得九二在中其來復而攸往夙吉者也王氏應麟曰世之治也君子以直勝小人之邪易曰田獲三狐得黃矢世之亂也小人以狡勝君子之介詩曰有兔爰爰雉離于羅六三句負且乘句致寇至句貞吝傳負且乘亦可醜也自我致冦又誰咎也繫辭子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也六陰柔三疑懼乘剛中之上小人之妄據也而坎為勞憂負之象也為輿則乘之象也又為盜則寇之象也柔有貞義當解之交而乘剛中之上則吝矣九四句解而拇句朋至斯孚拇荀氏作母誤傳解而拇未當位也震為足拇之象也四剛五柔彼此相須朋之象也方解之際震剛不寧其位未當故必六五之濟而後解可成也六五句君子句維句有解句吉句有孚于小人傳君子有解小人退也六五柔中居尊為解之主操解之勢有解之德君子兼德位言之維網之綱也禍網之設一解其維則俱解矣吉之道也其為解也君子道長為之也君子道長則小人道消其消也非僅勢力為之蓋有以服其心也孚信也小人孚則其解廓然矣天下之勢若小人未孚則雖解難于一時而難機猶伏解尚未盡極之于小人之孚斯解之至惟五為能當之上六句公用射隼句于髙墉之上獲之句無不利傳公用射隼以解悖也繫辭易曰公用射隼于髙墉之上穫之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也隼猛鷙之鳥謂三也三坎上蓋嘗為蹇者于本卦則為寇故傳曰悖而震上解極若垣墉然今在上六則髙墉之上矣震動乎蒼筤竹則射之象也斯時也蓄久而後動審固而後發獲之則首難除矣以其處于解後操必獲之道者也故曰于高墉之上獲之易翼宗卷四
