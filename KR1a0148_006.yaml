body:
  text: 易翼宗卷六湖北巡撫晏斯盛撰下經震句亨句震來句􅊒􅊒句笑言啞啞句震驚百里句不喪匕鬯震歸藏作釐􅊒􅊒荀爽作愬愬毛西河曰吳澄以震來以下八字係初九爻詞竟以已意刪去季本四同從之何無忌憚至此傳震亨震來􅊒􅊒恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也大象洊雷震君子以恐懼修省説卦雷風相薄雷以動之帝出乎震萬物出乎震震東方也動萬物者莫疾乎雷震動也震為雷震為足震一索而得男故謂之長男震為雷為龍為𤣥黃為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮序卦主器者莫若長子故受之以震震者動也雜卦震起也以八卦言則乾交於坤之初以六十四卦言則於艮為覆推陽動於下故名震陽動則嘉故亨震來兩震相重震而又震即大象所為洊雷也􅊒􅊒恐懼貌敬也啞啞赤子之初聲又讀如戹鎮定之至一笑一言有常度也百里侯國之地凡雷之動聞於百里聲之所至境内皆震也執匕薦鬯主祭者之事即所謂主器也震為長子而初爻剛正故繼體出治臨事變而守不失也敬以主之徳足長人矣􅊒􅊒敬也非眩也啞啞有則也非放也不喪匕鬯有則之實也不忘所有事也居處恭執事敬其常也不必其震來然臨事而懼不疑所行亦並行不悖矣胡氏炳文曰震驚百里以震雷取象不喪匕鬯以長子主器取象初九句震來句􅊒􅊒句後句笑言啞啞句吉傳震來􅊒􅊒恐致福也笑言啞啞後有則也此爻成卦之主以故全用彖辭止加一後字以明之而直斷其吉言此即彖所謂震來􅊒􅊒笑言啞啞者然必敬謹之至而後言笑有則􅊒􅊒者主於中而後啞啞者形於外也六二句震來句厲句億喪貝躋於九陵句勿逐句七日得億偽古本作噫謬傳震來厲乘剛也震來震之初來也厲危也陽方震動六二廹而乘之危地也億多也六五象傳訓大是也喪貝躋於九陵失其所有至於最逺之地也九陽數之極也陵林木叢薈之處震之為也勿逐能自守也以六二之柔順而中正也敬天之怒無敢馳驅也七日少陽之數剛退而柔安故失者可得也處震之道莫善於敬二雖不如五之无喪有事然亦能自守而有得六三句震蘇蘇句震行句无眚傳震蘇蘇位不當也六三以柔處下卦之極不中不正故震之一終而遂蘇蘇然不甚驚懼也與􅊒􅊒者異矣震行對震來震往而言此爻震之一終如雷聲之已行也凡雷之震既已發聲則其勢愈盛更當自省其身使无一眚不得蘇蘇然少釋其恐懼也九四句震遂句泥傳震遂泥未光也内震已成則遂矣至九四而陽䧟于上下羣隂之中則泥而不通是失震之所為亨者胡氏炳文曰初與四皆震之所以為震者然震之用在下四溺于隂柔之中故震之亨在初而不在四六五句震往來厲句億无喪有事傳震往來厲危行也其事在中大无喪也往謂内卦來謂九四六五得震之最中往者已然來者同體逺鑒近察皆為震地葢無時無處不自厲也然震而得中敬以直内中有所主故不喪其所有事五之所事至大也故曰億无喪有事而傳釋之曰大无喪也彖所謂不喪匕鬯彖傳所謂出可以守宗廟社稷為祭主是也震之往來當在四而四泥矣不若五之光也震之不喪匕鬯當在初也而五則出而守宗廟社稷矣初者震之主爻五者震之正位合初與五觀之而彖義始備震來虩虩恐致福即往來厲之心也笑言啞啞後有則即億无喪有事守宗廟社稷以為祭主之本也虞氏翻曰可以守宗廟社稷為祭主故无喪有事也熊氏良輔曰震往亦厲來亦厲皆以危懼待之故能无喪有事葢不失其所有也此卦辭所謂不喪匕鬯能主器以君天下者與上六句震索索句視矍矍句征凶句震不于其躬句于其鄰句无咎句婚媾有言傳震索索中未得也雖凶无咎畏鄰戒也震極矣索索然志氣之消沮也故其視矍矍然神貌之閃鑠也上六隂柔之至中無所主故也志先亂矣行將何之凶道也然沮喪者固敗行而儆戒者可無虞也當震之未及其身方及其鄰之時而早圖之則修省生于恐懼雖未能致福亦可寡過也故无咎鄰比近于身者謂六五六五震往來厲不敢康寜如彼上六當觀此而知戒也上六變而成離長男中女有婚媾之象又為噬嗑故有言而連類及之見不可徒震也趙氏光大曰隂處震極故當震之來志氣消沮瞻視傍偟驚懼之甚也以是而行其志先亂凶也所以然者不能圖之於早也若未及身而方及鄰之時豫為圖之則无索索矍矍之咎矣艮其背句不獲其身行其庭不見其人句无咎傳艮止也時止則止時行則行動静不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也大象兼山艮君子以思不出其位説卦山澤通氣艮以止之成言乎艮艮東北之卦也萬物之所成終而所成始也故曰成言乎艮終萬物始萬物者莫盛乎艮艮止也艮為狗艮為手艮三索而得男故謂之少男艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節序卦物不可以終動止之故受之以艮艮者止也雜卦艮止也周子曰艮其背背非見也靜則止止非為也為不止矣其義也深乎以八卦言則乾交於坤之三以六十四卦言則與震相覆推陽止於上陽外隂内各止其所而彼此敵應若有所限者然故名艮一陽二隂卦象如人之背艮文如身之反故曰艮其背凡人見其前不見其後背者人所不見之地也艮其背則身不可得而跡矣身不可得而跡識葢居天下之先矣識居天下之先其行實不處天下之後將跡其行乎當于其庭而行其庭已不見其人矣其行固在衆行之先矣是其行也即其止也豈復有人之見哉事物紛紜動矣然各止其所而不亂則亦静也所謂動亦静也此艮之大義也艮為門闕故言庭玩傳艮其背一句是主不獲其身行其庭不見其人三句相連中著是以二字更明總是靜為之主則動亦静不滯於行斯止之極也道理十分圓相先儒以艮其背行其庭平對者皆失之千里蔡氏清曰天有四時冬不用地有四方北不用人有四體背不用一理也葢體立而後用有以行此理若充得盡即是定之以中正仁義而主静陳氏琛曰背者北也人之一心静之所養有淺深則𤼵之所中有多寡而於静全無得者一步不可行也二説得之初六句艮其趾句无咎句利永貞趾荀作止通字傳艮其趾未失正也艮取象於身則初即其趾也凡人之行其趾先動六柔得止之正故曰艮其趾艮其趾則不妄行矣故无咎然趾易動者也六柔貞也即正也必永其貞斯不失艮之初意也不然趾不自禁而能為艮乎六二句艮其腓句不拯其隨句其心不快拯陸作承傳不拯其隨未退聽也上下敵應五雖同徳而隂必從陽故六二舍五而比三隂陽有相與之象欲止而不能自主者也凡卦從上者進從下者退比三而不從初故傳曰未退聽取象于身在限之下趾之上則腓也腓足肚也不動者也然隨足而動其必然之勢不能止也是違心而動也故不快咸二曰咸其腓此曰艮其腓象之同也皆艮之下體也三曰咸其股執其隨往吝義之同也咸隨四而此隨三也隂陽之相牽也九三句艮其限句列其夤句厲薰心夤鄭作􅘡説文作胂荀作腎傳艮其限危薰心也限上下體之交腰際也夤夾脊骨也薰蒸動也沖也猶言憂心沖沖也止其所而後為艮人之一身上下運動皆在其限則限非可止之所也而九三以剛居之堅確之甚止其所不當止若艮其限者然艮於其限則其間之骨節堅强不可運動又若橫列其夤矣危道也身危則心不安故厲薰心此所謂氣壹動志者也楊氏唘新曰此爻惡動以為静而反至于動心者葢心之與物本相連屬時止而止時行而行則事應于心而心常泰然有意絶物則物終不可絶而心終不可静矣六四句艮其身句无咎傳艮其身止諸躬也限以上身之正體一止則無不止矣然艮之為道艮其背必不獲其身也而四之為止僅在其身是能止於有形而未能止於無形也免咎而已守身而安非復艮限列夤之厲亦無艮腓不快之憂胡氏瑗曰人之體統而言之則謂之一身分而言之則腰足以上謂之身六四出下體之上在上體之下是身之象也夫人患不能自止其身令能止之得其道使四肢不妄動故无咎也六五句艮其輔句言有序句悔亡輔虞翻李鼎祚作孚傳艮其輔以中正也六五得中中則無不中於理者而於人身若口輔然口容止止非黙也言中倫倫序也序則其止也斯所謂止其所之一端矣夫駟不及舌悔也言之无序也詩曰莫捫朕舌捫則艮矣故艮其輔而後无悔也龔氏煥曰艮其輔非不言也言而有序所以為艮也谷氏家杰曰止在言前非出言方思止也然有序為止亦非緘黙之謂也上九句敦艮句吉傳敦艮之吉以厚終也敦厚也以陽止隂之謂艮而本爻在重艮之上當艮之終要艮之成止之極也定且静而物不能搖也是之謂厚艮其背不獲其身之究竟也艮背體之神敦艮用之實主静者必自得之胡氏炳文曰敦臨敦復皆取坤土象艮山乃坤土而隆其上者也其厚也彌固故其象為敦其占曰吉艮之在上體者凡八而皆吉漸句女歸吉句利貞傳漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而㢲動不窮也大象山上有木漸君子以居賢徳善俗序卦物不可以終止故受之以漸漸者進也雜卦漸女歸待男行也漸歸妹與咸恒似以四卦皆乾坤之子女而剛柔内外有相交之理故取象於夫婦嫁娶之事咸曰取女此曰女歸彼少男少女之相感此少男長女之中應也漸辭曰女歸下卦曰歸妹彼少女長男之相從此少男長女之相訂也本卦與歸妹覆推故雜卦曰漸女歸待男行也歸妹女之終也義尤顯切漸者禮之始也禮始于謹夫婦女之歸最為有漸納采問名納吉納徴請期親迎六禮備而後成婚是漸莫如女之歸也艮止于下而㢲進于上是止以為進亦漸也漸本進而有序之文女歸則漸之義矣吉得其義也利貞爻之中也以歸妹覆推則下卦之兑上進為㢲而九二居於九五位既尊而有功陽剛得中又正而可以正人貞之道也故利貞初六句鴻漸于干句小子厲句有言句无咎傳小子之厲義无咎也鴻之賔也隨陽南北而其行有序卦體隂陽相次乙乙徐徐亦似雁行故爻俱取鴻象婚禮用雁義亦然也干水涯也初六漸之最初柔弱處下而不進若舍磐之安而不有者似危也故無識者疑之是厲也因厲而有言言誚讓也此亦小子則然耳然以漸之義揆之則正愼始安身之道故无咎用柔所以不躁而能漸也觀晉初之摧如可知同一難進之義矣若升之初六曰衆允則以其為卦主也義自不同六二句鴻漸于磐句飲食衎衎句吉磐史記漢武紀引作般註云水涯堆也傳飲食衎衎不素飽也磐大石也廣澤大阿之間有之水鳥栖息之所衎衎從容而不競也必于磐而後得飲食之衎衎則前乎此者有漸也飲食衎衎以圖進則後乎此者有漸也蓋鴻之為物秋南春北未嘗寜處故飲食衎衎非終安乎此也傳曰不素飽其義精矣漸之最中正者也又有應于五也胡氏炳文曰艮為石則有磐象鴻食則呼衆飲食衎衎和鳴也初之小子厲有言危而傷也二飲食衎衎安且樂矣時使之然也九三句鴻漸于陸句夫征不復句婦孕不育凶利禦㓂孕荀作乘誤傳夫征不復離羣醜也婦孕不育失其道也利用禦㓂順相保也以剛而處危地失所為漸者也陸路也如南陸北陸之陸鴻之為物木落南翔氷泮北歸此隨日之南北陸以為行也即漸也而九三過剛又無應與秋未立而遽南春未立而遽北其去也獨行無侣非上九漸陸之義惟一往不返耳九陽爻故稱夫將遽進而以㢲女為婦耶隂陽相比似可以孕矣然少男長女時未至也非夫婦之道不可以生育凶可知矣其剛急之性將何所用哉惟宼之至也禦之以健捷則退所謂漸不可長者此則其利也内卦艮象止也于義為順故可以相保六四句鴻漸于木句或得其桷句无咎傳或得其桷順以㢲也㢲為木六四柔而下乘故為桷桷柯也鴻本不木栖而當漸之交又㢲之下體適漸于此未可托也然柯尚可容足不至顛墜得柔順之道不失漸之義故无咎進近九五四多懼而以柔處之故安也以隂從陽亦順事也房氏喬謂上附于五可也其謂五為桷則不可也九五尊而髙非足履之象惟以本爻之柔為平柯而托乎其間以附五斯得之君臣之義夫婦之道也九五句鴻漸于陵句婦三歳不孕句終莫之勝句吉傳終莫之勝吉得所願也鴻或南陸北陸以為飲食之所耳磐則其所也于陵則已逺矣然九五得中于陸為儀即在其上無所間也豈至於九三之失道孕而不育哉以婦道言之亦不過三歳不孕而已漸之貞也本卦歸妹之反故兼以婦道為象即彖之女歸同一意也上九句鴻漸于陸句其羽可用為儀句吉傳其羽可用為儀吉不可亂也陸胡氏程氏本皆云當作逵朱子謂以韻讀之良是至范諤昌吳澄季本直改作逵皆非也朱氏震來氏知徳毛氏竒齡知陸之不可改為逵而朱氏據虞翻以九三為陸謂上所往進也所反亦進也漸至九五極矣是以上反而之三來氏謂九三之中爻水在山上故自干而陸此爻變坎又水在山上故又有鴻漸于陸之象毛氏謂上與三為表裏上㢲極即三止極故復漸于此亦非也陸字漢隋以後竝無訛誤隋盧思道孤鴻賦序云大易稱鴻漸于陸羽儀盛也是其傳已久若以韻證則逵儀不叶顧氏炎武曰古人讀儀為俄不與逵為韻足破前誤至謂上復漸于三又大失爻理不知陸之為路不必其為逵也不知漸之各異不得以為三也日行南陸則鴻漸而南日行北陸則鴻漸而北三未極而漸陸故離羣而失道上已極而漸陸則羣飛翺翔行列整齊故其羽可用為儀儀也者徐徐然有次第也乙乙然相聨屬也傳曰不可亂正以其行列言也為異説者當細玩之歸妹句征句凶句无攸利傳歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也无攸利柔乘剛也大象澤上有雷歸妹君子以永終知敝序卦進必有所歸故受之以歸妹雜卦歸妹女之終也歸妹漸之覆推與咸恒悖㢲反為兑為少女妹象也艮反為震為長男而兊女下之歸也然女先而男後女説而男以動是女為之主故不曰妹歸而曰歸妹也婦人謂嫁曰歸嫁娶之道男先于女六禮行而後成婚此咸之所以取女吉漸之所以女歸吉也今不以漸而歸者妹非咸之正失恒之道者其體則隂爻皆外而陽居内其象則女先而男後行之悖理凶可知矣不特此也二剛而三乘之四剛而五乘之是婦將制其夫矣復何所利哉不善如此總之此為漸之反而大逺於咸恒者是故士女之行禮為大失禮者凶必隨之初九句歸妹以娣句跛能履句征吉傳歸妹以娣以恒也跛能履吉相承也爾雅女子同出謂後生為娣曲禮世婦姪娣是娣者女弟從嫁者也兊本少女而初又居其下則娣象矣人之四肢下者為足兊體為毁折又變坎為陷為曳是跛也然有陽剛之徳而尚可支撐中饋是能履也居下而承上可也雖不及逺其分為善以是而行亦吉也女歸不待男非禮也亦失時也初為娣則從嫁之媵於禮未失扵時可待也卦征凶而爻征吉其分異也九二句眇能視句利幽人之貞傳利幽人之貞未變常也歸妹隂陽之相應者惟二與五而以陽承隂近與六三相比正當兑之上缺是眇也然本體剛而得中則目未盡盲也故能視而其為剛中也為隂所掩則幽隱之地矣苐不為三所比眤而自守以中是即貞也婦人之常道也則其利矣不然非剛明在中得無變節乎胡氏一桂曰初二跛眇兊毁折象履卦六三亦兑體故取象同六三句歸妹以須句反歸以娣須荀爽陸績作繻誤傳歸妹以須未當也須女之賤者天文織女貴須女賤志曰須女四星賤妾之稱六三不中不正居長男少女之間是婢妾之類而居卦下之上是又與妹為同體則娣矣長男在上尚非配也須不當也娣愈不當也取女之吉何有焉彖所謂无攸利者也九四句歸妹愆期句遲歸有時傳愆期之志有待而行也剛而失中又處可懼之地未成其為歸妹也故曰愆期愆期則非歸妹之征凶矣彼有取女之吉此有女歸之漸故曰遲歸有時傳稱其志者剛而實也六五句帝乙歸妹句其君之袂句不如其娣之袂良句月幾望句吉幾荀作既誤傳帝乙歸妹不如其娣之袂良也其位在中以貴行也君即所歸之妹也如諸侯妻稱小君後世稱縣君之類對娣媵言此則君矣本爻位尊而柔順得中下應九二是天子之妹下嫁于諸侯之象貴盛其所自有謙而不居故服飾其所自有儉而不奢也是以娣之袂反覺美焉衣之飾在袂故特舉之月與日相對謂之望月受日之光者也六五下應九二正相對也曰幾者不自滿也此爻得泰之六五故其辭同而于歸妹之義則于禮獨合何也凡婚禮男家主之而王姬下嫁之禮則女家主之在彖自凶而此爻自吉觀㑹通以行典禮此其顯者上六句女承筐无實句士刲羊无血句无攸利傳上六无實承虚筐也筐鄭作匡古通字上六歸妹之究竟而本爻隂虚處外且承應皆隂將何所承乎是婦終不成其為婦也不成其為婦則夫無以祀先故刲羊亦无血此彖所謂征凶无攸利者也故以全體觀則兑女也震虚筐也震又男也兊之不配則无血之羊也象之所以為辭也程子曰上六女歸之終而无應女歸之无終者也婦者夫所以承先祖奉祭祀不能奉祭祀則不可以為婦矣筐篚之實婦職所供也古者房中之爼菹􅢴之類后夫人職之諸侯之祭親割牲卿大夫士皆然割取血以祭禮云血祭盛氣也女當承事筐篚而无實无實則無以祭謂不能奉祭祀也夫婦共承宗廟婦不能奉祭祀乃夫不能承祭祀也故刲羊而无血亦无以祭也謂不可以承祭祀也婦不能奉祭祀則當離絶矣是夫婦之无終者也何所往而利哉此傳相承而下正得聖傳専釋承筐无實之旨朱子本義未協豐句亨句王假之句勿憂句宜日中傳豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而况于人乎况于鬼神乎大象雷電皆至豐君子以折獄致刑序卦得其所歸者必大故受之以豐豐者大也雜卦豐多故也豐旅之覆推離明震動天地功用之大者明而動則百昌時遂百為交作百物俱備嘉之會也故亨假大也傳曰尚大言方大也勿憂憂也方豐大之時即為消落之漸能勿憂乎然日中者憂其昃惟常守其中則持盈保泰而豐者不至于嗇矣何也豐多故非明不足以照之物豐則明易蔽也惟中則物不足以蔽之六五由艮内而為外震得中居尊為豐之主與離二同徳相應皆中虚而不自滿也明也豐之主故稱王應離即宜日中爻辭來章之吉正發此旨胡氏炳文曰豐之大有亨道焉大則必通也亦有憂道焉大則可憂也不必過于憂如日之中斯可矣泰晉夬家人升皆曰勿恤此曰勿憂皆極盛之時常人所不憂而聖人所深憂其辭曰勿憂深切之辭非謂無憂也初九句遇其配主句雖旬无咎句往有尚傳雖旬无咎過旬災也配鄭作妃旬荀作均劉􅷶作鈞俱古通字彖曰宜日中離日也六二離之主而隂與陽配初九六二一陽一隂故曰配主相比故曰遇旬十日也十日之内猶然日中離明下照故无咎然時不可失也日中幾何往則速遇故有尚言尚往也傳曰過旬災見日中之為宜也先儒俱以四為配主然兩陽非配亦非豐主又與宜日中之義不合不知離中為日之主也來氏知徳曰因宜日中爻辭皆以日言文王象豐以一日象之故曰勿憂宜日中周公象豐以十日象之以一月論已一旬也正豐之時也六二句豐其蔀句日中見斗句往得疑疾句有孚發若句吉蔀鄭元薛仁貴本作菩斗孟喜本作主傳有孚發若信以發志也離日也日以虚而明以實而蔽又火日内暗而蔀者日積之數漢書律厯志七十六歳為蔀首又蔀日二萬七千七百五十九蔀豐則交食日食甚則斗晝見又蔀鄣也豐二離體上有重剛既實而多蔽又質隂而無光故有此象往進也謂比三四蔽之者也故疑孚合也謂應五虚相照也二有中徳與五相信去其所蔽則志共見矣故曰發若蔀鄣也蔽也鄣蔽之至則日中而斗見本爻離中而兩剛相比不得驟與六五相應故有疑象疑者以重剛之蔽也先儒俱以上應六五為柔暗之君故疑非也六五本有來章之慶何謂柔暗蔀當作虚活字或以為草名皆别義如鄭元薛仁貴本作菩註云小席廣雅云􅫟蔀魚薺也俱與象義無涉且作實字則後所稱蔀其家者難通也九三句豐其沛句日中見沬句折其右肱句无咎沛一作斾子夏傳作芾沬漢書及字林子夏傳鄭元馬融本俱作昧肱姚信本作股傳豐其沛不可大事也折其右肱終不可用也沛當作斾王弼以為幡幔者是也蔀如步鄣之蔽斾則幄幔之施更切近矣沬斗杓後星最小難見日中見沬如日食之更甚而小星皆見也服䖍謂日中而昏者是也離體隂陽切近無光故有此象卦例上右下左三為離上爻折半則折其右肱矣居下卦之上當豐大之時任大事者也然日中而昏不明之甚豈所以為豐哉偏暗無為故傳曰不可大事蓋昏而不明其體已虧何所用之如人之運動惟在右肱而傷折其半終不可以任事也无咎云者言無所歸咎也九四句豐其蔀句日中見斗句遇其夷主句吉傳豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也離為日本爻與日不相對照不能受光故豐蔀見斗與六二同傳曰位不當謂陽處偏僻亦不當日故幽而不明但六五柔中為豐之主九四承之則剛柔相遇亦相資也故吉夷正也大也善也詩曰降福孔夷不盡訓平也六五居尊故曰夷主六二離為下卦之主故曰配主先儒以初為夷主不知四有近君之義六五有居尊得中之慶也且主而又曰等夷亦不成文義于彖辭宜日中之義亦全無關照又傳曰行也是行而遇五也若遇初則反而退矣豈可謂之行六五句來章句有慶譽句吉傳六五之吉有慶也此所謂宜日中照天下者也兩虚相含離明照耀正豐而得中者無盈昃之慮也六五柔中居尊下有離中文明之徳為之應則章之來也方未有已而豫大之慶美盛之譽其所自有此豐之最善而无憂者故吉上六句豐其屋句蔀其家句闚其户句闃其无人句三歳不覿句凶豐説文作豊闚姚信本作窺闃孟喜本作窒傳豐其屋天際翔也闚其户闃其无人自藏也宜日中宜照天下而此則位處豐極在于天上不富天下而僅有其家者也豐其屋豐之極也蔀其家以自蔽也兩隂居中幽隱在内故窺其户而闃寂無人蔽之深也三歳不覿蔽之久也去日已逺不明之甚盈且昃也故凶旅句小亨句旅貞吉傳旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉大象山上有火旅君子以明慎用刑而不留獄序卦窮大者必失其居故受之以旅雜卦親寡旅也旅豐之覆推離外而艮内離柔而艮剛家在外而止之若寄寓然豐内之離為旅之外卦而六五得中惟中故順而兩剛比近彼此相資又艮止離明而柔麗乎其中亨道也是所以亨者柔中為之也陽大隂小故曰小亨以徳言之則止者不窮于所往明者不昧于所止皆正道也故曰旅貞吉不然行不知止必窮于行止而不明必失其所是亨雖小而義則大矣故曰道不可須臾離造次顚沛必於是也胡氏炳文曰在旅而亨亨之小者也然事有小大道無不在大亨固利于貞不可以亨之小而失其貞也正道果可須臾離哉初六句旅瑣瑣句斯句其所取災斯郭京作㒋據王本改之者失古文意傳旅瑣瑣志窮災也瑣瑣鄙細貌斯賤役其所取災猶言自辱也本爻隂柔不中處于最下觀其行止之鄙細是斯役之為也以此處旅失路誰悲人以為行之窮也而實其志之窮也李斯見鼠而嘆以為安可如鼠顧其自處何如而不知其志之早失終如鼠也其所取災辨之可不早乎王氏應麟曰旅初六斯其所取災王輔嗣注云為斯賤之役唐郭京謂斯合作㒋愚按後漢左雄傳職斯禄薄注云斯賤也不必改㒋六二句旅即次句懷其資句得童僕句貞九家易李鼎祚本童作僮通字傳得童僕貞終无尤也次旅舍之所卽就也資與齎同聘禮所謂幾月之齎是也旅次所恃者資資之所恃者童僕倘其不貞則挾資而走或耗敗不貲旅次其能安乎六二柔順中正在艮之中則已止矣故為次隂爻為矣利故懷資艮為少男而得其中以臨下故為童僕貞雖無六五之譽已逺初六之災矣九三九四喪童得資均不如者知柔中之善處旅也九三句旅焚其次句喪其童僕句貞厲傳旅焚其次亦以傷矣以旅與下其義喪也旅小亨惟柔得之九三剛而不中是不能安於旅者旅以外為家而上逼離火則焚次之象以止下者為童僕而相隔重隂則喪失之義以剛居危當旅之界故雖貞亦厲丘氏富曰九三爻辭全與二反二即次而三焚二得童僕而三喪二之貞无尤而三之貞則厲者二柔順得中三過剛不中也過剛豈處旅之道哉九四句旅于處句得其資斧我心不快資子夏傳及衆家並作齊葢齎字之訛傳旅于處未得位也得其資斧心未快也處詩曰于時處處是也四多懼而以剛乘剛非可處之地也非可處之地而處焉是旅而處者也失其所矣非所以安身也雖上近六五下應初六而得其資斧心終未快身未安故心未安也資財貨斧器用六五有美在中資也有資則必有斧六五句射雉一矢亡句終以譽命傳終以譽命上逮也人君無旅而五居尊位亦未可以等常視也火地之晉也曰康侯火山之旅也其諸應得國之亡人乎如公子重耳之在外十九年終反國而受天子之命是也若夫少康之居有仍宣王之依周召光武之在南陽未嘗非旅也一舉而光舊物亦未嘗不與爻辭合也要之艮手離弓射象也離又文明則雉之象矣中虚亡矢之象譽美名命詞誥皆文事離之光也六五柔中而居尊位當旅之時有事戎行然一舉而可得也一矢亡言亡一矢而獲之賈誼稱無亡矢遺鏃之患言不戰也此曰一矢亡則一戰而克也終以譽命則以文告終也傳曰上逮云者本卦與豐覆推離本豐之下卦今離為上卦則自二而居五是上及也程傳曰射雉謂取則于文明之道而必合如射雉一矢而亡之𤼵無不中則終能致譽命也朱子語類曰亡字如秦無亡矢遺鏃之亡不是如伊川之説然程子以亡屬雉固覺未合而以亡一矢若因雉而失之亦非文意不知一矢亡言僅需一矢也上九句鳥焚其巢句旅人先笑後號咷句喪牛于易句凶傳以旅在上其義焚也喪牛于易終莫之聞也離為火火炎上上九剛􅏥處旅之極又為科上槁故有鳥焚其巢之象笑剛上自以為得意快志也後號咷遇災而悲也易埸通牛離象變震為大塗又變小過故有此象如處牧地而不自保致其所有者而失之凶可知矣前傳曰以旅與下此傳曰以旅在上義正相對下謂初與則九三之過剛自是不察其情之暌若棄所有而與之者然上即本爻故曰在以上之過髙自喜不知其禍之至若適當有此者至喪牛于易則又知其終莫之救亦莫之悔矣先儒専以喪牛于易為致凶之道上下文義隔絶然此爻旅之極過髙自任罹災而終不知救者也傳曰終莫之聞猶言人莫以告告亦不能聽也㢲句小亨句利有攸往句利見大人傳重㢲以申命剛㢲乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人大象隨風㢲君子以申命行事繫辭㢲徳之制也㢲稱而隱㢲以行權説卦雷風相薄風以散之齊乎㢲㢲東南也齊也者言萬物之潔齊也橈萬物者莫疾乎風㢲入也㢲為雞㢲為股㢲一索而得女故謂之長女㢲為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦序卦旅而无所容故受之以㢲㢲者入也雜卦見兊以八卦言則坤交于乾之初以六十四卦言則與兊相覆推隂伏入于陽之下故名㢲以兩㢲相重觀之則九二九五剛在㢲中而五尤得正中正以行令則風流而令行初六六四柔在剛下順而承之承順以善下則風從而行逺以柔下剛言是隂之為也陽大隂小故曰小亨以其行之順而言則一往無阻故曰利有攸往以九五剛中居尊言則大人之位故曰利見大人張子曰隂在内陽在外故周旋不舍而為風是隂陽相㢲也而隂為之内于義尤備朱子語類曰㢲有入之義㢲為風如風之入物只為㢲便能入義理之中無細不入此見㢲之性情初六句進退句利武人之貞傳進退志疑也利武人之貞志治也六隂柔初㢲下是以進退不決疑貳而趄趦也夫㢲以申命而命方初下每懷遲疑將格而不行矣惟斷以定謀勇以作氣如軍令然有進無退斯克濟也此㢲初之利也王氏弼曰處令之初未能服令者也故進退也成令齊邪莫善武人故利武人以整之九二句㢲在牀下句用史巫紛若句吉无咎傳紛若之吉得中也㢲以申命牀坐而下令之所杜甫詩曰去歳茲辰捧御牀又王建宫詞曰柘黃新帕御牀髙又如庾亮之據牀談詠王道之指牀呼坐是牀固所以坐而言也五出令者也二行令者也初則奉令者也下而最親又㢲之所由名初固㢲也以二視之則在牀下矣令由中出不少遲留或卜吉征凶而付之史或祭祀祓禳而付之巫紛紛若若承之者順也惟其令之自中出也故吉且无咎非下之進退者可比也令之善者言之而有與為聽紛紛若若聽之者衆也二能用下也上之㢲在四雖同在牀下而隔五不為上用故凶周禮太史讀禮協事司巫祝以孝告嘏以慈告又周官史掌卜筮巫掌祓禳卜筮占吉凶祓禳除災害毛西河曰禮王前巫而後史前後記告紛紛若若註云若多也史綬若若荀爽謂史以書勲巫以告廟征伐既畢史巫竝用此承武人専以用兵言牽合未當九三句頻㢲句吝傳頻㢲之吝志窮也當上下兩㢲之間故曰頻㢲㢲為風風之恒也為咎徴㢲以申命命之煩也為亂政上無應下無與將比四乎又從五而不從三窮矣處頻㢲之地則然吝道也頻復者徳之虧頻㢲者命之亂也毛西河曰三當下㢲之終而接上㢲之始以㢲承㢲㢲之頻者也夫下㢲至三而㢲窮上㢲至上而㢲又窮雖三在過㢲上在不㢲而其㢲之窮則一也按此頻㢲甚協其曰過㢲則非也爻剛亦不㢲也六四句悔亡句田獲三品傳田獲三品有功也柔爻本致㢲主象初之進退而疑者柔之穉也四之悔亡而有功者柔承五也九五本剛正之君而六四為柔正之臣近而相得往必有功㢲風之動春田之時又為利三倍故所獲必多三品一為乾豆二為賔客三充君庖備舉之言其多也四似初疑于悔矣然上得九五與初不應則悔固亡之矣是四之善以柔而得五為功也故傳専及下句然言有功則悔之亡亦可知矣郭氏雍曰六四近君志決于進無初六之疑則悔亡矣是以有田獲三品之功也六四至柔不應有田獵之功而以此順乎剛得之由是觀之則㢲之為道豈柔弱畏懦之謂哉九五句貞吉句悔亡句无不利句无初有終句先庚三日後庚三日吉傳九五之吉位正中也五為申命之主以九居五正所謂剛㢲乎中正而志行者故貞吉九二不應前命之阻也而以九五之剛正者更之則悔亡矣彖所謂大人為㢲所利見故无不利此當兩㢲之中是申命而非初也故曰无初命至重申則震動恪恭日新又新矣故有終前漢書厯律志曰斂更于庚是更之為言更也言事至此而當更也更則申命于先也又必申命于後也初已往矣凡所以申命者皆為終計也先庚三日後庚三日則為終事計者周矣此所以有終也程子曰先庚三日後庚三日出命更改之道當如是也甲者事之端也庚者變更之始也十干戊己為中過中則變故謂之庚事之改更當原始要終如先甲後甲之義如是則吉也胡氏炳文曰蠱者事之壞先甲後甲者飭之使復興起㢲者事之權先庚後庚者行之使適變通張氏清子曰甲者十干之首事之端也故謂之終則有始庚者十干之過中事之當更者也故謂之无初有終况㢲九五乃蠱六五之變以造事言之故取諸甲以更事言之故取諸庚易于甲庚皆曰先後三日者葢聖人謹其始終之意也按此皆得先庚後庚正義而朱子本義以為先庚三日丁也後庚三日癸也説本鄭元而于義未當漢律厯志曰火盛于丁未嘗解為丁寜也陳揆于癸未嘗専為揆度也至毛西河以先庚三日為丁戊巳後庚三日為辛壬癸謂以庚為主木為金所克則去木之柔而用金之剛甲乙為木㢲方所屬行㢲令者必去之甚為鑿謬大易一書只道隂陽並無納甲生克消洩之義知潔浄精㣲之敎者必識之上九句㢲在牀下句喪其資斧句貞凶傳㢲在牀下上窮也喪其資斧正乎凶也外卦之所以為㢲者四也以上視之亦在牀下然上處卦外无位者也將以四為本卦㢲入之資乎而五方尊臨在中惟命之從上不可得而有也是失其所資之象也故曰喪其資斧其喪也上自致之資斧非其所能有也故正乎凶傳意相承而下言喪其資斧正其窮之為也向來牀俱以為卧榻不知古人坐卧皆牀也禮父母舅姑將袵長者奉席請何鄉少者執牀與坐則亦不竟稱卧也兌亨句利貞傳兌説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉大象麗澤兌君子以朋友講習説卦山澤通氣兌以説之説言乎兌兌正秋也萬物之所説也故曰説言乎兌説萬物者莫說乎澤兌説也兌為羊兌為口兌三索而得女故謂之少女兌為澤為少女為巫為口舌為毁折為附決其于地也為剛鹵為妾為羊序卦入而後説之故受之以兑兑者説也雜卦兑見而㢲伏也以八卦言則坤交于乾之三以六十四卦言則為㢲之覆推二陽一隂陽内隂外如水之内渚而潤外溢如草木百果鳥獸之内堅實而鮮潔外著故于水為澤而于時為秋自爻觀之則初二四五剛皆在内三上兩爻柔皆在外剛中正者説之實柔外見者説之著說則人情相協事必亨通故直指之曰兊亨也是其説也皆以剛健中正者主之也故利貞傳剛中而柔外正以説之實而言惟説故亨是其説本中正之為也故傳曰説以利貞明其非驩虞小喜之所為也推之至于順天應人而使忘勞忘死非中正而能之乎不中正而能為説乎向來以剛中釋亨柔外釋利貞未知聖傳之精即未知彖辭直指兊亨之義亦未審兑説之真也此以全體觀説不必破碎分晰也乾道成男坤道成女則一隂二陽俱宜隂為之主矣然自其既成女觀之則坤道也而其最初則仍是陽施而隂受葢效法之謂坤此三女之用所以異三男也故兌㢲雖隂體而仍以陽為之主也初九句和兌句吉傳和兌之吉行未疑也爻剛無比在兑説之初赤子之性啼笑皆真禮所謂不妄説人者也不妄説人則發皆中節故謂之和亦和而不同矣私不得而干利不得而誘故吉本卦二三四五上皆隂陽相比比則暱暱則同而不和不和則疑即在所説之中矣惟初未與物牽行其心之所安雖違衆亦不害其為和也故傳曰未疑九二句孚兌句吉句悔亡傳孚兌之吉信志也二比三孚矣然三方來兌易致非道之説似未免于悔然二剛而居中徳足乎已而人信之來兌者亦不得而亂之故吉且悔亡孚徳足以孚之也以我為主非來與引者之務在説人也六三句來兑句凶傳來兌之凶位不當也重兊交接之地以柔居之上下兩剛皆有可説一兑方成又來一兑故曰來兑左右逢迎巧言令色何所不至哉妄説人者辱及其身而莫之悟也故凶來兑與頻㢲相似謂居兩兌之間致説者來而不已也不中不正諧媚之心有感皆説人情見可欲而動其幾亦豈在逺哉九四句商兑未寜句介疾句有喜傳九四之喜有慶也九四下比三上承五三隂柔而可説五剛正而當説將説三乎則違五將説五乎則失三兩相商而未安也然三本柔邪疾也五則剛中居尊有得君之象喜也而三在下體非我同類五為同體實我尊親如田之有界不可苟同也惟以三為疾而介不相亂則専于承五而喜起一心矣情雖可商而分有定屬故傳亦専釋喜來氏知徳曰四與三上下兩體猶疆介然故以介言之比乎五者公也故不敢舎公而從私比乎三者私也故不敢割情而就理此其所以商度未寜也商者四介者九九五句孚于剝句有厲傳孚于剥位正當也剝隂剝陽也謂上六而九與之比則孚于剥矣有厲者危之也九五陽剛中正而擬其孚慮其危者當兊之尊位容悦者衆而六以兌極相引志在剝陽近而易入勢有可危然不至咎凶者剛中正者為之也惟其為剛中正也故其孚也尚懸擬之其厲也亦若為或有之見其實可以自主也彖所謂説以利貞者也履之九五健體皆因其位而象之錢氏一本曰兊五説體與履五健體不同履五健體恐其和之難危在夬兌五説體不覺其説之易危在孚故皆有厲之象上六句引兌傳上六引兌未光也上六重兊之所由成説之極而不自已引而長之不知所終故曰引兊而傳曰未光言其隂柔而暗昧也毛氏璞曰所以為兊者三與上也三為内卦故曰來上為外卦故曰引來氏知徳曰不言吉凶者五已有危厲之戒也渙句亨句王假有廟句利涉大川句利貞傳渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也大象風行水上渙先王以享于帝立廟説卦刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙序卦説而後散之故受之以渙渙者離也雜卦渙離也三陽三隂陽上隂下散而不居坎䧟而㢲入水流而風行故名渙其定體則節之覆推也坎來居内則剛來居二仍得其中兊往居外則柔位乎四上同乎五此其所以亨也節苦而渙亨亦其對也王假有廟九五剛中以聚渙也萃之王假有廟九五剛中能致萃也㢲木坎水以水乘木舟楫之象故為涉川而二五剛中㢲行坎上故利惟九五剛正乃克有濟也故又利貞初六句用拯句馬壯吉拯子夏傳作抍傳初六之吉順也當渙之初勢猶未敗則猶可及止也然稍緩則不及故必馬壯乃吉用渙初之用也拯救也馬壯九二也坎為亟心之馬而九二得中初六相承相比隂陽相濟于以收將散之人心資涉川之大利成假廟之膚功不難也傳所謂順言其勢也來氏知徳曰初六當渙之初未至離披之甚猶易于拯者也但初六隂柔才不足以濟之幸九二剛中有能濟之具者初能順之托以濟難而得壯馬也又曰陳平交歡太尉而易吕為劉仁傑潛授五龍而反周為唐皆拯急難而得馬壯者也九二句渙句奔其机句悔亡傳渙奔其机得願也机几也周禮五几通作机左傳設机而不倚是机即几也易舊註机依據之物宋禮部韻引此爻辭註云承物者是也二則已渙矣然坎自節之外而來此爻正彖所謂剛來而不窮者是九來居二坎為勞卦得其所安而初六比近相承有几象焉故曰奔其机奔則疑有悔矣而得其几則勞而得逸危而得安也故悔亡傳曰得願謂剛而得中也郭氏雍曰九二之剛自外來而得中得去危就安之義故有奔机之象惟得中就安彖傳所以言不窮也六三句渙其躬句无悔傳渙其躬志在外也渙至于三則已及其身矣而有應于上以隂從陽義也藉以濟渙宜也忘其身以從上亦不至于自失也隂柔處危有志于時得陽剛為之應則心之所向専一不知有其身矣隂柔悔也應剛故无悔六四句渙其羣句元吉句渙有丘句匪夷所思丘姚作近誤夷荀作弟誤傳渙其羣元吉光大也此爻即彖所謂柔得位而上同者以柔下剛正位也近承九五上同也虚而守正一心奉君其本立矣九五而外旁無比應人臣義無私交公也忠也本然之善也天下之渙皆起于人自為羣渙其羣則無所為渙矣正本清源莫大乎是以視初之拯馬壯二之奔其机三之渙其躬者徑庭也故元吉夫渙而聚之人所知也至即渙以為聚人所不知也孔安國書序曰丘聚也渙有丘則是渙之中即有聚之道焉莫之致而致不期然而然公忠之感善類將盈庭矣豈平常思慮之所及哉言其用之神也胡氏瑗曰天下之渙起于衆心乖離人自為羣六四上承九五當濟渙之任而居隂得正下無私應是大臣秉大公之道使天下之羣盡散則天下之心不至于乖散而兼得以萃聚故得盡善元大之吉也先儒謂此能散小羣以成大羣按此有語病凡羣皆私也黨也無小大之分故渙羣乃所以為聚九五句渙汗句其大號句渙句王居无咎傳王居无咎正位也此彖所謂王假有廟利涉大川利貞者也去患如去疾然有寒疾者必汗之有深患者必渙之此其渙之當如汗之也非大聲疾呼曷克有濟其大號則如汗之渙矣㢲為風有呼號之象故曰大號凡此皆王之為也九五陽剛中正能正其位足以𤼵號施令取羣邪而渙之乃合九有而奉一尊矣此王之居為无咎也以承先言則曰王假有廟以御衆言則曰王居无咎至出納王命者則六四也故曰柔得位而上同上九句渙其血句去句逖出句无咎傳渙其血逺害也汗則汗之而已血則針灸也亦去疾之事語曰去疾莫如盡渙血則疾之根可拔也言其象也又變坎為血卦故有此象可舍而去之逖逺也出如出亡之出謂去之外境言逺去也此言其事當渙之極位處卦外有陽剛變柔之質見人心之離已極而豫逺之禍不及也故无咎此言其占小畜六四血去惕出謂憂恤去而惕傷可出四字為句此渙其血與渙汗對三字為句各不相蒙本義謂逖當作惕與小畜六四同者誤至云渙其血則去渙其逖則出文義亦未安朱氏震曰逖逺也去逖出一本作惕出然象曰逺害當從逖矣錢氏一本曰去不復來逖不復近出不復入其于坎血逺而又逺何咎之有節句亨句苦節不可貞傳節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民大象澤上有水節君子以制數度議徳行序卦物不可以終離故受之以節雜卦節止也此與渙覆推渙㢲上坎下故柔得位而上同此坎上兑下坎剛兑柔故剛柔分而剛得中得中謂坎之剛得九五也毛西河引盧氏之説曰此本泰卦分乾九三上升坤五分坤六五下處乾三是剛柔分而剛得中不知雜卦反覆相推之法更不假此而前後渾合也澤上有水恐其過也故節之卦之取名言當節也唯剛得中故能節能節故亨傳説以行險之下皆節之所以亨也節以制度皆法天地四時以為節節即禮也其在性則發而皆中節也禮以嘉天下之會節之大者故亨此可貞之常道也若過其節則苦矣禮盛則離豈常道哉故傳曰其道窮言非節之本然也程傳不可固守以為常本義不可守以為貞俱未協觀初九之不出户庭九二之不出門庭一為无咎一為凶此可知節之為道非拘苦執一之謂矣豈獨上九為貞之窮哉初九句不出户庭句无咎傳不出户庭知通塞也繋辭不出户庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身機事不密則害成是以君子慎密而不出也止水之流為澤坎塞其下為兑故初九為節之基當節之初時不可出知此而安貧守道無與于世黙足以容道固然也初無所苦何咎之有户庭户内之庭不出内藏也宻也王氏申子曰陽剛在下居得其正當節之初知其時未可行故謹言慎行至于不出户外之庭是知節而能止者故无咎九二句不出門庭句凶傳不出門庭凶失時極也門庭門外之庭出而見人之所二已非遺人離世之地而仍不出焉過矣陽剛固守不與五應失時之宜即失節之道與節亨者異矣故凶錢氏立志曰澤所以鍾水也水始至則增其防以瀦之初九是也水漸盛則啓其竇以洩之九二是也二與初同道則失其節矣六三句不節若句則嗟若句无咎傳不節之嗟又誰咎也節也者中也正也六三偏暗處危即不節也不節而自昧之終無補過之日矣如其嗟若則由侈泰而敦禮數自悔深切修已誠至人終不得而咎之傳曰不節之嗟是自嗟其不節也自知之明猶在也如初之知通塞二之失時極皆明不明之辨故嗟若者有補過之道焉李氏彦章曰臨之六三失臨之道而既憂之節之六三失節之道而嗟若皆得无咎易以補過為善者也六四句安節句亨傳安節之亨承上道也澤為鍾水之區節也六四承九五之中滿而流通之下歸于澤是安節之象也以其位言之則六居乎四上承九五秉禮奉法所謂安汝止者也上下相與其志大行故亨九五句甘節句吉句往有尚傳甘節之吉居位中也坎為水水有源而流通者必甘故美泉曰甘泉無源而涸竭者苦故死水曰苦水是故甘也者美在中也中也者禮也中節也和也九五居中得正為節之主有常不溢斯其所以為甘乎順天地而協四時其吉可知行而中節即嘉會之合故有尚尚嘉也彖所謂當位以節中正以通者也朱子語類曰甘便對那苦甘節與禮之用和為貴相似上六句苦節貞句凶句悔亡傳苦節貞凶其道窮也居節之極窮無所之苦矣苦節不可貞而貞焉得無凶乎以之處已則固以之處世則逆悖天則而失人情凶之道也即所謂不可貞也傳曰道窮猶言行不去也悔亡言無不節之悔而已尚不能无咎也故傳止釋貞凶先儒以寜儉寜固釋悔亡亦未得節字之義文理亦費周折苦節不可貞故凶至不節之悔則亡之中孚句豚魚吉句利渉大川句利貞傳中孚柔在内而剛得中説而㢲孚乃化邦也豚魚吉信及豚魚也利渉大川乘木舟虚也中孚以利貞乃應乎天也大象澤上有風中孚君子以議獄緩死序卦節而信之故受之以中孚雜卦中孚信也中孚與小過對待相推六三六四兩柔在内九二九五兩剛得中柔内則虚而無一私之間剛中則實而有至誠之契此中孚之所以名也卵化為孚生生之真也豚魚江豚也天將風則出拜至信不爽生大澤之中卦體上風下澤故象及之信如豚魚無所作為出于本然則孚之至矣孚則無有不感者故吉至信自可以涉險而澤上乘木中虚有舟象焉故利渉也然孚之所以吉者惟其中也即正也九二九五鶴鳴子和有孚攣如何所不利苟其不貞重然諾矜期許男女相私盜賊相救孚亦何取焉豚魚先儒皆分二物取象坎㢲惟來氏知徳以為江豚取義風澤更覺切合從之蘇氏軾曰中孚信也而謂之中孚者如羽蟲之孚有諸中而後能化也内無陽不生故能剛得中然後為中孚也語亦親切初九句虞句吉句有他句不燕傳初九虞吉志未變也虞娛通易虞與憂對言安樂也又魏相傳云君安虞而民和睦娛義也非虞度之謂故傳曰志未變初九當孚之始守已自安則吉然有應于四懼其貳也貳則不安矣故曰有他不燕他謂四也不慮四之必貳者孚初不變之義為重荀氏爽曰虞安也初應于四宜自安虞無意于四則吉故曰虞吉也有意于四則不安故曰有他不燕也九二句鳴鶴在隂句其子和之句我有好爵句吾與爾靡之靡埤官作縻陸績作䌕京房作劘傳其子和之中心願也繫辭鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行𤼵乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不愼乎鶴當秋而鳴兌正秋也又為口故取象鶴鳴九陽也而居下卦之中故曰在隂其子謂㢲也㢲兑之反禽類而九五同徳六四含虚彼此相對故和彖曰柔在内而剛得中爻傳曰中心願正謂二五之合也二五實而含三四之虚非和鳴之致乎隂美而利好爵也上下共之靡縻通繫而不解共天位食天禄彼此相維爾我無間五非二誰與共此乎故曰我有爾靡此曰縻五曰攣其理正同言行應違皆由中出繋辭之義一也兑口出言㢲風申命亦有象焉六三句得敵句或鼓或罷句或泣或歌傳或鼓或罷位不當也孚者惟中而六三處偏危之地將從二乎則已過之將從五乎則又不及有應者上九耳本爻不中不正上九亦然故曰敵隂陽協應故曰得有應于上則中益不孚何者情相牽也又當中孚之界上下卦交接之地情牽于外若將鼓矣而失其所孚則又或罷失所孚則或泣矣而不正之投則又或歌此中孚之所以不貴應也既無初九虞安之吉而有他不燕則此爻専之來氏知徳曰六三隂柔不正而上九應之此為悦之極彼為信之窮皆相敵矣是以或鼓或罷而作止不定或泣或歌而哀樂無常其象如此占者不能孚信可知矣六四句月幾望句馬匹亡无咎幾京房作近荀爽作既傳馬匹亡絶類上也隂受陽光四與五近如月之將望五孚之主萬邦作孚不可以二而六四比三稍有繋累咎必隨之然以隂從陽地位親切三雖同類不相及也坤牝馬故柔爻亦稱馬同類故稱匹亡舍之而從五也如是則孚者専矣故无咎初九有他不燕六四馬匹亡无咎知孚之貴専也九五句有孚攣如句无咎傳有孚攣如位正當也九五孚之主也剛健中正與九二同徳相與中含二隂臣民之際渾然天合綢繆固結上下一致有若攣然孚之至也彖所謂孚乃化邦者也貞以應天者也然僅曰无咎云者人君以天下之心為心一有不孚則暌且否矣咎可勝言哉緝熙敬止烈假不瑕不聞亦式不諫亦入斯所謂无咎非盛徳未易臻此也二曰靡五曰攣卦情可想見矣來氏知徳曰攣如即鶴鳴子和我爵爾靡也靡與攣字皆有固結而不可解之意靡者繋戀也攣者相連也如與九二合成一體包二隂以成中孚故有此象无咎者上下交而徳業成也上九句翰音登于天句貞凶傳翰音登于天何可長也髙亢不中孚之窮而失實者也以九五之盛徳而矯而出之以為不足信以九二之忠摯則疎而逺之以為不足與所應者惟有六三而不中不正未足以為孚也張其文貌純盜虚聲務外不情不為鶴之鳴而為飛鳥之遺音不在隂而于天其勢不可久居終窮之道也故凶彖曰利貞而此曰貞凶者彼九五應乎天而此之登于天者出乎天位之外也胡氏瑗曰翰者鳥羽之髙飛也上九在一卦之上居窮極之地是無純誠之心篤實之道徒務其虚聲外飾以矯偽為尚如鳥之飛登于天徒聞其虚聲而已蘇氏軾曰翰者飛且鳴者也處外而居上非中孚之道飛而求顯鳴而求信者也故曰翰音登于天九二在隂而子和上九飛鳴而登天其道蓋相反也來氏知徳曰禮記雞曰翰音而此亦曰翰音者以㢲為雞也因錯小過飛鳥遺之音故九二曰鶴鳴而此曰翰音也雞信物天將明則鳴有中孚之意㢲為髙天之象又居天位亦登天之象也登升也言雞之聲登聞于天也九二上孚于五在隂而子和上九不下孚于三翰音反登天其道蓋相反矣中孚與小過相為對待孚盡則為小過矣翰音登于天借小過彖辭飛鳥遺之音為辭良有以也本義及來氏皆據禮文以翰音為雞葢取其信也豚魚也鶴也雞也皆信物故有所取爾也雞不于塒而于天必無之事斯所謂信窮而妄者歟小過句亨利貞句可小事句不可大事句飛鳥遺之音句不宜上句宜下句大吉傳小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也大象山上有雷小過君子以行過乎恭喪過乎哀用過乎儉繋辭斷木為杵掘地為臼臼杵之利萬民以濟葢取諸小過序卦有其信者必行之故受之以小過雜卦小過過也中孚之對待也二陽四隂陽大隂小隂多于陽故曰小過剛柔偏勝皆過也然過柔尚可以自處故有亨通之道而其亨亦必柔正不然則㢲懦不可為矣故利貞二五之中即正也以處小事何所不利三四偏邪剛不如柔矣故不可大事陽内連而隂分列若鳥羽然故有飛鳥之象兩羽方張其過迅疾故僅有遺音二五皆中而二為尤正故宜下不宜上上謂五下謂二是何也六五之詞曰已上也大吉得適中之道又不僅小事之吉已也大事關乎天下國家小事日用常行王氏弼曰飛鳥遺其音聲哀以求處上愈無所適下則得所安愈上則愈窮莫若飛鳥也按此上下之義亦活初六句飛鳥以凶傳飛鳥以凶不可如何也小過之初尚未過也下也彖曰宜下則當吉矣然過之幾浸浸乎動又有應于四不安于下以隂居初不安于小偏妄之萌往而不返雖欲止之鳥乎止之六爻惟初與上擬以飛鳥與彖同象葢四隂排列如鳥之翼初上如羽之張故直象之曰飛鳥也以凶云者謂自取也孔氏穎達曰小過之義上逆下順而初應在上卦進而之逆同于飛鳥之無所措足故曰飛鳥以凶項氏安世曰初六在艮之下當止而反飛以飛致凶上六居震之極其飛已髙則麗于綱罟龔氏煥曰大過卦辭以棟為象而初上兩爻亦以鳥言大過陽過于中而三四又陽之中也小過隂過于外初上又隂之外也六二句過其祖句遇其妣句不及其君句遇其臣句无咎傳不及其君臣不可過也妣祖姑也孫婦祔于祖姑禮也六二柔中越兩陽而與六五相應若孫婦之祔祖姑彼此同徳故相遇也陽隂之君也越兩陽而同五疑若過之然陽不相應而二有中徳非相抗也故曰不及五雖尊位然隂坤也臣道也彼此同心而未嘗失君臣之大分故曰遇其臣要之六二中正得隂之純雖處過之時而自守以道故不過也彖所謂貞也下也吉之道也无咎則小過之大吉也周易觀彖曰此爻與五兩隂相應有妣婦之配無君臣之交故其越四應五是過祖而遇妣也無正應于上而居下位是不及君而自得其臣也竊按小過中孚隂陽之大分本卦以隂之過乎陽故曰小過也陽大隂小陽君隂臣同一二五之應不得謂臣妣有異遇也傳曰臣不可過正謂不及其君與過其祖之文稍異耳不與陽應故不及也六五則未嘗不同徳相遇也九三句弗過句防之句從句或戕之句凶傳從或戕之凶如何也本卦陽少隂多是陽不能過乎隂也三四陽爻故皆曰弗過陽不能過乎隂則隂欲害陽者也本爻雖有應于上正所當防而九三偏危之地未免少智是不能防人者不防則甚且以隂為美矣得無溺而從之乎從之則上且挾其已過之勢因戕之矣戕害也覆敗死喪皆不防之致凶何可言來氏知徳曰弗過者陽不能過乎隂也兩字絶句本卦隂過乎陽故二陽皆稱弗過防之者當備懼防乎其隂也九四句无咎句弗過句遇之句往厲必戒句勿用永貞傳弗過遇之位不當也往厲必戒終不可長也九四承五以剛自勝可无咎也陽少于隂亦弗過矣然不中不正近承六五不能不相遇也所處之位則然也其遇之而往也有危道焉隂盛而五為之主四又多懼故也不可不戒所戒者永長而固守也小過之時為之也彖之利貞為六二言爻之勿用永貞為九四言也六五句密雲不雨句自我西郊句公弋句取彼在穴傳密雲不雨已上也隂陽和而後雨澤降小畜隂畜陽一隂主之小過隂勝陽六五主之故本卦爻辭與小畜彖辭同一不雨自西之象隂盛為雲雲升則不雨震動而艮止亦不雨也震變兌為澤又西方也六五隂過乎陽而居尊其事已大其勢已上六二不相與也其將何所取哉深求于上其類窮矣所取甚㣲非公狩所有事也已上之勢難乎為尊此彖所謂不宜上也不可大事也震張弓之象上六木杪巢穴之象又卦象飛鳥飛之窮者則在穴之象先儒謂下應六二為取穴之義未知小過之時六五已上與下不交傳止釋宻雲不雨曰已上則知下文皆同義矣非謂上文不雨而下文又别有所取也翼義顯然明盡惜乎味之者少也上六句弗遇句過之句飛鳥離之句凶句是謂災𤯝傳弗遇過之已亢也宜下不宜上上則窮矣當其在下猶相遇也上則隂陽離絶竟不遇矣所謂小過者此則竟過之矣鳥飛而不止至于離其羣而不復棲未有不入于網羅者其凶可知彖曰飛鳥遺之音此且不聞其音矣以人事言之所謂凶者外災内𤯝不一端也復之上曰迷復凶有災𤯝此曰弗遇過之飛鳥離之凶是謂災𤯝彼陽復之窮此隂過之窮也既濟亨句小句利貞句初吉終亂傳既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也大象水在火上既濟君子以思患而豫防之序卦有過物者必濟故受之以既濟雜卦既濟定也既未濟兩卦對待相推六十四卦中泰否天地之合既未濟泰否之雜坎離之交水火之資天地之用故以終篇實時事往復之幾也天地之無終無始者也本卦水上火下其用交故曰既濟此如泰然然泰為天地之交既濟則水火之交故泰曰吉亨而此曰亨又曰小也既濟言亨則已小矣然莫非亨也即思患豫防之義又既濟當用柔剛大柔小故曰亨又曰小也九五六二剛外柔内皆得正而當位是其利且貞也既濟之初猶未濟也内卦離體柔而得中虚已以上交審幾而度務此小者之所以亨也故吉既濟之終未嘗非小而窮隂在上偏暗不中不能永終以持其蔽亂矣上六曰濡首厲傳曰何可久此濟之所以難為終也初九句曳其輪句濡其尾无咎傳曳其輪義无咎也卦之初多稱尾初剛離體不遽進者故有曳輪濡尾之象又坎為輿輿下則輪也輪車之所恃以行者方既濟之始初九剛明是時方濟而不敢自恃者車之行恃乎輪曳輪則行者止矣濡尾有應于險能止險善補過也故无咎周易觀彖曰既濟之初可以濟而猶未可輕濟也初居下當濟時有濡尾之象然有剛正之徳故能曳其輪而不進則雖濡其尾而无咎矣蓋欲進而即止臨事而懼者也故无咎先儒因下小狐濡尾遂以本句亦取狐象上下文義兩端未貫傳曰曳其輪義无咎也上句是主甚為明顯惟周易觀彖深得翼義六二句婦喪其茀句勿逐句七日得茀子夏傳作髴荀爽作紱董遇作弗傳七日得以中道也六二柔順至中當既濟之時而不苟于濟者彖所謂小者之亨初之所以吉也有慎儀守禮時不克違之象爻柔故稱婦婦行必有蔽茀蔽也喪其蔽則儀弗修禮不備勿逐不急索之也不行也有待也五本正應而三隔之四間之不能遽合也至七日則陽數一周而自復儀無弗修禮無弗備斯濟之至善者矣傳曰得中道以二之徳盛也非僅得其所喪之謂茀虞仲翔曰謂鬒髪也王輔嗣亦曰首飾也子夏傳亦作髴毛西河據此謂先儒不當解為車茀是不觀二之為婦柔中得位貴也其為翟茀亦可知矣不必以蒲藻為類也茀笰通九三句髙宗伐鬼方句三年克之句小人勿用傳三年克之憊也三當既濟之半是濟之將過者九三剛危之地又離為兵戈故有克敵之象上承六四坎體隂爻本卦水火之交離東坎西鬼方西戎也三年爻數也以三剛伐六四之隂期在必克故至三年三年則師勞力竭財用殫耗矣夫以國家之全勢必三年而後克之則濟之難可見克伐至于鬼方濟之盛亦可見也然其時已將過矣又承坎險小人之象而上六正應柔悦藏奸不可不慎故戒勿用師之上六曰開國承家小人勿用葢事平之後當定規模非偏長制勝所能為亦非懷安溺志者所能與也其以髙宗當之者易之時幾也殷道屢興至武丁之世中興之後不復再興正既濟將過之時也象以此爻當之而又曰小人勿用者殆與文王同一憂時之心乎西羌傳云殷室中衰諸侯皆叛至髙宗征西戎三年乃克是其事也六四句繻句有衣袽句終日戒繻釋文作襦子夏王廙本作説文作需王弼云繻當作濡傳終日戒有所疑也繻之為濡王輔嗣説也葢舟漏之謂袽敗絮塞舟漏之物與帤同徐鍇云帤帛臭書盤庚篇云若乘舟汝勿濟臭厥載則袽之足備舟漏自古有然矣六四既濟坎體故有漸濡之象而以柔居之不敢自恃其濟者故既有衣袽以補罅漏至終日戒嚴而不稍懈弛上有九五之君下有重剛之乘應是不安其所居者也四本多懼此又甚焉故傳曰有所疑古者削帛為繻關門符信也故舊説有以終日戒為關防戒備者毛西河謂不當以漢制解周易良是然漢制近古符信在身而衣敗絮不敢出以示人葢亦疑懼之時為之也存之以見本字之義張氏清子曰六四出離入坎此濟道將革之時也濟道將革則罅漏必生四坎體也故取漏舟為戒終日戒者自朝至夕不忘戒備常若坐敝舟而水驟至焉斯可以免覆溺之患九五句東鄰殺牛句不如西鄰之禴祭句實受其福禴漢書作瀹傳東鄰殺牛不如西鄰之時也實受其福吉大來也九五既濟之君盛已極矣然六二為其正應是猶有尚儉之意焉殺牛祭之豐者禴祭之薄者東西彼此之辭言彼之豐不如此之儉葢郊用太牢在冬而禴祭在夏祭得其時宗廟用享故受福也此亦亨小之意離坎本東西之卦而離有牛象坎得中内實有致誠尚實之象致誠尚實時之大者故祭則受福潘氏士藻曰五以陽剛中正當物久豐盛之時故借東鄰祭禮以示警懼夫祭時為大時苟得矣則明徳馨而黍稷可薦明信昭而沼毛可羞是以東鄰殺牛不如西鄰之禴祭實受其福在于合時不在物豐也東西彼此之詞不以二五對言姚氏舜牧曰人君當既濟時享治之盛驕奢易萌而誠敬必不足故聖人借兩鄰以為訓若曰東鄰殺牛何其盛也西鄰禴祭何其薄也然神無常享享于克誠彼殺牛者反不如禴祭者之實受其福信乎享神者在誠不在物保治者以實不以文此葢敎以祈天保命之道上六句濡其首句厲傳濡其首厲何可久也當既濟之終柔暗之甚而居坎險之極故有濡首之象厲危也傳曰何可久言濟極而衰也此彖所謂終亂者也薛氏温其曰濡其尾者有後顧之義濡其首者不慮前也恃以為濟遂致陷沒沒而至首其尾可知歴險而不虞患故曰亂者有其治者也既濟終亂其義見矣朱氏震曰以畫卦言之初為始為本上為終為末以成卦言之上為首為前初為尾為後未濟句亨句小狐汔濟句濡其尾无攸利史記引本狐渉水濡其尾傳未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也大象火在水上未濟君子以慎辨物居方序卦物不可窮也故受之以未濟終焉雜卦未濟男之窮也與既濟覆推亦相對待水火不交故曰未濟否之似也然未濟有當濟之理離往居外則六居五而得中是能審度時勢而不失緩急之宜者濟之主也所以亨之才也坎來居内則九居二而未出中亦幾幾乎濟矣然險而難恃也故又有濡尾之戒言當慎始斯有終也汔幾也幾幾乎濟也九二之才也而又言濡尾無利者懼其陷于險不終濟也坎之中也下二句本戒辭而非九二之實象也傳曰小狐汔濟未出中也已了九二之事矣而于濡尾无利作一句解之曰不續終也是别有可慮之意故又合通體而結言之曰雖不當位剛柔應也則亨且濟之意居多矣先儒俱未全繹傳義胡氏炳文曰天地不交為否否不曰亨否不通也水火不交為未濟非不濟也未焉爾故曰未濟亨初六句濡其尾句吝傳濡其尾亦不知極也未濟之初柔邪偏暗又有九四為之應則喜于援上而不安其居故昧焉一往不知其所終極以此言濟羞不免矣濡尾猶言失始也濡尾即濡首之漸既濟之濡尾无咎而此則吝者才為之也時與變為之也既濟之初才甚剛正事方濟而能止未濟之初則才甚柔邪急于濟而犯險此其所以異也九二句曳其輪句貞吉傳九二貞吉中以行正也九陽爻才剛與五相應似勇於濟者而二有中徳則不敢輕濟矣故亦有曳輪之象貞吉者得中即所以為正也故傳曰中以行正也六三句未濟征凶句利涉大川傳未濟征凶位不當也征凶不濟也利涉大川則又竟齊矣是何也爻當上下卦之間火水不交之地故直提卦名曰此未濟者也以柔居危㢲懦觀望不離于險征行固凶然于斯時也未濟已半坎難將盡必勇于濟而後離者合也下出坎險上應陽剛則未濟者濟矣此又為三勉也九四句貞句吉悔亡句震句用伐鬼方三年句有賞于大國傳貞吉悔亡志行也九四出險近君有志于濟而有濟之才當濟之任者以剛濟柔正也吉之道也多懼之地雖若有悔而剛以濟柔實亡悔也是剛豈非未濟求濟之要哉以髙宗之時觀之可見矣殷道中衰諸侯不朝人心離散非大加振作其何能濟則所以震疊其聲靈者先伐而後賞駿厲嚴肅之遺猶可睹也故用伐久叛之逺國至于三年之久必克之而後已于是大國之効命者賞錫之典行焉一伐一賞所以為震者至矣此所謂貞吉而悔亡者也傳曰志行以濟為志即以志為貞也來氏知徳曰未濟與既濟相綜未濟九四即既濟九三故爻辭同亦如損益相綜損之六五即益之六二夬姤相綜夬之九四即姤之九三所以爻辭相同六五句貞吉句无悔句君子之光句有孚吉傳君子之光其暉吉也柔而得中即所以為正亦无所為悔也六五位尊而離明故曰君子之光又虚中而應九二上下相資故有孚以爻之柔而得中言則貞而吉矣以爻之虚而有應言則有孚而吉也未濟而適能濟其善不勝言也貞吉悔亡咸大壯及本卦之九四也皆以時義為貞而亡其所悔至此爻連屬而言貞吉无悔則中徳之盛為之又有異于他爻者矣上九句有孚于飲酒句无咎句濡其首句有孚失是傳飲酒濡首亦不知節也未濟之極則將濟矣水火交而飲食衎衎所以需時也故无咎時乎時乎不可失也若溺于其中不復求濟則失之矣養其身以有為惟知節者能之丘氏富國曰既言飲酒之无咎復言飲酒濡首之失何也葢飲酒可也耽酒而至于濡首則昔之有孚者今失于是矣李氏簡曰未濟之終甫及既濟而復以濡首戒之懼以終始其要无咎此之謂易之道也易翼宗卷六
