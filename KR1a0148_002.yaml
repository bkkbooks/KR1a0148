body:
  text: 易翼宗卷二湖北巡撫晏斯盛撰上經師句貞句丈人句吉无咎丈人李氏易解作大人誤傳師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之句吉句又何咎矣大象地中有水師君子以容民畜衆序卦訟必有衆起故受之以師師者衆也雜卦師憂需訟坎乾相加覆推而成師比則坤坎相加覆推而成此乾坤對待相推于初交之後坎男往來于其間自然之次也本卦坎上乗坤一剛五柔是羣陰統于一陽如衆之有統率也因名曰師古者兵出于農自十乗百乗以至千乗萬乗皆由田起故稱人之衆皆曰師詩所謂殷之未喪師是也師用以征征之為言正也又師直為壯九二得中故有貞義詩曰維師尚父時維鷹揚又曰方叔元老克壯其猷丈人之謂也九二剛中専閫于下六五正應推轂于上又坎為中男故有丈人之象且卦徳坎險而坤順師雖危事而大順民心故吉而可以无咎既曰吉又曰无咎者因兵凶戰危勞民動衆而言言其師之吉而後得无咎也丈人子夏傳作大人李鼎祚遂謂丈人者大人之誤然揚雄衆首擬師而其賛曰丈人推拏正襲易丈人之文不得謂古本非丈人初六句師出以律句否臧句凶傳師出以律失律凶也六在師之初爻故言師出才柔不中當事之始一失節制必見覆敗故有否臧之戒以律臧也否臧即失律律正也師之貞也其在樂也十二律皆有正聲是以古人行師吹律聽聲而知勝負其在師也正為主而竒為用不正即凶之道不待其覆轍而後知也九二句在師中句吉句无咎句王三錫命傳在師中吉承天寵也王三錫命懐萬邦也九二居下卦之中為師之主以一剛而統羣陰彖所謂貞也丈人也吉而无咎者也上應六五六五中而居尊王也徳通道合志安天下眷顧殷隆三錫之命誠慎之也此所以得専師中之吉而无咎也六三句師或輿尸句凶傳師或輿尸大无功也六三才柔乗剛二主乎中而三復動乎其外輿如輿論之輿衆也以二視三則衆矣尸如誰其尸之之尸主也乗剛而動則主矣不中不正違其主帥有凶之道故傳曰大无功若尸作敗師解則不必釋矣觀後弟子輿尸更明程傳曰三居下卦之上居位當任者也不惟其才陰柔不中不正師旅之事任當専一二既以剛中之才為上信倚必専其事乃有成功若更使衆人主之凶之道也輿尸衆主也盖指三也以三居下之上故發此義軍旅之事任不専一覆敗必矣王氏申子曰三不中不正是小人之才弱志剛者而居二之上是二為主將三躐而尸之也凡任將不専偏禆擅命權不出一者皆輿尸也軍旅何所聽命乎其取敗必矣六四句師左次句无咎傳左次无咎未失常也八陣圖天前衝地前衝在右天後衝地後衝在左右為前左為後故兵家尚右上將軍居右偏將軍居左左傳云師三宿曰次左次師後退而舍止也六四以柔承五知難而退兵家之常故无咎六五句田有禽句利執言无咎句長子帥師句弟子輿尸貞凶傳長子帥師以中行也弟子輿尸使不當也六五中正居尊為用師命將之主征不庭討不享其所有事也田以講武有師象故言田羣陰比翼有禽象故言禽有禽田之所也詩曰獸之所同麀鹿麌麌漆沮之從天子之所有禽而田非荒也則以義興師非黷也言征討之言執言謂聲其罪以討之實彖所謂貞无咎之道也郭京本利執言作利執之非也夫聲罪致討以義服之可矣在帥師者主之而已六五柔中而應九二其所有事也師非以黷武也中道也若執言可服而猶戰焉是又弟子専功之謀矣凶也盖命將為行師之本長子謂九二即彖所謂丈人自衆尊之曰丈人自君稱之則曰長子弟子謂三命將貴兼才徳乃堪重寄如九二之剛中為五正應是其選矣若六三則才柔不中偏裨之衆陰邪狂恣使専謀議雖貞得無凶乎玩傳田有禽利執言无咎不釋而専釋長子帥師弟子輿尸者以執言為長子之事也六五柔中不欲黷武也不然則専功者主之矣豈師之道哉向來俱不解此弟子輿尸向來俱兼三四言玩彖左次无咎則四能自反而退非輿尸者惟三以柔乗二之剛不度才不量力與二有競功之象本文輿尸即從前象來非别一義上六句大君有命句開國承家句小人勿用傳大君有命以正功也小人勿用必亂邦也上六師之終順之至論功行賞建邦啟土之時也又坤為土地為均為文為衆故有大君有命開國承家之象亂之終而治之始治即防亂故戒使勿用小人謹始之意為國家計也聖人體元流行不息開國承家治本也元也小人勿用為治國家言也朱子曰開國承家小人勿用舊時説只作論功行賞之時不可及小人今思他既一例有功如何不及他得看來開國承家一句是公共得的未分别君子小人在小人勿用則是弗更用他與之謀議經畫耳漢光武能用此義自定天下之後一例論功行封其所以用之左右者則鄧禹耿弇賈復數人他不與焉此義方思量得如此未曾改入本義且記取胡氏炳文曰初師之始故紀其出師而有律上師之終故紀其還師而賞功六爻中將兵將將伐罪賞功靡所不載末曰小人勿用則又戒辭也雖然亦在於謹其始焉耳曰丈人曰長子用以行師者得其人及其開國承家自不至于用小人矣比句吉句原筮句元句永句貞句无咎句不寧方來句後夫凶傳比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也大象地上有水比先王以建萬國親諸侯序卦衆必有所比故受之以比比者比也雜卦比樂師之覆也坤來居下坎往居上文王觀此坎上坤下坤順坎行五陽居尊衆陰歸之因名為比原再也左原田漢書原廟本草原筮俱訓再凡卦先内卦後外卦再筮謂九五比師之反對師而言九五在外卦故曰原筮九五剛而得中有元善永久貞固之徳所以吉而无咎曰吉原筮元永貞者倒揭語也卦體九五得位坤順六二正應羣陰相輔有歸心恐後上下恊應之象故曰不寧方來當此比順之時天下歸心有後之者心欲後也觀望遲疑中懐異志是悖乎比之義者窮之道也故曰後夫凶夫出衆者如丈人長子之類牧誓稱夫子朂哉朂哉夫子即其人也庸可後哉初二三四不寧方來者也上六髙亢後夫也䝉屯之反剛來居内故曰初筮比師之反剛往居外故曰再筮此如貞悔之謂聖傳皆曰以剛中也本義作再筮以自審不恊初六句有孚句比之句无咎句有孚盈缶句終來有他吉傳比之初六有他吉也坤體比初歸附最先方來之始其于五位雖逺而已有以信之矣本自无咎不但无咎已也孚信之至至于積誠既久則五其志同道合矣吉何如之六皆比陽者也而誠不誠異後夫懐疑故凶三與後𩔖故傷觀後之所以凶則知初之所以吉初對後看吉可豫卜傳比之初六倒轉爻辭正從初字得義而直决其有他吉非後與三之所能同也缶雖最薄之陳而誠積于初則孚之早矣鄭氏汝諧曰五為比之主初最逺而非其應何以有吉義盖機生于應物之先而誠出于志之未變故以信求比何咎之有盈充也缶素器也居下而位卑擴吾之信以充之雖逺而非其應終必應而有他吉矣有他吉者非期於必得而得之也六二句比之自内句貞吉傳比之自内不自失也内已也五其正應有適合之道以天下所共比之主而已與之應道合志同則一徳一心不苟于比而適相比者其正也故正而吉傳曰不自失不失其正也本義曰柔順中正上應九五自内比外而得其正吉之道也六三句比之匪人傳比之匪人不亦傷乎不中不正危疑之地處二之後五隔于四不能相比與上相應後夫之𩔖後夫凶而比傷可知矣之謂上也非初二四之𩔖也故曰匪人専以應言語類曰初應四為比得其人二應五亦為比得其人惟三乃應上上為比之无首者故為比之匪人也趙氏彦肅曰初比于五先也二應也四承也六三無是三者之義將不能比五矣六四句外比之句貞句吉傳外比于賢以從上也上謂九五五位尊剛正一卦之主賢也四從五五在外而四從之正也比之最切者也從龍從虎氣𩔖自然李氏過曰二與四皆比于五二應五在卦之内故言比之自内四承五在卦之外故言外比之外内雖異而得其所比其義一也故皆言貞吉九五句顯比句王用三驅句失前禽句邑人不誡句吉傳顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五居尊為比之主剛健中正而羣陰翕然從之剛健則明而不暗中正則公而不私故曰顯比觀顯之為義則廓然并包乎天下而無所于廹坦然誠服乎天下而無所于疑已盡一爻之神而吉可知矣失前禽顯比之徳剛中之存來者不殺而衆歸之王者之仁所以蓄衆邑人不誡顯比之化剛中之致自恊乎中而不知誰之為之帝力于我何有也陸氏振竒曰三驅失禽置失得于無恤者狀蕩平之王心邑人不誡冺知識于大順者狀熙皥之王化三驅失禽之義程傳本義俱以天子不合圍及武湯祝網為解然古註云凡驅禽而射三度則已也軍禮禽在前來者不逆而射之不殺降也旁去又不射奔者不禁也惟背我而去則射之故自膘達肩為上殺而傷者不以獻是舍逆者不迎射之也取順者取其所當取如書所謂取亂侮亡也失前禽則所到皆下不殺一人而全收其衆正顯比之事若來者不拒則來即取而殺之矣于義未安又邑人不誡本義云雖私屬亦喻上意不相警備以求必得經傳義俱未合語類則云邑人不誡如有聞無聲言其不消告誡又如歸市者不止耕者不變相似後條更切得顯比景象上六句比之无首句凶傳比之无首无所終也九五為比之主初比之最先故有喜二正比五四外比五故皆貞吉六陰柔疑貳比之最後而居于五之上既已過之不知天命禍可言乎此彖之所謂後夫凶也无首即後也无所終據无首而言也與不寧方來對看非先无首而後不知所終也王氏弼曰无首後也處卦之終是後夫也為時所棄宜其凶也王氏申子曰五以一陽居尊四陰比之于下故彖傳曰下順從也而上六孤立于外而不從豈非後夫之象二家得之小畜句亨句密雲不雨句自我西郊小畜歸嵗作􅳧畜誤傳小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也大象風行天上小畜君子以懿文徳序卦比必有所畜故受之以小畜雜卦小畜寡也畜因乎比覆乎履比一陽為五陰所歸而小畜以一陰制乎五陽此其剛柔相因而推之者也履上乾而下兑柔不當位而履乎剛小畜上巽而下乾柔得其位而上下之剛繫之此其剛柔反復而推之者也柔止剛非亨道也第以其内健而外巽陽剛居二五之中而其志得行乃可以亨也兑反為巽自内而外兑升成巽三往居四故聖傳曰尚往往期于逺而近在乾上故曰自我西郊夫陰陽和而後雨澤降陽為陰畜則陰為主而陽未得遂故有此象然不雨不遽雨也施未行未竟行也此乃所為畜之小而有亨之道也如初九之復自道九二之牽復九五之有孚則尚往而施未行之時矣至上九巽變為坎則雨之盈而畜者盛故貞厲征凶畜之極而亨道難矣先儒俱謂雲起自西即不成雨故于本文亨下二語不屬經傳彖爻俱多牴牾嘗驗之諺云久雨西風晴久晴西風雨雲隨風行歴歴不爽則西起之雲亦未嘗不雨也來氏頗窺亨畜之㫖而于象義猶未盡恊由其未明此理并用互爻而不及剛柔相推之本也初九句復自道句何其咎句吉傳復目道其義吉也二五剛中志行故能亨乾不可得而畜也初當畜之伊始九以陽剛之才乗其機之萌而自行其志不為四制而四且應之則復其常矣道之本然也故曰復自道不惟无咎而實為事理之宜故聖傳曰其義吉此君子之所以大居正也貴謹幾也觀屯否之初可見九二句牽復句吉傳牽復在中亦不自失也牽連也連乎初也初合志同徳者也乾不可畜九二剛中陰不能制不成乎畜正與初九相牽而復其常亨畜之理一也聖傳承初九不畜之義而言故曰亦不自失九三句輿説輻句夫妻反目傳夫妻反目不能正室也九三切近乎四既比之復廹之欲動不能故有輿説輻之象三四陰陽比近夫婦之義然陽剛不中而陰柔得位居外將欲制其陰而反為陰制反目不相對視各相惡而不相下也不能正室非不欲正不能正也項氏安世曰輻陸氏釋文曰本作輹按輻車轑也輹車軸轉也輻以利輪之轉輹以利軸之轉然輻無説理若輹則有説時車不行則説之矣大畜大壯皆作輹字胡氏炳文曰大畜九二輿説輹輹與輻或據左傳註以為通用何也曰説文輹車下橫木非輻也大畜九二説輹剛而得中自止而不進也小畜九三説輻剛而不中止于陰而不得進也説輹可復進説輻則不可以行矣二説互相發六四句有孚句血去惕出句无咎血晁以道作恤傳有孚惕出上合志也六四承五為畜之主象五位尊而相得故象為有孚而傳曰上合志上謂五也畜得其正順承以為畜也此為最善故无咎血晁氏本作恤盖恤字之誤也恤憂恤也謂九三本象陰為陽所廹説輻反目者也四既承五則九三之憂恤者去矣惕本爻四多懼故惕然以陰承陽畜之正者故出乎惕即象即占從前血惕二義俱未明徹九五句有孚攣如富以其鄰傳有孚攣如不獨富也四以陰畜陽不得其正惟承五故有孚五則陽為主而陰之畜者成之又有二之剛中為應其志得行故曰有孚攣如攣如孚之甚猶所謂心如結兮者彖之剛中而志行是也畜有富義畜正而盛則富矣鄰即四畜盛而富則四之孚者亦富也如君于臣正其志而諫行言聽則臣亦與共天禄書曰臣哉鄰哉是之謂矣本義謂三爻同力畜乾為鄰之象未合彖傳觀之上九句既雨既處句尚徳載句婦貞句厲句月幾望句君子征凶徳京房虞翻子夏傳皆作得幾唐一行作既俱誤傳既雨既處徳積載也君子征凶有所疑也既雨雨之既也如既然之既月幾望幾及也如庶幾之幾上九畜之終亨之久富之盛非徳之積不足以載之故曰尚徳載不然則滿而傾矣書曰滿而不溢所以長守富也其為是乎此君子之道貴剛以守之也若陽畜不止則六四用事婦道為主危厲不免如月之及望而陰疑于陽矣君子當此豈可復征故不戒者凶也畜極而通則雨矣因彖文不雨而言故曰既雨望月之盈也陰之盛也本爻巽體畜極故曰月幾望婦陰道君子猶言男子猶九三之言夫也應也其情同王氏應麟曰小畜上九月幾望則凶陰疑陽也歸妹六五月幾望則吉陰應陽也中孚六四月幾望則无咎陰從陽也據此分晰得同辭異義之㫖然歸妹中孚之月幾望皆陰爻此獨陽爻變坎則陰之畜極者不知止也故征凶九三之夫婦反目終必及也既雨既處尚徳載二句與婦貞厲月幾望君子征凶三句上下相承對看玩傳文既雨既處徳積載也為一段婦貞厲君子征凶有所疑也為一段文勢分明先儒以婦貞厲屬上段與君子征凶對看不協履虎尾句不咥人句亨傳履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也大象上天下澤履君子以辯上下定民志繫辭履徳之基也履和而至履以和行序卦物畜而後有禮故受之以履雜卦履不處也履小畜之反也小畜外巽之六四來内乾之九三兑柔乾剛而乾上兑下若履踐然故名為履乾虎象凡卦從下而上則四即其尾也然本卦之體内兑外乾兑説乾健柔以應剛無所傷害故雖履虎尾而不咥人占此者亨且五當尊位所履者尊剛中而正故不疚又九五剛正有光明之象履之所以無傷而能亨也履虎尾以九四言彖傳履帝位以九五言其不咥人不疚及九五之貞厲而不至凶互相發明初九句素履往句无咎傳素履之往獨行願也素履猶中庸言素其位而行也素者本然固有之謂履禮也知崇禮卑本爻剛而能下居履之初未為物遷率其本然固有者而行之獨得于己不願乎外故无咎九二句履道坦坦句幽人句貞句吉傳幽人貞吉終不自亂也九二中正故有履道坦坦之象中道而行依乎中庸者也平易明白中有所主﨑險竒衺不足以亂之對九五帝位而言則此為幽人猶中庸所謂遯世不見知而不悔者也剛中即所以為正貞也故吉梁氏寅曰行于道路者由中則平坦從旁則﨑險九二以剛居中是履道而得其平坦者也持身如是不輕自售故為幽人貞吉六三句眇能視句跛能履句履虎尾咥人句凶句武人為于大君傳眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也不中不正居凶危之地暗昧陂側而行險犯義下履九二上履純乾其志甚剛不免于禍此履之凶者本卦小畜之反也巽反為兑是乾也而成兑矣兑為毁折則眇且跛也不必象家互爻而始合也柔履剛本爻為履之主就全體而觀則兑説而應乎乾就一爻而言則正履乾剛而失其柔故即承彖文履虎尾而分别之曰此則其咥人者也王氏申子所謂彖總言一卦爻則據其時與位而言是也來氏謂人居兑口鑿矣武陰象三也眇視跛履而履虎尾者也大君乾也為則作威作福之謂為于大君犯分干義履之事也所以明上文之象也聖傳上以位言下以志言本一意王氏申子謂武人用之以有為于大君之前則可者亦失傳意九四句履虎尾句愬愬終吉愬愬馬融作虩虩誤傳愬愬終吉志行也履非其地皆屬危機九四不中不正與六三同故亦曰履虎尾四多懼故愬愬也以剛居下上承九五履危而知所戒懼與暴虎馮河眇視跛履者異盖履剛而能柔志自可行故終吉九五句夬履句貞句厲傳夬履貞厲位正當也剛中而正履當尊位不疑所行故夬履夬決也快也中正故貞厲而不至咎凶此即彖所謂履虎尾不咥人傳所謂履帝位而不疚者也所以夬履而貞且厲者以正當乎履之位決于履且固守其履也以視履元吉觀之則夬履之貞厲可見矣噬嗑之貞厲无咎傳曰得當兑五之有厲傳曰位正當皆以當乎位之尊而言也彖傳爻辭非有異文上九句視履句考祥其旋句元吉傳元吉在上大有慶也上九履之終行之成不壯往不徑行故曰視履視審慎也考視之詳也祥善之至履之度也旋周旋折旋也中規中矩善也就履而言故不僅曰善而曰祥也履禮也周規折矩有節有文秩然藹然中乎天則考祥如是所謂動容周旋中禮盛徳之至者履以和行莫之或過夬履者行若危愬愬者行自懼眇跛者行若狂坦坦者行未著素履者行未成吉無踰此者故元吉來氏知徳曰視履作一句與素履夬履同例祥善也三凶五厲皆非善也考其履之善必皆天理之節文人事之儀則下文其旋是也旋者周旋折旋也凡禮以義合而截然不可犯者謂之方猶人之步履折旋也以天和而怡然不可解者謂之圓猶人之步履周旋也禮雖有三千三百之多不過周旋折旋而已考其善于周旋折旋之間則中規中矩豈不元吉按此義最精但其中有中爻離目視之象也句未解傳元吉在上専以上言不主六三也此又用互爻而失之鑿故刪之泰句小往大來句吉句亨傳泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也大象天地交泰后以財成天地之道輔相天地之宜以左右民序卦履而泰然後安故受之以泰泰者通也雜卦否泰反其𩔖也泰者否之反小謂陰大謂陽往者自内之外來者自外至内小往坤三陰自否内往居外大來乾三陽自否外來居内陽來陰往交也陰陽交則和和則通上下交則合合則固故曰泰正月之候成平之世天時人事一也吉亨者吉以亨也泰也雜卦傳否泰反其𩔖言此為反易之卦只從否泰觀其往來大分了然不兼歸妹彖傳較然劉氏牧亦専主内外卦初九句拔茅茹以其彚句征吉傳拔茅征吉志在外也泰初陽來于下天道下濟君徳下交之始即上交之初茅微賤之物以其在初也茹根也彚𩔖也征進也仕進之謂下交之初衆志欣動進而從君也茹茅之根彚又根之類思皇多士維周之楨濟濟多士文王以寧王陽在位貢禹彈冠觀士氣而知興朝之象據初而言也盖拔茅之茹而連乎茹之彚則極其下者而擬之以見交泰之初氣𩔖之從也先儒謂連及三陽者猶隔一層九二句包荒句用馮河句不遐遺句朋亡句得尚于中行傳包荒得尚于中行以光大也泰二陽交于二上應六五交之最盛者泰之主也荒逺也乾體廣大無不兼容而量有必周故曰包荒非僅初之拔茅茹而以其彚已也九二剛中能濟往而無阻有馮河之勇焉乾用剛果無所私眤而不疑所行故曰用馮河非僅初之征進已也惟其體之無不容也故不遺遐逺惟其用之無所私也故不溺朋比皆據二而言泰之中道也傳曰光大者中徳也本義謂包容荒穢來氏謂包初皆非也未知上下四句之相承見義也未知得尚于中行為本爻之主也未知傳舉首尾以括中二句也九三句无平不陂句无往不復句艱貞无咎句勿恤句其孚句于食句有福傳无往不復天地際也三處上下卦之間地與天往來之界地之形无平而不陂天之氣无往而不復當此之際非乾陽之貞以固其交能為泰乎知其艱而貞以守之斯无咎震无咎者存乎悔其為艱也能勿恤乎其能貞也則有孚矣孚則陰陽交而泰矣如是則不僅无咎也艱貞者于是乎食矣且有福矣勿恤恤也于食食也俱二字為句泰否反易亦對待九三陰陽交際之大分故就其大分以為辭與論承應者又别聖傳以一際字括一爻之象竒甚六四句翩翩不富以其鄰句不戒以孚翩翩陸徳明作萹萹誤傳翩翩不富皆失實也不戒以孚中心願也泰四柔順之體陰以得陽為心上交之時近五應初同心相應翩翩來不已之貌狀四之情也不富以其鄰言𩔖應之速不有其富相與為泰也鄰謂五五泰之至隆四以陰相承急欲相從以成泰同情也傳曰失實者忘私忘家之謂非不待富之謂不戒以孚言不富以其鄰之實也不待戒而自孚出于中心之所欲得也故傳曰中心願實泰交之美者本義謂其占為有小人合交以害正道君子所當戒于爻情傳義俱未恊何氏楷曰此正陰陽交泰之爻也翩翩羣飛而下貌陰虚陽實凡言不富者皆陰爻鄰指五上四能挾其並居之鄰相從而下者以三陰皆欲求陽故不待教戒而能以之下孚乎陽也此説近是六五句帝乙歸妹以祉句元吉傳以祉元吉中以行願也帝乙歸妹借時事為象如髙宗箕子之𩔖帝乙謂湯湯稱天乙故亦稱帝乙其嫁妹之辭曰無以天子之富而驕諸侯陰之從陽女之順夫天下之義也往事爾夫必以禮義是也泰五陰居尊位帝女之象泰交于陽下嫁之象來氏謂本卦陰陽交泰陰居尊位而陽反在下故象以此者得之其謂中爻三五為雷二四為澤有歸妹之象者亦偶合此體非本意何也無帝乙二字也祉當作禮即必以禮義之文元吉至善而大吉也福在其中皆五之中徳為之故傳曰中以行願也女之嫁與四之願交于陽同也帝制為下嫁之禮則中以行之矣上六句城復于隍句勿用師句自邑告命句貞吝傳城復于隍其命亂也泰極矣過乎中矣必復為否政令顛倒成者壊之尚可為哉坤為地為土故取象城隍坤為衆變艮為止故勿用師邑親近之地令不及逺而告命自邑雖正亦吝泰極之時為之也程子曰掘隍土積累以成城如治道積累以成泰及泰之終將反于否如城土頽圮復及于隍也上泰之終六以小人處之行將否矣師衆也勿用師君之所以能用衆者上下之情通而心同也今泰之將終失泰之道上下之情不通矣民心離散不從其上豈可用也用之則亂衆既不可用方自其親近而告命之雖所告命者得其正亦可羞吝來氏曰此復字正應无往不復復字否句之匪人句不利君子貞句大往小來傳否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内陰而外陽内柔而外剛内小人而外君子小人道長君子道消也大象天地不交否君子以儉徳辟難不可榮以禄序卦物不可以終通故受之以否雜卦否泰反其𩔖也否者泰之反乾三陽往居外坤三陰來居内陽散陰離不交也陰陽不交則不和不和則不通上下不交則不合不合則不利故曰否衰謝之候敗壊之秋天時人事無可為者否之匪人與履虎尾同人于野艮其背同例獨以匪人當之者内小人小人道長也不利君子貞者不利于君子之正外君子也君子道消也天地塞賢人隠不能以行道為正故大象曰君子以儉徳辟難不可榮以禄也泰但言小往大來而著其吉亨否則詳言人事而後言大往小來若曰當斯時也雖曰天命豈非人事哉言世之否塞皆小人為之也來往只從泰否反易見義不兼漸卦否之匪人來氏以為非人也天也天字多一轉失聖人立象之意不利二字為句與上下句不相屬只如舊讀即小人道長君子道消之謂也初六句拔茅茹以其彚句貞句吉句亨傳拔茅貞吉志在君也否初事尚可救陰陽雖不交而外有九五剛正之君因時而早圖之則猶可及止也惟在正而固以守之則吉而否者以亨亨否非一人之事亦必有傑出之人氣機之際旋轉之功在初為最切也且否泰反易同體故初爻之辭差同其不同者貞也亨也貞君子之道也彖辭不利君子貞而初以貞而吉且亨者以初之時言也君子之道未竟消也先儒俱以三陰皆為小人是専見彖而不見爻也彖言陰陽之大分爻言所值之時位各有所當約而言之諸卦大象之不吉者初爻皆有吉義如屯蠱暌蹇之𩔖言其勢之可迴也且據其材而言之苟有可治則否即可亨也四五六亦然古今治世而伏亂幾亂世而基治理豈不惟其人乎六二句包承句小人吉句大人否亨傳大人否亨不亂羣也包一陰居中而上下兩陰包之也承承六三也六二柔中當否之時包陰而又承三無所作為承順而已夫不敢妄作小人之福也故吉然爻本中正可以自立雖包陰承三不為所亂安其否而道自亨也或曰上應九五否者可亨也曰天地不交不能為應也六十四卦中有應而不能為應者獨此卦也故傳曰不亂羣獨言大人者所以著君子之柔正不同乎小人之柔靡也六三句包羞傳包羞位不當也六三偏暗當上下交接之地有陽可從而偏邪險側與羣陰為黨以成為否小人誤國貽禍于世上下切齒靦面自安可羞孰甚詩云天之方蹶無然泄泄孟子曰泄泄猶沓沓也事君無義進退無禮言則非先王之道者猶沓沓也其是之謂乎九四句有命句无咎句疇離祉傳有命无咎志行也否九四泰之九三也而所處之地尤善以陽居四剛而承五剛中之君相與共濟亨否何疑命以四承五出納王命柔不茹剛不吐何咎之有泰三勿恤有孚而後有福否四有命自无咎而同類且受祉語曰大旱之後易為澤所處之地然也疇𩔖也離麗也祉福也項氏安世曰泰雖極治以命亂而成否否雖極亂以有命而成泰命者天之所令君之所造道之興廢豈非天邪世之治亂豈非君邪㫖哉斯言明王文成公答朱侍御書曰疇祉盈朝志行于衆九五句休否句大人吉句其亡其亡繫于苞桑傳大人之吉位正當也繫辭子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑否至于五噫甚矣將息矣九五剛中故足濟否非大人孰能與于斯乎然否之在休猶未盡也未亡者一綫耳苞桑之繫微矣桑非樟楠松柏之大不固磐石而繫苞桑其危何如否休之際有此象也漢唐中興不其然乎繫辭傳于危亡亂丁寧再三聖人之情見乎辭皆休之義也否泰之分也唐陸贄收復河北後請罷兵狀云邦國之杌􅑾綿綿連連若苞桑綴旒幸而不疎者縷矣此語可以觀象上九句傾否句先否後喜傳否終則傾何可長也否極矣亂極生治否之上九泰之上六時𫝑必然泰上曰復否上曰傾傾與復正相對傾盡則泰矣故先否後喜傳曰何可長言不終否也陽長而陰消也天之元為之主也同人于野句亨句利涉大川句利君子貞傳同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志大象天與火同人君子以類族辨物序卦物不可以終否故受之以同人雜卦同人親也泰否小乾坤也以下一陰五陽一陽五陰者四而同人則其間接續者也師一陽居二而統羣陰同人一陰居二而合羣陽師衆也同人親也名卦相因同人大有乾離相加覆推而成柔以二為正為中柔正居中足繫兩陽而外又應乎乾以柔中而合健徳大同之象也故曰同人其于野涉川皆謂乾也于野象其曠逺涉川象其健行曠逺者無私交健行者無沉溺故亨且利又離文明而乾健九五中正而應乎二惟其中正故羣陽俱應也非君子孰能與于斯貞正也初九句同人于門句无咎傳出門同人又誰咎也剛正居下同人之初無所偏係又位在最近之地故曰門于門者于野之初也傳曰出門則無門内之私二之柔中在前同之而不徇也故曰誰咎六二句同人于宗句吝傳同人于宗吝道也宗主也六二為同人主爻其在大象本以柔中而同乎羣陽大公之道也至于本爻則二與五為正應其情専一于初三四上若相離者然失同人之道矣與大象之應乎純乾者異故吝九三句伏戎于莽句升其髙陵句三嵗不興傳伏戎于莽敵剛也三嵗不興安行也卦以同為義不同則争乾來同于離而三以偏暗居離之間欲敗其同然乾尊離明不得肆也又九三剛而不中欲與二同而二與五為應不能為同欲謀間五而剛正不敵同而不同是有戎心矣且三居下卦之上隔四望五故有升其髙陵之象然乾敵剛正終不能動故三嵗不興三嵗爻居三也不興即伏也静而不動也故傳曰安行安行猶曰潛行九四句乘其墉句弗克攻句吉傳乗其墉義弗克也其吉則困而反則也四亦欲同乎二而惡其専于五也墉謂三離中虚有垣象故三為其墉四乗而攻之然剛在乾下尚知自反以五在上而不能逞也以五為正而不可肆也不能逞故乗墉而攻不克也不可肆故終守分遜五而吉也傳曰義弗克非但勢不克五尊與二為正應實有不可攻之義困而反則則知義矣九五句同人先號咷而後笑句大師克句相遇傳同人之先以中直也大師相遇言相克也繫辭同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭不同則憂同則喜同人之情所必至也號咷憂之切笑喜之誠先號咷者三四間之也後笑者五與二中正而應也人之不同者即争象三伏莽四乗墉陽剛設險必大師乃克既克則同而相遇矣傳同人之先句連號咷後笑在内如包荒得尚乎中行拔茅征吉等句皆省文也上九句同人于郊句无悔傳同人于郊志未得也初曰門二曰宗三曰陵四曰墉五能同矣上居其外離其儔侣故曰郊又乾有郊野大象國外謂之郊郊外謂之牧牧外謂之野皆曠逺之地于郊去野不逺宜同占義矣而僅曰无悔者本爻廓落無與耳未若大象之𩔖應無私也于野者文明以健剛中而應能通天下之志于郊則于野有間矣明健不足剛而不中九三不應雖无所悔而實未能通天下之志也故傳曰志未得象傳志字正對彖傳志字大有句元句亨傳大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨大象火在天上大有君子以遏惡揚善順天休命序卦與人同者物必歸焉故受之以大有雜卦大有衆也同人之覆也陽大陰小大謂陽六五柔尊得中上下交應五陽皆其所有故曰大有也乾剛健離文明乾三陽應離六五與天相應時中而行所以元善而亨通也乾曰元亨利貞大有曰元亨離明天上與天同體矣程子曰卦之才可以元亨也凡卦徳有卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也由剛健文明應天時行故能元亨也初九句无交害句匪咎句艱則无咎傳大有初九无交害也五陽皆為六五之有初去五尚逺不能相與故无交然陽剛在初不涉物累故亦无害不求不忮非有咎也其所以无交害者剛以守之也艱也斯无咎之道六五曰厥孚交如威如羣陽皆孚也此曰无交害逺于五也九二句大車以載句有攸住句无咎車蜀才本作輿傳大車以載積中不敗也陽剛得中正應六五能成其有若大車之載物中廣能積滿而不溢足以任重致逺故往而无咎九三句公用亨于天子句小人弗克亨虞氏作享與春秋傳合傳公用亨于天子小人害也本義亨春秋傳作享謂朝獻也古者亨通之亨享獻之享烹餁之烹皆作亨確不可易先儒作亨通之亨者泥于字也當大有之時居上下之交二有大車之載往四有匪彭之无咎則三以乾下之上而上交離明宜其為公也為亨于天子也雖地處偏隘剛柔之際不無小人之害然健以明繼不能勝也亦不可不慎也亨之成不成重有闗于大有之時也象傳分明程傳謂小人處之則専其富有以為私本義謂小人无剛正之徳雖得此爻不能當俱不協來瞿塘知四之阻為小人而又以離為兵戈之象亦鑿九四句匪其彭句无咎傳匪其彭无咎明辨晳也程傳曰彭盛多之貌詩載驅云行人彭彭行人盛多之狀雅大明云駟騵彭彭言武王戎馬之盛也沈氏該曰謙少自居而懼以戒其盛得明哲保身之義故无咎按四連三陽而進彭彭然盛之貌也四多懼以剛下柔戒懼謙退不有其有彭彭然者匪其有也明于義理之至也故无咎沈氏深得象傳意六五句厥孚交如句威如吉傳厥孚交如信以發志也威如之吉易而无備也六五虚中九二誠應五虚中而信于下二志實而應乎上上下交孚之象也書曰元首明哉股肱良哉大有之交也二應而五陽俱應矣故曰厥孚交如斯時也恭己南面禮明樂備坦易明白不大聲色離當文明故曰威如先儒威如句作戒辭未詳聖傳上九句自天祐之句吉无不利傳大有上吉自天祐也繫辭易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也六五有乎大者也羣陽大之有乎五者也上吉大之極而六五柔中實與親信上剛從柔思順乎五當有之極不自有其有而為六五有心知六五之賢而尚而信且順之相得之深有之成也故曰自天祐之吉无不利而傳曰大有上吉自天祐也言上之所以吉也繫辭傳所謂履信思乎順又以尚賢者正相發明本義曰大有之世以剛居上而能下從六五是能履信思順而尚賢也經傳聮貫無復疑義而郭氏雍鄭氏汝諧俱謂履信思順為六五之事而特于上九發之以見其有失爻義矣謙句亨句君子有終傳謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也大象地中有山謙君子以裒多益寡稱物平施繫辭謙徳之柄也謙尊而光謙以制禮序卦有大者不可以盈故受之以謙雜卦謙輕同人大有皆一陰五陽見于泰否之後謙豫則皆一陽五陰坤艮反覆相推而成者自然相因之序也為卦上坤下艮地卑居上山髙居下坤順艮止艮九三一陽止于坤順之下皆不自尊亢之象故名曰謙天地之體用人鬼之性情皆以謙為貴其徳足為衆之所歸故有亨道是謙之所以亨由艮之一陽止於衆陰之間尊而終見其光卑而終不可踰故曰君子有終初六句謙謙君子句用涉大川句吉傳謙謙君子卑以自牧也六在謙初以謙自治者謙而又謙敬謹之至用涉危險必克有濟故吉止而順以柔處初涉險不陷即涉川之義不必互體震坎隔爻取象六二句鳴謙句貞吉傳鳴謙貞吉中心得也鳴和于外也柔順中正與三相得三為謙之主鳴謙鳴三之謙也同聲相應同氣相求聲氣不孤得心應響有不啻若自其口出者矣故為鳴謙惟其中正故貞且吉蘇氏軾曰雄鳴則雌應故易以陰陽唱和寄之于鳴謙之所以為謙者三六二其鄰也上六其配也故皆和之而鳴于謙來氏取小過飛鳥之象為鳴不若此條得卦之主九三句勞謙句君子有終句吉傳勞謙君子萬民服也繫辭勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也三剛徳艮體居下之上為羣陰之所歸有功于民者也而止于坤順之際不傲上不凌下所謂謙尊而光卑而不可踰者此君子也其有終也萬民之所以服也故吉繫辭傳有功謂已成之功即勞也故下云語以其功下人者也來氏取象互坎分别功先勞後失傳意六四句无不利句撝謙傳无不利撝謙不違則也上有柔中之君四下之而不亢故无不利然三者謙之主爻以剛下柔謙之所以為謙也諸爻之謙視之為則四之所以无不利者當發揮乎三之謙也二承三上應三皆得鳴三之謙四乗三當發揮乎三之謙觀傳所謂不違則者爻義甚明本義于撝謙另作戒辭來氏解為撝者裂也避陽而去之俱非聖傳意六五句不富以其鄰句利用侵伐句无不利傳利用侵伐征不服也
